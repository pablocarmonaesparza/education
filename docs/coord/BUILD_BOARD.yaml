source_of_truth: true
rules:
  - si una tarea no vive aqui, no existe
  - cada tarea tiene owner, reviewer, status, depends_on, dod y notes
  - los estados validos son backlog, in_progress, review, blocked y done
  - cada agente debe claimar una tarea antes de tocarla; claims vencidos se liberan por heartbeat
  - >-
    si una tarea bloquea a otro agente, registrar el bloqueo en docs/coord/BLOCKERS.md antes de
    cambiar de frente
  - commits de subtarea usan prefix [task:<id>]
  - PR por bloque cerrado, no por subtarea
claim_policy:
  default_lease_minutes: 120
  stale_lock_seconds: 30
  fields:
    - claimed_by
    - claim_expires_at
  conflict_rule: solo un proceso puede escribir BUILD_BOARD.yaml bajo lock exclusivo .coord-board.lock
disagreement_policy:
  reviewer_veto_rounds: 2
  after_rounds: escalar a PABLO_INPUT_NEEDED.md con decision, opciones y recomendacion
owners:
  - claude
  - codex
  - shared
  - pablo
status_values:
  - backlog
  - in_progress
  - review
  - blocked
