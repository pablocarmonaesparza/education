# Schema de ensamble de casos · v1.0.0
#
# Define el formato canonico para ensamblar un caso Itera como Lego:
# 5 secciones × 5 diapositivas = 25 slides por caso. Cada slide referencia
# un block_id del catalogo (EXERCISE_BLOCK_CATALOG.yaml v0.11.0) y trae el
# content especifico del caso.
#
# Usar junto con:
#   - TEMPLATES_CATALOG.md (referencia legible de los 17 templates)
#   - EXERCISE_BLOCK_CATALOG.yaml (fuente canonica de templates + knobs)
#   - CASE_HIG.md (niveles N1/N2/N3, anti-patrones)
#   - CASE_RUBRIC_V1.md (pesos de dimensiones por nivel)
#
# Este schema reemplaza el campo steps[] del CASE_SCHEMA viejo cuando
# se autora con el formato ensamblado. Casos viejos siguen siendo validos
# en su formato hasta que se migren.

case_assembly_schema:
  version: 1.0.0
  status: canonical
  source_route: /case/[case_id]

  # PROCEDENCIA · el caso ensamblado (cases_assembled/*.yaml) es la FUENTE DE
  # VERDAD. El demo /case-demo se GENERA de este YAML
  # (scripts/simulador/generate-case-demo.mjs emite app/case-demo/case-data.generated.ts,
  # wireado a predev/prebuild). No editar los artefactos generados a mano: se
  # edita el YAML y se regenera. Asi la generacion automatica de casos (formulario
  # de la empresa -> research del agente -> caso) produce el mismo formato que el
  # demo. El validador check-assembled-case.mjs rechaza el caso si rompe las
  # reglas duras de abajo.

  # ============================================================
  # REGLAS DURAS
  # Si una regla se rompe, el caso no entra a produccion.
  # ============================================================

  rules:
    sections_required: 5
    section_names:
      - contexto
      - datos
      - ia
      - revision
      - cierre
    slides_per_section: 5
    total_slides: 25

    first_slide:
      section: contexto
      slot: 1
      block_id: case_cover

    last_section_must_close_with:
      block_ids: [tradeoff_decision_memo, dashboard_pivot, workflow_builder]
      slot: 5

    ai_native_ratio_min: 0.60   # 60% de los 25 slides minimo
    passive_ratio_max: 0.40     # 40% maximo

    at_least_one_active_per_section_except: [contexto]
    # contexto puede ser 100% pasivos (onboarding al caso)

    no_prefill:
      enforced_per_block: true
      # cada bloque arranca con emptyPayload() del registry. El content
      # del caso no puede traer respuestas, decisiones, memos u outputs
      # pre-rellenados.

    # P0 · CEREBRO · no enseñar antes de medir (DIAGNOSTICO_1_CASO_V0 §7)
    # Cualquier elemento UI que revele la respuesta correcta antes de la
    # captura debe eliminarse. Estos campos del block_content NO se
    # renderizan al usuario · el shell los remueve (stripJudgeFields)
    # antes de pasar el caseContext al renderer.
    judge_internal_fields:
      categorize_rows: [hint, example]      # rows[].hint, rows[].example
      ai_output_review: [issue]             # segments[].issue
      reading_kpi_cards: [goodWhen]         # kpis[].delta.goodWhen

    # CAMPOS FUNCIONALES · metadata del judge que el BLOQUE necesita en
    # runtime (no se renderizan al usuario, pero NO se remueven · borrarlos
    # rompe la lógica del bloque). Distinto de judge_internal_fields.
    block_functional_fields:
      ai_output_review: [flagIfMarked]      # segments[].flagIfMarked · qué
        # flag asigna el bloque cuando el usuario marca el segmento.
    # NOTA cerebro: el diseño actual de ai_output_review predefine el flag
    # por segmento (mide IDENTIFICACIÓN del segmento problemático). Una
    # mejora futura haría que el participante ELIJA el tipo de flag (mide
    # identificación + clasificación) · eliminaría este campo del cliente.

    # LIMITACIÓN client-side conocida · en la vitrina /case-demo el array
    # SLIDES completo se serializa al bundle, así que judge_internal_fields
    # están en el JavaScript (no en pantalla, sí en devtools). El runtime
    # productivo (/case/[case_id]) los mantiene server-side · ver
    # migration_notes.runtime_bridge al final de este schema.

    # P2.1 · Niveles permitidos por bloque (derivado de EXERCISE_BLOCK_CATALOG.yaml).
    # El validador rechaza el caso si un block_id se usa fuera de su nivel.
    block_level_constraints:
      case_cover:               [N1, N2, N3]
      reading_passive:          [N1, N2, N3]
      reading_message:          [N1, N2, N3]
      reading_data_table:       [N1, N2, N3]
      reading_image:            [N1, N2, N3]
      reading_kpi_cards:        [N1, N2, N3]
      reading_timeline:         [N1, N2, N3]
      reading_attachment:       [N1, N2, N3]
      ai_textfield_free:        [N1, N2]
      ai_textfield_guided:      [N1, N2]
      model_tradeoff_sliders:   [N1, N2, N3]
      categorize_rows:          [N1, N2, N3]
      ai_output_review:         [N1, N2, N3]
      ai_comparison:            [N1, N2]
      workflow_builder:         [N2]
      dashboard_pivot:          [N2, N3]
      tradeoff_decision_memo:   [N1, N2, N3]

    # P2.2 · Secciones permitidas por bloque. ESTA es la AUTORIDAD para casos
    # ensamblados (modelo de 5 secciones). Se derivo del runtime_sections del
    # catalogo remapeando las 6 secciones viejas a 5 (Decision + Respuesta ->
    # cierre). Si difiere del runtime_sections del EXERCISE_BLOCK_CATALOG, manda
    # esta lista, no el catalogo (el catalogo describe el runtime productivo
    # legacy de 6 secciones, todavia sin migrar). El validador
    # check-assembled-case.mjs rechaza el caso si un block_id se usa en una
    # seccion no permitida por esta lista.
    block_section_constraints:
      case_cover:               [contexto]
      reading_passive:          [contexto, datos, ia, revision, cierre]
      reading_message:          [contexto, datos, revision]
      reading_data_table:       [contexto, datos]
      reading_image:            [contexto, datos, revision]
      reading_kpi_cards:        [contexto, datos]
      reading_timeline:         [contexto]
      reading_attachment:       [contexto, datos]
      ai_textfield_free:        [datos, ia, cierre]
      ai_textfield_guided:      [ia]
      # model_tradeoff_sliders · DIAGNOSTICO_1_CASO_V0 línea 186:
      # "No es selector de modelos. El modelo es instrumento."
      # Por eso NO se permite en seccion ia · solo como ejercicio
      # standalone antes del beat IA principal.
      model_tradeoff_sliders:   [datos]
      categorize_rows:          [contexto, datos, ia, revision, cierre]
      ai_output_review:         [ia, revision, cierre]
      ai_comparison:            [revision, cierre]
      workflow_builder:         [ia, cierre]
      dashboard_pivot:          [cierre]
      tradeoff_decision_memo:   [cierre]

    # P1.1 · Completion criteria · el shell bloquea Continuar hasta que
    # el payload del slide satisface su predicate. Implementacion en
    # lib/simulador/exercise-completion.ts.
    completion_criteria:
      case_cover:               "started_at !== null"
      reading_passive:          "acknowledged === true (auto al montar)"
      reading_message:          "acknowledged === true"
      reading_data_table:       "acknowledged === true"
      reading_image:            "acknowledged === true"
      reading_kpi_cards:        "acknowledged === true"
      reading_timeline:         "acknowledged === true"
      reading_attachment:       "acknowledged === true"
      ai_textfield_free:        "prompt_text.trim().length > 0"
      ai_textfield_guided:      "objetivo + audiencia + limites + modelo + generated_prompt"
      model_tradeoff_sliders:   "3 sliders movidos + recomendado + rationale_text no vacio"
      categorize_rows:          "todas las row_actions con action !== null"
      ai_output_review:         "al menos un segmento con flag !== null"
      ai_comparison:            "selected_output !== null"
      workflow_builder:         "step_order.length > 0 + rationale_text no vacio"
      dashboard_pivot:          "selected_filter !== null + leader_takeaway no vacio"
      tradeoff_decision_memo:   "decision no vacia + memo no vacio"

    # P0.2 · Pantalla de cierre · la unidad publica es la BANDA
    # alto/medio/bajo. Score numerico solo existe internamente para
    # calibracion · NUNCA se renderiza al usuario o al manager.
    closing_screen:
      public_unit: band         # alto | medio | bajo
      public_score: false       # numerico nunca se publica (DIAGNOSTICO_1_CASO_V0 §8)
      risk_events_require_evidence: true  # cita textual del payload del usuario
      recommendation_actions: [pilotar, entrenar, pausar, escalar]

  # ============================================================
  # CONVENCIONES DE COPY (aplican a todos los strings de content)
  # Fuentes: docs/memory/copy_*.md
  # ============================================================

  copy_rules:
    - "Cero acronimos en prosa (escribir 'inteligencia artificial' no 'IA' en cuerpo de texto)"
    - "IA en mayusculas SOLO cuando es label corto o chip (ej. boton 'Pedirle a la IA')"
    - "Cero em dash; usar punto, coma o parentesis"
    - "Singulares: API, MCP; con s solo Skills (nombre propio de Anthropic)"
    - "Body markdown con bold en datos criticos (fechas, numeros, decisiones)"
    - "Lowercase en prosa salvo nombres propios, inicios despues de punto"
    - "Nada de gamificacion, felicitacion o emojis durante el caso"

  # ============================================================
  # ESTRUCTURA DE UN CASO ENSAMBLADO
  # ============================================================

  case_structure:
    required_top_level_fields:
      - case_id           # slug unico · ej. marketing_dirty_data_relaunch
      - version           # entero · 1, 2, 3...
      - status            # draft | ready | retired
      - meta              # nivel, perfil, timer, herramientas
      - manager_outcome   # pregunta del manager + brief de asignacion + metricas
      - sections          # array de 5 secciones · cada una con 5 slides

    optional_top_level_fields:
      - rubric_ref        # ej. rubric_case_factory_v1
      - judge_prompt_ref  # judge prompt especifico del caso
      - practice_mapping  # gap → practice_beat
      - resimulation_ref  # apunta a la variante resim del caso

  # ============================================================
  # SHAPE DE meta
  # Lo que case_cover y el shell del runtime leen.
  # ============================================================

  meta_shape:
    level:                # string · "N1 · Fundamentos" | "N2 · Workflow" | "N3 · Agentes"
    profile:              # string · "Marketing" | "Sales" | "Customer Success" | etc.
    profile_pack:         # slug · marketing_growth | sales_revops | customer_success_support | operations_automation | finance_fpa | legal_compliance_privacy
    estimated_minutes:    # number · 12 (N1) | 18 (N2) | 24 (N3)
    timer_seconds:        # number opcional · si esta set, ofrece countdown opcional
    timer_default_on:     # boolean · default false
    tools:                # array · subset de [ai, data, messaging, documents, workflow]

  # ============================================================
  # SHAPE DE manager_outcome
  # ============================================================

  manager_outcome_shape:
    primary_question:     # ej. "Puede esta persona limpiar datos sucios antes de un envio sin perder confianza del cliente?"
    assignment_brief:     # parrafo que dice al manager cuando asignar el caso
    business_metric:      # ej. "tiempo de respuesta a la campana"
    risk_metric:          # ej. "envios con datos personales no autorizados"
    expected_signal:      # ej. "distingue limpieza util de limpieza superficial"
    expected_action:      # primary · entrenar | pilotar | pausar | escalar
    alternatives:         # array · acciones alternativas con criterios

  # ============================================================
  # SHAPE DE sections[]
  # Una entrada por seccion · 5 totales · cada una con 5 slides.
  # ============================================================

  section_shape:
    id:                   # contexto | datos | ia | revision | cierre
    name:                 # nombre humano · "Contexto" | "Datos" | "IA" | "Revisión" | "Cierre"
    slides:               # array de 5 slides exactos

  slide_shape:
    slot:                 # number · 1..5 (posicion dentro de la seccion)
    block_id:             # string · uno de los 17 ids del EXERCISE_BLOCK_CATALOG
    content:              # objeto · debe cumplir los personalization_knobs del block_id

  # ============================================================
  # EJEMPLO ESQUELETO (rellenado en el caso ejemplo)
  # Ver: docs/simulador/contrato_v0/casos/marketing_dirty_data_relaunch_v1.yaml
  # ============================================================

  example_skeleton:
    case_id: marketing_dirty_data_relaunch
    version: 1
    status: draft

    meta:
      level: "N1 · Fundamentos"
      profile: "Marketing"
      profile_pack: marketing_growth
      estimated_minutes: 12
      timer_seconds: 600
      timer_default_on: false
      tools: [ai, data, messaging, documents]

    manager_outcome:
      primary_question: "Puede esta persona limpiar datos sucios y armar un envio responsable antes del lunes?"
      assignment_brief: "Asigna este caso cuando quieras saber si alguien de Marketing operativo puede limpiar una base de contactos, escribir un prompt util a la inteligencia artificial y decidir si lanzar, pilotar o pausar bajo presion de fecha."
      business_metric: "tiempo de respuesta a la campana del lunes"
      risk_metric: "envios con datos personales no autorizados o contactos duplicados"
      expected_signal: "distingue limpieza util de atajo riesgoso"
      expected_action: entrenar
      alternatives: [pilotar, pausar]

    # Beat de referencia (N1). Cada block_id va en una seccion permitida por
    # block_section_constraints y por block_level_constraints. Ratio ai_native:
    # 15/25 = 60% (los pasivos reading_* y el tradeoff_decision_memo traditional
    # no cuentan como ai_native).
    sections:
      - id: contexto
        name: "Contexto"
        slides:
          - { slot: 1, block_id: case_cover,         content: {...} }
          - { slot: 2, block_id: reading_message,    content: {...} }
          - { slot: 3, block_id: reading_data_table, content: {...} }
          - { slot: 4, block_id: reading_kpi_cards,  content: {...} }
          - { slot: 5, block_id: reading_message,    content: {...} }

      - id: datos
        name: "Datos"
        slides:
          - { slot: 1, block_id: categorize_rows,        content: {...} }
          - { slot: 2, block_id: categorize_rows,        content: {...} }
          - { slot: 3, block_id: model_tradeoff_sliders, content: {...} }
          - { slot: 4, block_id: ai_textfield_free,      content: {...} }
          - { slot: 5, block_id: reading_attachment,     content: {...} }

      - id: ia
        name: "IA"
        slides:
          - { slot: 1, block_id: reading_passive,     content: {...} }
          - { slot: 2, block_id: ai_textfield_guided, content: {...} }
          - { slot: 3, block_id: ai_output_review,    content: {...} }
          - { slot: 4, block_id: ai_textfield_free,   content: {...} }
          - { slot: 5, block_id: ai_output_review,    content: {...} }

      - id: revision
        name: "Revisión"
        slides:
          - { slot: 1, block_id: ai_output_review, content: {...} }
          - { slot: 2, block_id: ai_comparison,    content: {...} }
          - { slot: 3, block_id: reading_message,  content: {...} }
          - { slot: 4, block_id: categorize_rows,  content: {...} }
          - { slot: 5, block_id: ai_comparison,    content: {...} }

      - id: cierre
        name: "Cierre"
        slides:
          - { slot: 1, block_id: ai_comparison,          content: {...} }
          - { slot: 2, block_id: ai_textfield_free,      content: {...} }
          - { slot: 3, block_id: categorize_rows,        content: {...} }
          - { slot: 4, block_id: reading_passive,        content: {...} }
          - { slot: 5, block_id: tradeoff_decision_memo, content: {...} }

  # ============================================================
  # VALIDACION (manual hoy · sync test automatizado a futuro)
  # ============================================================

  validation_checklist:
    structural:
      - "sections.length === 5"
      - "sections[*].slides.length === 5"
      - "sections[*].slides[*].slot in [1,2,3,4,5]"
      - "sections[*].id in [contexto, datos, ia, revision, cierre]"
      - "sections[0].id === 'contexto' && sections[0].slides[0].block_id === 'case_cover'"
      - "sections[4].id === 'cierre' && sections[4].slides[4].block_id in [tradeoff_decision_memo, dashboard_pivot, workflow_builder]"

    catalog_alignment:
      - "cada block_id existe en lib/simulador/exercise-blocks.generated.ts"
      - "cada content.* cumple los personalization_knobs del template"
      - "cada section solo usa block_ids cuyo runtime_sections incluya esa seccion (consultar EXERCISE_BLOCK_CATALOG.yaml)"

    ratios:
      - "count(ai_native) / 25 >= 0.60"
      - "count(passive) / 25 <= 0.40"
      - "cada seccion no-contexto tiene >= 1 slide activo"

    copy:
      - "cero acronimos en prosa de content.body, content.prompt, content.title"
      - "cero em dash en strings de content"
      - "IA en mayusculas en labels cortos · 'inteligencia artificial' en prosa"
      - "singulares API, MCP; Skills permitido con s"
      - "body markdown con bold en datos criticos"

  # ============================================================
  # MIGRATION PATH (cerrado en F6 · nota historica)
  # ============================================================

  migration_notes:
    status: |
      Migracion completada en F6 (2026-06-30). Esta seccion queda como
      registro historico; no describe trabajo pendiente.
    from_old_format: |
      Casos viejos como sales_agent_followup_pipeline_v1.yaml usaban
      steps[] con exercise_type por step (uno por seccion) y el runtime
      legacy (RuntimeExperience.tsx) expandia cada step a multiples
      slides hardcodeadas. Ese runtime se elimino del repo en F6.
    runtime_bridge: |
      El loader ya existe: lib/simulador/load-assembled-case.ts lee el
      caso ensamblado (sections[].slides[]) y el runtime actual
      (RuntimeExperienceV2 + ExerciseBlockRenderer) renderiza cada
      bloque por block_id. No queda puente pendiente.
