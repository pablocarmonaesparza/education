case_taxonomy:
  version: 1.0.0
  levels:
    - id: N1
      name: Fundamentos / Prompt Engineering
      short_name: fundamentos
      manager_question: "Puede usar IA en una tarea individual sin crear riesgo?"
      expected_output_types: [prompt, revised_prompt, ai_output_review, short_decision]
    - id: N2
      name: Workflow / Automatiza tu trabajo
      short_name: workflow
      manager_question: "Puede integrar IA en un proceso real con controles?"
      expected_output_types: [workflow_plan, automation_spec, handoff_doc, qa_checklist]
    - id: N3
      name: Agentes / Produccion y optimizacion
      short_name: agentes
      manager_question: "Puede delegar trabajo a agentes con supervision y medicion?"
      expected_output_types: [agent_brief, permission_plan, monitoring_plan, escalation_policy]

  criteria:
    - id: contexto
      public_name: Contexto
      manager_signal: "Entiende objetivo, audiencia, restricciones y exito esperado."
    - id: datos
      public_name: Datos
      manager_signal: "Protege informacion sensible y usa datos con calidad suficiente."
    - id: ejecucion_ia
      public_name: Ejecucion con IA
      manager_signal: "Elige prompt, workflow o agente adecuado para el trabajo."
    - id: validacion
      public_name: Validacion
      manager_signal: "Verifica output, fuentes, consistencia y errores."
    - id: juicio
      public_name: Juicio
      manager_signal: "Detecta riesgos, limites, autoridad y escalamiento."
    - id: impacto
      public_name: Impacto
      manager_signal: "Convierte IA en resultado util para negocio."

  departments:
    - marketing
    - growth
    - sales
    - customer_success
    - operations
    - finance
    - hr
    - legal
    - product
    - engineering_light
    - leadership

  industries:
    - saas_b2b
    - ecommerce
    - fintech
    - education
    - healthcare
    - retail
    - professional_services
    - logistics
    - manufacturing
    - media

  role_families:
    - analyst
    - individual_contributor
    - specialist
    - manager
    - director
    - vp_head
    - founder_operator

  seniority:
    - junior
    - mid
    - senior
    - manager
    - director

  freshness_types:
    - evergreen
    - current
    - hybrid

  risk_event_families:
    - privacy_exposure
    - confidential_strategy_leak
    - hallucinated_fact_or_metric
    - weak_validation
    - automation_without_review
    - agent_overreach
    - copyright_or_ip_risk
    - bias_or_unfair_targeting
    - compliance_escalation_miss
    - cost_or_quota_runaway
    - customer_trust_damage

  manager_actions:
    - pilotar
    - entrenar
    - pausar
    - escalar

