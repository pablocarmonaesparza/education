# Schemas de contenido por bloque (F0 del motor de generación).
#
# El validador estructural (check-assembled-case.mjs) prueba la FORMA MACRO:
# 5x5, ratio, secciones, niveles, primer/último slide. Esto valida el CONTENIDO
# de cada slide contra el contrato de su block_id.
#
# El PREFILL (campos de respuesta del participante) NO se lista aquí: el
# validador prohíbe automáticamente los `default_empty_fields` de cada bloque
# (del EXERCISE_BLOCK_CATALOG), así que cubre todos los campos de payload sin
# listarlos a mano.
#
# Semántica:
#   required_keys:    claves que content DEBE tener (no vacías).
#   min_array:        { clave: n } · si viene, DEBE ser array con >= n elementos.
#   exact_array:      { clave: n } · si viene, DEBE ser array con exactamente n.
#   nested:           sub-contrato para una clave-objeto (si viene, DEBE ser objeto).
#   element_required: { arrayKey: [campos] } · cada elemento del array DEBE
#                     tener esos campos (los que el renderer necesita: id, label,
#                     flagIfMarked, etc.).

block_content_schemas:
  version: 1.1.0

  blocks:

    # ---- Pasivos ----
    case_cover:
      required_keys: [meta]
      nested:
        meta:
          required_keys: [profile, level]
          # tools es opcional; si viene, DEBE ser lista de {kind,label}. Si es
          # un string, CaseCover hace tools.map() y crashea la portada.
          min_array: { tools: 1 }
          element_required:
            tools: [kind, label]

    reading_passive:
      required_keys: [] # title + body en el slide; content opcional.

    reading_message:
      required_keys: [message]
      nested:
        message:
          required_keys: [channel, from, body, timestamp]
          nested:
            from:
              required_keys: [name]

    reading_data_table:
      required_keys: [table]
      nested:
        table:
          required_keys: [columns, rows]
          min_array: { columns: 1, rows: 1 }
          element_required:
            columns: [key, label]
            rows: [] # cada row debe ser un objeto (celdas)

    reading_image:
      # el renderer lee caseContext.image.{src,alt} (no content.src directo).
      required_keys: [image]
      nested:
        image:
          required_keys: [src, alt]

    reading_kpi_cards:
      required_keys: [kpis]
      min_array: { kpis: 1 }
      element_required:
        kpis: [label, value]
      # delta.goodWhen es judge_internal (se remueve).

    reading_timeline:
      required_keys: [events]
      min_array: { events: 1 }
      element_required:
        events: [when, what]

    reading_attachment:
      required_keys: [attachments]
      min_array: { attachments: 1 }
      element_required:
        attachments: [name, kind]

    # ---- AI-native ----
    # forbidden_keys: nombres REALES del payload del participante (no confiar
    # solo en el auto-forbid de default_empty_fields del catálogo, que tiene
    # drift: ej. dice decision_choice pero el payload real es decision/memo).
    ai_textfield_free:
      required_keys: [] # placeholder opcional; el participante escribe.
      forbidden_keys: [prompt_text, response]

    ai_textfield_guided:
      required_keys: [guided]
      forbidden_keys: [selected_objective, selected_audience, selected_limits, selected_model, generated_prompt]
      nested:
        guided:
          required_keys: [objetivos, audiencias, limites]
          min_array: { objetivos: 2, audiencias: 2, limites: 2 }
          string_array_keys: [objetivos, audiencias, limites]

    model_tradeoff_sliders:
      # modelTradeoff opcional (el bloque tiene fallback al lab).
      required_keys: []
      forbidden_keys: [autonomy_priority, security_priority, cost_priority, recommended_model_id, rationale_text]

    categorize_rows:
      required_keys: [actions, rows]
      min_array: { actions: 2, rows: 1 }
      forbidden_keys: [row_actions]
      element_required:
        rows: [id, label] # hint/example son judge_internal (se remueven)
        actions: [value, label]
      element_unique:
        rows: [id] # ids únicos · si no, key duplicada + toggle compartido

    ai_output_review:
      required_keys: [segments]
      min_array: { segments: 2 }
      forbidden_keys: [flagged_segments, correction_request]
      element_required:
        # flagIfMarked es funcional (el bloque lo necesita en runtime · NO se
        # remueve). issue sí es judge_internal.
        segments: [id, text, flagIfMarked]
      element_enum:
        # flagIfMarked debe ser un flag válido del payload (ReviewFlag en
        # lib/simulador/exercise-registry); un flag inventado da 422 en runtime.
        segments: { flagIfMarked: [claim_no_verificado, tono_agresivo, dato_sensible, frase_reutilizable] }
      element_unique:
        segments: [id] # ids únicos

    ai_comparison:
      required_keys: [options]
      # Regla de producto (Pablo): opción múltiple SIEMPRE 4, nunca 3.
      exact_array: { options: 4 }
      forbidden_keys: [selected_output, chosen_output, justification]
      element_required:
        options: [id, body]
      element_enum:
        options: { id: [A, B, C, D] } # el payload espera A|B|C|D
      element_unique:
        options: [id] # A,B,C,D distintos, sin duplicados

    tradeoff_decision_memo:
      required_keys: [decisions]
      min_array: { decisions: 2 }
      forbidden_keys: [decision, memo, decision_choice, rationale_text]
      element_required:
        decisions: [id, title, detail]

    # ---- Bloques que NO consumen content todavía ----
    # workflow_builder y dashboard_pivot no leen caseContext (renderean defaults
    # hardcodeados). No se les exige content para no dar falsa confianza: un
    # caso que los use renderará contenido demo. Wirearlos a caseContext es
    # trabajo de F1+ (igual que se hizo con ai_textfield_guided y
    # model_tradeoff_sliders). Hasta entonces, evitar estos bloques en casos
    # generados, o aceptarlos como placeholders.
    workflow_builder:
      required_keys: []
      not_data_driven: true

    dashboard_pivot:
      required_keys: []
      not_data_driven: true
