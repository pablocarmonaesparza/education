exercise_block_catalog:
  version: 0.11.0
  status: canonical_after_exercise_lab_review
  source_route: /exercise-lab
  purpose: >
    Catalogo cerrado de interacciones para crear casos Itera sin reinventar
    ejercicios caso por caso. Cada bloque ACTIVO (family ai_native o
    traditional) debe emitir evidencia medible para una o mas dimensiones de
    la rubrica y debe poder mapearse a una seccion del runtime: Contexto,
    Datos, IA, Revision, Decision o Respuesta. Los bloques PASIVOS (family
    passive) no emiten evidencia — solo introducen, contextualizan o cierran
    secciones del runtime con titulo + body + boton continuar.

  product_rules:
    - "El caso controla escenario, presion, datos y resultado esperado; el usuario no configura el examen."
    - "Ningun bloque puede iniciar con respuestas, briefs, decisiones, memos u outputs prellenados."
    - "Cada pantalla presenta una tarea principal, con instrucciones suficientes para actuar."
    - "Los botones usan rectangulos redondeados, no capsulas, salvo tags no interactivos."
    - "Los sliders solo se usan cuando la persona ajusta una prioridad continua entendible; valores en pasos de 10."
    - "El timer existe solo en casos que lo justifican; no cambia el contenido ni la calidad esperada."
    - "Los ejercicios nativos de IA deben ser 60-70% del caso; los ejercicios tradicionales son soporte."
    - "Ningun bloque revela dimensiones, pesos, risk events internos ni respuesta correcta."
    - "Cada bloque user-facing debe caber en viewport 1024x768 antes de marcarse listo."
    - "Cuando una interaccion tenga muchas decisiones, usar disclosure progresivo tipo Typeform."

  selection_recipes:
    N1:
      description: "Fundamentos / Prompt Engineering"
      recommended_blocks: [ai_textfield_free, conversation_response, ai_textfield_guided, categorize_rows, ai_output_review, tradeoff_decision_memo]
      avoid_blocks: []
    N2:
      description: "Workflow / Automatiza tu trabajo"
      recommended_blocks: [ai_textfield_guided, model_tradeoff_sliders, categorize_rows, workflow_builder, ai_output_review, dashboard_pivot, tradeoff_decision_memo]
      avoid_blocks: []
    N3:
      description: "Agentes / Produccion y optimizacion"
      recommended_blocks: [ai_textfield_guided, categorize_rows, workflow_builder, dashboard_pivot, tradeoff_decision_memo]
      avoid_blocks: []

  blocks:
    - id: case_cover
      lab_ref: "00"
      public_name: "Portada del caso"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto]
      when_to_use:
        - "Inicio del caso · pantalla de bienvenida con titulo, contexto y boton Iniciar."
        - "Si el caso usa timer global, este se activa al click en Iniciar (no antes)."
      avoid_when:
        - "El caso no necesita pantalla de inicio (caso muy corto, demo embebida)."
      personalization_knobs:
        - "meta.profile · perfil del caso"
        - "meta.level · dificultad / nivel"
        - "meta.estimatedMinutes · tiempo estimado de lectura/respuesta"
        - "meta.timerEnabled · true/false para activar countdown"
        - "meta.timerSeconds · duracion en segundos si timerEnabled=true"
        - "meta.tools · array de herramientas (ai, data, messaging, documents, workflow)"
        - "ctaLabel · label del boton Iniciar"
      emits: [started_at, timer_seconds]
      ui_pattern: "metadata chips (perfil/nivel/tiempo/timer on-off) + seccion herramientas con iconos + boton Iniciar prominente"
      default_empty_fields: [started_at]
      scoring_method: passive
      completion: "auto al clickear Iniciar"

    - id: reading_passive
      lab_ref: "00A"
      public_name: "Informativa basica"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos, IA, Revision, Decision, Respuesta]
      when_to_use:
        - "Introducir el caso o una seccion sin interaccion."
        - "Recap rapido o instrucciones previas al ejercicio activo."
        - "Cerrar una seccion con un mensaje contextual."
      avoid_when:
        - "El caso necesita evidencia para evaluar; usa un bloque activo."
        - "El body es muy largo y no cabe en viewport sin scroll."
      personalization_knobs: ["titulo", "body markdown"]
      emits: []
      ui_pattern: "titulo + body markdown + boton continuar; sin interaccion"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_message
      lab_ref: "00B"
      public_name: "Informativa mensaje"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos]
      when_to_use:
        - "Mostrar email, chat o ticket que dispara el caso."
        - "Reproducir conversacion de Slack o mensaje del cliente."
        - "Citar comentario de stakeholder con avatar y timestamp."
      avoid_when:
        - "El mensaje requiere respuesta activa; usa un bloque interactivo."
      personalization_knobs:
        - "canal (email, chat, ticket)"
        - "remitente (nombre, rol, avatar)"
        - "destinatario"
        - "timestamp"
        - "subject (opcional)"
        - "body markdown"
      emits: []
      ui_pattern: "titulo + body markdown + card de mensaje con avatar, from/to, timestamp, body"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_data_table
      lab_ref: "00C"
      public_name: "Informativa tabla"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos]
      when_to_use:
        - "Mostrar filas de leads, tickets, transacciones o metricas tabulares."
        - "Dar contexto de datos antes de pedir triage o decision."
      avoid_when:
        - "Se necesita clasificar campos uno por uno; usa data_table_triage activo."
        - "La tabla tiene 30+ filas; usa dashboard o segmentar."
      personalization_knobs:
        - "columnas (key, label, width)"
        - "filas (data)"
        - "caption opcional"
      emits: []
      ui_pattern: "titulo + body markdown + tabla con header sticky y filas"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_image
      lab_ref: "00D"
      public_name: "Informativa imagen"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos, Revision]
      when_to_use:
        - "Mostrar screenshot de dashboard, grafica o UI."
        - "Captura de error o de un reporte estatico."
      avoid_when:
        - "La imagen es decorativa sin aportar contexto."
        - "El detalle es tan denso que necesita zoom interactivo."
      personalization_knobs:
        - "src (url)"
        - "alt (accesibilidad)"
        - "caption (opcional)"
      emits: []
      ui_pattern: "titulo + body markdown + imagen centrada con caption opcional"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_kpi_cards
      lab_ref: "00E"
      public_name: "Informativa KPIs"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos]
      when_to_use:
        - "Situar contexto de negocio con 1-3 metricas grandes."
        - "Mostrar MRR, conversion, churn, NPS antes de pedir analisis."
      avoid_when:
        - "Hay 4+ metricas; usa tabla o dashboard."
        - "Las metricas requieren interpretacion activa; usa dashboard_pivot."
      personalization_knobs:
        - "kpis (value, label, delta opcional con direccion up/down/flat)"
      emits: []
      ui_pattern: "titulo + body markdown + 1-3 cards de KPI con numero grande, label, delta"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_timeline
      lab_ref: "00F"
      public_name: "Informativa cronologia"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto]
      when_to_use:
        - "Mostrar secuencia de eventos del caso en orden cronologico."
        - "Recap rapido de que paso antes de la decision actual."
      avoid_when:
        - "Solo hay 1-2 eventos; usa body markdown plano."
        - "El detalle de cada evento es muy largo; usa multiples slides."
      personalization_knobs:
        - "events (when, what, who opcional)"
      emits: []
      ui_pattern: "titulo + body markdown + linea vertical con dots y eventos cronologicos"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: reading_attachment
      lab_ref: "00G"
      public_name: "Informativa adjunto"
      family: passive
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: []
      runtime_sections: [Contexto, Datos]
      when_to_use:
        - "Adjuntar contrato, brief, presentacion o PDF al caso."
        - "Simular email con archivo adjunto que debe revisarse."
      avoid_when:
        - "El archivo debe abrirse y leerse completo; muestra contenido en otro bloque."
      personalization_knobs:
        - "attachments (name, size, type, description opcional)"
      emits: []
      ui_pattern: "titulo + body markdown + cards de archivo adjunto con icono, nombre, peso"
      default_empty_fields: []
      scoring_method: passive
      completion: "auto al clickear continuar"

    - id: ai_textfield_free
      lab_ref: "01"
      public_name: "Textfield de IA libre"
      family: ai_native
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [contexto, ejecucion_ia, impacto]
      runtime_sections: [IA, Respuesta]
      when_to_use:
        - "Medir como estructura una peticion sin ayudas."
        - "Evaluar claridad de objetivo, audiencia, tono, restricciones y output esperado."
      avoid_when:
        - "Necesitas medir decisiones granulares; usa ai_textfield_guided."
        - "La persona no tiene informacion suficiente del caso."
      personalization_knobs:
        - "modelo disponible"
        - "placeholder"
        - "adjuntos permitidos"
        - "voz"
        - "artefacto de entrada"
      emits: [prompt_text, instruction_quality, constraint_coverage, attachment_usage]
      ui_pattern: "textfield de IA amplio con selector de modelo, voz y adjuntos opcionales"
      default_empty_fields: [prompt_text, attachments, voice_notes]
      scoring_method: llm_judge_with_structured_rubric
      completion: "prompt no vacio con objetivo y al menos una restriccion o criterio de validacion"

    - id: conversation_response
      lab_ref: "02"
      public_name: "Siguiente turno con la IA"
      family: ai_native
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [contexto, ejecucion_ia, juicio]
      runtime_sections: [IA]
      when_to_use:
        - "Hay una conversacion previa entre el participante y un modelo de IA."
        - "Medir como itera con la IA (corregir, profundizar, reformular) a partir del contexto ya visible."
      avoid_when:
        - "No hay turnos previos relevantes; usa ai_textfield_free."
        - "El contexto es respuesta a un humano (cliente/manager); modela como reading_message + ai_textfield_free."
      personalization_knobs:
        - "thread (turnos user/assistant previos)"
        - "modelo de la conversacion (BrandMark)"
        - "modelo del siguiente turno (puede ser distinto al previo)"
        - "placeholder del composer"
      emits: [response_text, model, attachments]
      ui_pattern: "thread con burbujas user/assistant (avatar BrandMark del modelo) + composer al final"
      default_empty_fields: [response_text, attachments]
      scoring_method: llm_judge_with_context_alignment
      completion: "siguiente prompt no vacio con coherencia al thread"

    - id: ai_textfield_guided
      lab_ref: "03"
      public_name: "Textfield de IA guiado"
      family: ai_native
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [contexto, datos, ejecucion_ia, juicio]
      runtime_sections: [Contexto, Datos, IA]
      when_to_use:
        - "Medir decisiones discretas que construyen un prompt o encargo."
        - "Ensenar razonamiento sin permitir edicion libre del output final."
      avoid_when:
        - "Las opciones no tienen tradeoff real."
        - "El caso requiere creatividad abierta sin andamiaje."
        - "Quieres medir ponderacion entre prioridades; usa model_tradeoff_sliders."
      personalization_knobs:
        - "objetivos"
        - "audiencias"
        - "limites del caso"
        - "modelo (manual o referencia desde model_tradeoff_sliders)"
      emits: [selected_objective, selected_audience, selected_limits, selected_model, generated_prompt]
      ui_pattern: "inputs y seleccion progresivos + textfield read-only generado"
      default_empty_fields: [selected_objective, selected_audience, selected_limits, selected_model, generated_prompt]
      scoring_method: deterministic_selection_plus_llm_judge
      completion: "objetivo, audiencia, limites y modelo definidos; prompt generado"

    - id: model_tradeoff_sliders
      lab_ref: "04"
      public_name: "Sliders de tradeoff de modelo"
      family: ai_native
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [juicio, ejecucion_ia]
      runtime_sections: [IA]
      when_to_use:
        - "Medir como el participante pondera autonomia, seguridad y costo para elegir modelo."
        - "Validar criterio de seleccion de modelo bajo restricciones reales."
        - "Anteceder ai_textfield_guided cuando el caso necesita justificar la eleccion."
      avoid_when:
        - "El caso fija el modelo por contrato; no hay decision real."
        - "La eleccion es binaria; usa un toggle simple."
      personalization_knobs:
        - "etiquetas y descripciones de cada slider"
        - "modelos disponibles (catalogo restringido por caso)"
        - "set de modelos recomendados por combinacion"
      emits: [autonomy_priority, security_priority, cost_priority, recommended_model_id]
      ui_pattern: "3 sliders 0-100 en pasos de 10 + modelo recomendado dinamico con BrandMark"
      default_empty_fields: [autonomy_priority, security_priority, cost_priority, recommended_model_id]
      scoring_method: judge_with_priority_coherence_check
      completion: "los 3 sliders movidos al menos una vez + modelo recomendado confirmado"

    - id: categorize_rows
      lab_ref: "05"
      public_name: "Clasificar filas con acción"
      family: ai_native
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [datos, juicio, validacion]
      runtime_sections: [Datos, IA, Decision, Revision]
      when_to_use:
        - "El participante debe clasificar un set de items (campos, acciones, eventos, riesgos) con una accion discreta por item."
        - "Hay riesgo o decision discriminable item por item."
      avoid_when:
        - "Solo hay 1-2 items; usa un toggle simple."
        - "La decision necesita un slider continuo; usa model_tradeoff_sliders."
      personalization_knobs:
        - "filas (items a clasificar)"
        - "acciones disponibles (set de strings)"
        - "actionStyle (neutral, permission, severity) para color de chips"
        - "ejemplos y hints por fila"
      emits: [row_actions]
      ui_pattern: "tabla por item con chips inline de accion (sin dropdown)"
      default_empty_fields: [row_actions]
      scoring_method: depends_on_case_rubric
      completion: "cada item tiene accion elegida"
      # NOTA: reemplaza a data_table_triage, permission_matrix y
      # event_flag_review en v0.10.0 · todos eran el mismo template
      # visual con distinto set de acciones. El caso pasa actions +
      # actionStyle via caseContext.

    - id: ai_output_review
      lab_ref: "06"
      public_name: "Revision de output de IA"
      family: ai_native
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [validacion, juicio]
      runtime_sections: [Revision]
      when_to_use:
        - "La IA produjo algo plausible pero imperfecto."
        - "El participante debe detectar errores antes de usar o enviar."
      avoid_when:
        - "El output es caricaturescamente malo."
        - "No hay riesgos o claims verificables."
      personalization_knobs:
        - "segmentos marcables"
        - "severidad"
        - "correccion esperada"
        - "follow-up con IA"
      emits: [flagged_segments, missed_risks, correction_request]
      ui_pattern: "segmentos seleccionables + follow-up opcional"
      default_empty_fields: [flagged_segments, correction_request]
      scoring_method: risk_event_recall_precision
      completion: "al menos una decision de aceptar, marcar o corregir"

    - id: ai_comparison
      lab_ref: "07"
      public_name: "Comparacion de respuestas"
      family: ai_native
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [validacion, impacto]
      runtime_sections: [Revision, Decision]
      when_to_use:
        - "Hay dos o tres outputs plausibles con tradeoffs reales."
        - "Quieres medir criterio de calidad, no gusto estetico."
      avoid_when:
        - "Una opcion es obviamente correcta o absurda."
        - "El participante no puede explicar por que eligio."
      personalization_knobs:
        - "numero de outputs"
        - "criterios visibles"
        - "tradeoffs"
        - "justificacion corta"
      emits: [chosen_output, justification, quality_tradeoff]
      ui_pattern: "dos o tres respuestas comparables + justificacion"
      default_empty_fields: [chosen_output, justification]
      scoring_method: llm_judge_with_expected_signals
      completion: "respuesta elegida y razon breve"

    - id: workflow_builder
      lab_ref: "08"
      public_name: "Workflow builder"
      family: ai_native
      levels: [N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa]
      primary_dimensions: [ejecucion_ia, validacion, impacto]
      runtime_sections: [IA, Revision]
      when_to_use:
        - "El caso mide handoffs, checkpoints y responsabilidad dentro de un flujo."
        - "La IA participa en un proceso, no en una tarea aislada."
      avoid_when:
        - "El flujo se reduce a escribir un prompt."
        - "No hay revision humana o entrega definida."
      personalization_knobs:
        - "pasos"
        - "orden"
        - "herramientas"
        - "checkpoints"
        - "salida del flujo"
      emits: [workflow_steps, checkpoints, handoff_plan]
      ui_pattern: "pasos activables, ordenables o conectados"
      default_empty_fields: []
      scoring_method: workflow_integrity_rules
      completion: "flujo tiene entrada, uso de IA, revision y salida"

    # NOTA: agent_brief_builder fue eliminado en v0.10.0 · era el mismo template
    # que ai_textfield_guided (stepper con subsecciones de single-select).
    # Si el caso necesita brief de agente con 4 preguntas (tarea/acceso/
    # accion/paro), configura ai_textfield_guided con esas preguntas via
    # caseContext.
    # run_log_review fue consolidado en event_flag_review en v0.7.0.

    - id: dashboard_pivot
      lab_ref: "09"
      public_name: "Dashboard / pivot"
      family: traditional_business_signal
      levels: [N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa]
      primary_dimensions: [impacto, contexto]
      runtime_sections: [Decision, Respuesta]
      when_to_use:
        - "El participante debe leer una senal de negocio y decidir que llevar al lider."
        - "Hay metricas con caveats, filtros o segmentacion."
      avoid_when:
        - "El dashboard no fuerza una decision."
        - "Las metricas son decorativas o irrelevantes."
      personalization_knobs:
        - "metricas"
        - "tablas"
        - "filtros"
        - "cohortes"
        - "comparativos"
        - "caveats"
      emits: [selected_signal, leader_takeaway, metric_caveats]
      ui_pattern: "tabla o dashboard filtrable con senal para lider"
      default_empty_fields: [selected_signal, leader_takeaway]
      scoring_method: manager_signal_alignment
      completion: "senal elegida y takeaway declarado"

    - id: tradeoff_decision_memo
      lab_ref: "10"
      public_name: "Decision con ventajas y costos + memo"
      family: traditional_closure
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [juicio, impacto, contexto]
      runtime_sections: [Decision, Respuesta]
      when_to_use:
        - "Cerrar el caso con una recomendacion responsable."
        - "Medir si la persona entiende consecuencias, riesgos aceptados y siguiente paso."
      avoid_when:
        - "Solo quieres medir redaccion."
        - "Las opciones de decision no tienen costos reales."
      personalization_knobs:
        - "opciones de decision"
        - "consecuencias"
        - "longitud del memo"
        - "audiencia del memo"
      emits: [decision_choice, rationale_text, leader_action_signal]
      ui_pattern: "opciones con consecuencias + memo corto"
      default_empty_fields: [decision_choice, rationale_text]
      scoring_method: llm_judge_with_override_matrix
      completion: "opcion elegida y memo no vacio"
