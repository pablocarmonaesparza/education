exercise_block_catalog:
  version: 0.1.0
  status: draft_for_pablo_review
  purpose: >
    Catalogo cerrado de interacciones para crear casos Itera sin reinventar
    ejercicios caso por caso. Cada bloque debe emitir evidencia medible para
    una o mas dimensiones de la rubrica.

  product_rules:
    - "El caso controla escenario, presion, datos y resultado esperado; el usuario no configura el examen."
    - "Cada pantalla presenta una tarea principal, con instrucciones suficientes para actuar."
    - "Los botones usan rectangulos redondeados, no capsulas, salvo componentes nativos donde el patron sea inevitable."
    - "Los sliders solo se usan cuando la persona ajusta una prioridad continua entendible; valores en pasos de 10."
    - "El timer existe solo en casos que lo justifican; no cambia el contenido ni la calidad esperada."
    - "Los ejercicios nativos de IA deben ser 60-70% del caso; los ejercicios tradicionales son soporte."
    - "Ningun bloque revela dimensiones, pesos, risk events internos ni respuesta correcta."

  blocks:
    - id: prompt_textfield
      public_name: Textfield de IA
      family: ai_native
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [contexto, ejecucion_ia, impacto]
      emits: [prompt_text, instruction_quality, constraint_coverage]
      ui_pattern: "textarea amplio + botones de insercion + preview"
      scoring_method: llm_judge_with_structured_rubric
      completion: "prompt no vacio, objetivo declarado y al menos un limite de datos o validacion"

    - id: data_table_triage
      public_name: Tabla editable de datos
      family: traditional_plus_ai_context
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [datos, juicio]
      emits: [field_actions, minimization_decisions, privacy_flags]
      ui_pattern: "tabla por campo con accion usar/anonimizar/agregar/excluir"
      scoring_method: deterministic_rules_plus_judge_notes
      completion: "cada campo tiene accion elegida"

    - id: permission_matrix
      public_name: Matriz de permisos
      family: ai_native
      levels: [N2, N3]
      profiles: [sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [datos, ejecucion_ia, juicio]
      emits: [permission_plan, blocked_actions, review_gates]
      ui_pattern: "filas de acciones x permitir/revisar/bloquear"
      scoring_method: deterministic_overrides_for_high_risk_actions
      completion: "todas las acciones tienen permiso declarado"

    - id: ai_output_review
      public_name: Revision de output de IA
      family: ai_native
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [validacion, juicio]
      emits: [flagged_segments, missed_risks, correction_request]
      ui_pattern: "segmentos seleccionables + follow-up opcional"
      scoring_method: risk_event_recall_precision
      completion: "al menos una decision de aceptar, marcar o corregir"

    - id: ai_comparison
      public_name: Comparacion de respuestas
      family: ai_native
      levels: [N1, N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [validacion, impacto]
      emits: [chosen_output, justification, quality_tradeoff]
      ui_pattern: "dos o tres respuestas comparables + justificacion"
      scoring_method: llm_judge_with_expected_signals
      completion: "respuesta elegida y razon breve"

    - id: workflow_builder
      public_name: Workflow builder
      family: ai_native
      levels: [N2]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa]
      primary_dimensions: [ejecucion_ia, validacion, impacto]
      emits: [workflow_steps, checkpoints, handoff_plan]
      ui_pattern: "pasos activables, ordenables o conectados"
      scoring_method: workflow_integrity_rules
      completion: "flujo tiene entrada, uso de IA, revision y salida"

    - id: agent_brief_builder
      public_name: Brief para agente
      family: ai_native
      levels: [N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation]
      primary_dimensions: [ejecucion_ia, juicio, datos]
      emits: [agent_goal, allowed_tools, blocked_actions, fallback_policy]
      ui_pattern: "objetivo + permisos + limites + fallback"
      scoring_method: deterministic_overrides_plus_llm_judge
      completion: "objetivo, permisos y fallback definidos"

    - id: run_log_review
      public_name: Revision de logs
      family: ai_native
      levels: [N2, N3]
      profiles: [sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [validacion, juicio]
      emits: [flagged_log_events, incident_type, escalation_need]
      ui_pattern: "timeline de eventos con marcacion de incidentes"
      scoring_method: risk_event_recall_precision
      completion: "eventos relevantes marcados o descartados"

    - id: dashboard_pivot
      public_name: Dashboard / pivot
      family: traditional_business_signal
      levels: [N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa]
      primary_dimensions: [impacto, contexto]
      emits: [selected_signal, manager_takeaway, metric_caveats]
      ui_pattern: "tabla o dashboard filtrable con senal para manager"
      scoring_method: manager_signal_alignment
      completion: "senal elegida y takeaway declarado"

    - id: tradeoff_decision_memo
      public_name: Decision con ventajas y costos + memo
      family: traditional_closure
      levels: [N1, N2, N3]
      profiles: [marketing_growth, sales_revops, customer_success_support, operations_automation, finance_fpa, legal_compliance_privacy]
      primary_dimensions: [juicio, impacto, contexto]
      emits: [decision_choice, rationale_text, manager_action_signal]
      ui_pattern: "opciones con consecuencias + memo corto"
      scoring_method: llm_judge_with_override_matrix
      completion: "opcion elegida y memo no vacio"
