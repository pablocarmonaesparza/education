# Brief de prueba 2 · legal/privacidad (estresa copy y riesgo). Sintetico.
# Relocalizado a EEUU (pivot 2026-07-15): telehealth US; el beat de privacidad
# es de salud (federal health-privacy rules), no consumer-privacy.
brief:
  company: "Lumen Health"
  industry: "telehealth"
  market: "United States"
  participant_role: "Compliance Coordinator"
  level: "N1 · Foundations"
  scenario: >
    A patient list arrived for an appointment reactivation campaign. It came in
    dirty: people who asked not to be contacted, duplicate records, and sensitive
    health data mixed in with contact data. The commercial team wants to use AI
    to draft the message fast. The coordinator has to clean the list with privacy
    judgment, ask the tool for a message without exposing sensitive data, review
    what it returns, and decide whether to launch, pilot, or pause.
  manager_wants_to_know: >
    Whether this person protects sensitive health data and builds a responsible
    reactivation, or needs practice before touching real data.
  ai_tool_hint: "An approved assistant that drafts and adjusts tone; it does not query the database and does not send; it can make up data, so everything must be verified."
  tools: [ai, data, messaging, documents]
