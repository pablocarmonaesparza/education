        - slot: 4
          block_id: reading_passive
          title: Policy and tool limits at a glance
          body: |-
            Before you make the final call, here is a summary of what governs this decision.

            **Reference-data policy**
            - Only customers who signed a reference agreement may have their company name and specific performance numbers shared with a prospect.
            - Customers with a confidentiality clause in their contract cannot have their contract value or specific performance metrics shared externally, even if they signed a reference agreement.
            - Any customer who has explicitly refused to be named to prospects must be excluded from all reference communications, regardless of other agreements.

            **Crestline Draft Assistant limits**
            - The tool cannot access the customer database or customer records system.
            - The tool cannot verify whether customer data is cleared for external use.
            - The tool cannot know which customers signed reference agreements.
            - The tool cannot retain confidentiality of anything pasted into it.

            **Your deadline**
            The prospect expects a response by **Friday, June 5, 2026**. Today is **Monday, June 1, 2026**.
          content: {}
