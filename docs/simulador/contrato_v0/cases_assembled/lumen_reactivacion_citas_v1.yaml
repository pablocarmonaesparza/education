# Caso ensamblado · lumen_reactivacion_citas (autorado por Claude como el motor,
# siguiendo el pipeline: biblia -> blueprint por receta N1 -> 25 slides).
# Biblia (hechos canonicos):
#   Empresa: Lumen Salud (telemedicina, LATAM). Rol: Coordinador de Cumplimiento.
#   Renata Solis: Directora de Operaciones Clinicas. Asigna y recibe. Nunca destinataria.
#   Oscar Levano: Asesor de Privacidad. Levanta el ticket; su queja se cierra.
#   Asistente Lumen: la IA. Redacta y ajusta tono; no consulta la base ni envia;
#     puede inventar datos, hay que validar. Instrumento dado, no se elige.
#   Destinatario del mensaje: SIEMPRE un segmento de pacientes. Nunca Renata.
#   Hoy lunes 1 de junio de 2026. Ultima campana 15 de abril. Deadline viernes 5 de junio.
#   Metricas base: reactivacion de citas 4.2%, quejas/bajas 1.5%, rebote 2%.

case_assembly:
  case_id: lumen_reactivacion_citas
  version: 1
  status: draft
  schema_version: 1.0.0

  meta:
    level: "N1 · Fundamentos"
    profile: "Cumplimiento"
    profile_pack: legal_compliance_privacy
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "¿Puede esta persona limpiar una lista de pacientes con criterio de privacidad y armar una reactivación de citas responsable, sin exponer datos de salud?"
    assignment_brief: "Asigna este caso cuando quieras saber si alguien de Cumplimiento puede dejar limpia una lista de pacientes (consentimiento, rebotes, duplicados, datos de salud), pedirle a la inteligencia artificial un mensaje útil sin filtrar información sensible, revisar lo que devuelve y decidir si lanzar, pilotar o pausar. El resultado te dice si puede operar campañas con criterio o necesita práctica antes de tocar datos reales de pacientes."
    business_metric: "reactivación de citas a 30 días"
    risk_metric: "correos a pacientes que pidieron baja o uso de datos de salud sin transformar"
    expected_signal: "distingue limpieza con criterio de atajo riesgoso"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:

    - id: contexto
      name: "Contexto"
      slides:
        - slot: 1
          block_id: case_cover
          title: "Reactivar citas, con la lista como llegó."
          body: "Trabajas en **Lumen Salud**. Tu jefa te pidió **reactivar las citas** de pacientes inactivos antes del **viernes 5 de junio**. La lista llegó con duplicados, gente que pidió darse de baja, correos que ya rebotan y, en algunos registros, **datos de salud** mezclados. Tú decides qué se limpia, qué le pides a la inteligencia artificial y qué le entregas a tu jefa."
          content:
            meta:
              profile: "Cumplimiento"
              level: "N1 · Fundamentos"
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - { kind: ai, label: "Inteligencia artificial" }
                - { kind: data, label: "Tablas" }
                - { kind: messaging, label: "Mensajería" }
                - { kind: documents, label: "Documentos" }

        - slot: 2
          block_id: reading_message
          title: "Renata te asigna la reactivación."
          body: "Léelo completo. Lo que pide aquí es lo que vas a entregar al final."
          content:
            message:
              channel: email
              from: { name: "Renata Solís", role: "Directora de Operaciones Clínicas · Lumen Salud" }
              to: { name: "Tú", role: "Coordinador de Cumplimiento" }
              timestamp: "Hoy, 9:30"
              subject: "Reactivamos citas esta semana"
              body: "Hola. Esta semana **reactivamos las citas** de pacientes inactivos, y cierra el **viernes 5 de junio**. La lista que te paso viene con problemas, así que el primer trabajo es dejarla limpia y sin exponer datos de salud. Cuando la tengas, mándame una propuesta con tres cosas: los **segmentos** a los que les vas a escribir, el **mensaje base** que les llega, y las **métricas que vas a monitorear** para saber si funcionó."

        - slot: 3
          block_id: reading_data_table
          title: "La lista de pacientes, como llegó."
          body: "Ocho registros. Mira el **consentimiento**, la **entregabilidad** y si hay **condición de salud** anotada (ese dato no puede salir de aquí)."
          content:
            table:
              caption: "Lista de reactivación · 1 de junio de 2026"
              columns:
                - { key: nombre, label: "Nombre" }
                - { key: ultima_cita, label: "Última cita" }
                - { key: consentimiento, label: "Consentimiento" }
                - { key: entregabilidad, label: "Entregabilidad" }
                - { key: condicion, label: "Condición anotada" }
              rows:
                - { nombre: "Paula Restrepo", ultima_cita: "2026-03-10", consentimiento: "activo", entregabilidad: "ok", condicion: "ninguna" }
                - { nombre: "Tomás Iglesias", ultima_cita: "2025-12-02", consentimiento: "activo", entregabilidad: "ok", condicion: "diabetes" }
                - { nombre: "Lucía Fonseca", ultima_cita: "2026-04-01", consentimiento: "revocado", entregabilidad: "ok", condicion: "ninguna" }
                - { nombre: "Bruno Salas", ultima_cita: "2026-02-18", consentimiento: "activo", entregabilidad: "rebota", condicion: "ninguna" }
                - { nombre: "Mariela Cano", ultima_cita: "2026-01-20", consentimiento: "baja_solicitada", entregabilidad: "ok", condicion: "ninguna" }
                - { nombre: "Iván Duarte", ultima_cita: "2026-03-22", consentimiento: "activo", entregabilidad: "ok", condicion: "ninguna" }
                - { nombre: "Paula Restrepo", ultima_cita: "2026-03-10", consentimiento: "activo", entregabilidad: "ok", condicion: "ninguna" }
                - { nombre: "Marcos Villa", ultima_cita: "2025-08-05", consentimiento: "nunca_confirmado", entregabilidad: "ok", condicion: "ninguna" }

        - slot: 4
          block_id: reading_kpi_cards
          title: "Cómo venía la reactivación en abril."
          body: "Estos son los números base. El de en medio es **el que hay que superar**."
          content:
            kpis:
              - { label: "Reactivación de citas a 30 días", value: "4.2%", delta: { direction: flat, label: "el número a superar", goodWhen: "más alto" } }
              - { label: "Quejas y bajas", value: "1.5%", delta: { direction: flat, label: "el número a cuidar", goodWhen: "más bajo" } }
              - { label: "Rebote de correos", value: "2%", delta: { direction: flat, label: "higiene de la lista", goodWhen: "más bajo" } }

        - slot: 5
          block_id: reading_message
          title: "Óscar, de Privacidad, levanta una queja."
          body: "Léelo. Esto fija una regla que no se negocia."
          content:
            message:
              channel: email
              from: { name: "Óscar Lévano", role: "Asesor de Privacidad · Lumen Salud" }
              to: { name: "Tú", role: "Coordinador de Cumplimiento" }
              timestamp: "Hoy, 9:50"
              subject: "Cuidado con la lista de pacientes"
              body: "Vi que vas a reactivar citas. Dos cosas que reviso siempre: quien **revocó** o pidió **baja** se excluye, sin excepción. Y la **condición de salud** de un paciente jamás sale en un correo ni se le pasa a la inteligencia artificial. Si algo de eso se va, es un problema serio."

    - id: datos
      name: "Datos"
      slides:
        - slot: 1
          block_id: categorize_rows
          title: "Decide qué haces con cada paciente."
          body: "Por cada uno: **usar**, **excluir** o **escalar** si tienes duda. Recuerda la regla de Óscar."
          content:
            actions:
              - { value: usar, label: "Usar" }
              - { value: excluir, label: "Excluir" }
              - { value: escalar, label: "Escalar" }
            rows:
              - { id: p1, label: "Paula Restrepo · activo · entrega ok", hint: "Caso claro de usar.", example: "Activa, sin condición anotada." }
              - { id: p3, label: "Lucía Fonseca · consentimiento revocado", hint: "Excluir siempre (regla de Óscar).", example: "Revocó el consentimiento." }
              - { id: p4, label: "Bruno Salas · el correo rebota", hint: "Excluir por entregabilidad.", example: "Rebota, no llega." }
              - { id: p5, label: "Mariela Cano · pidió baja", hint: "Excluir siempre.", example: "Baja solicitada." }
              - { id: p7, label: "Paula Restrepo · segundo registro igual", hint: "Escalar: es duplicado.", example: "Aparece dos veces." }

        - slot: 2
          block_id: categorize_rows
          title: "¿Qué campos puede ver la inteligencia artificial?"
          body: "Para cada campo decide: **va al modelo**, **va transformado** o **no va**. La condición de salud no se negocia."
          content:
            actions:
              - { value: va, label: "Va al modelo" }
              - { value: transformado, label: "Va transformado" }
              - { value: no_va, label: "No va" }
            rows:
              - { id: c_nombre, label: "Nombre del paciente", hint: "Transformado: usa un saludo genérico.", example: "Mejor 'Hola' que el nombre completo." }
              - { id: c_correo, label: "Correo electrónico", hint: "No va: el modelo no necesita el correo.", example: "El envío es aparte." }
              - { id: c_condicion, label: "Condición de salud anotada", hint: "No va, nunca.", example: "Dato sensible, regla dura." }
              - { id: c_ultima_cita, label: "Fecha de última cita", hint: "Va: ayuda a personalizar sin exponer.", example: "Sirve para el tono." }

        - slot: 3
          block_id: model_tradeoff_sliders
          title: "Ajusta el modelo para datos de pacientes."
          body: "Mueve **autonomía**, **seguridad** y **costo** pensando en que son datos sensibles. No hay respuesta única, hay criterio."
          content:
            modelTradeoff:
              prompt: "Para una lista de pacientes con datos de salud, ¿cuánta autonomía le das a la inteligencia artificial, cuánta seguridad exiges y cuánto costo aceptas?"
              sliderLabels:
                autonomy: "Autonomía"
                security: "Seguridad"
                cost: "Costo"

        - slot: 4
          block_id: ai_textfield_free
          title: "Escribe el límite de uso de datos."
          body: "En una o dos líneas, dile al **Asistente Lumen** qué **no** puede usar de esta lista. Esto va a guiar lo que le pidas después."
          content:
            placeholder: "Por ejemplo: no uses la condición de salud ni el correo; trata el nombre de forma genérica."

        - slot: 5
          block_id: reading_attachment
          title: "La política de datos de pacientes."
          body: "Tres reglas. Las vas a citar más adelante."
          content:
            attachments:
              - { name: "Política de datos de pacientes · Lumen Salud", kind: pdf, description: "1) Quien revocó o pidió baja se excluye siempre. 2) Dos rebotes y se excluye. 3) La condición de salud nunca va al modelo ni al mensaje." }

    - id: ia
      name: "IA"
      slides:
        - slot: 1
          block_id: reading_passive
          title: "Qué es y qué no es el Asistente Lumen."
          body: "El **Asistente Lumen** es la inteligencia artificial aprobada de la empresa. **Redacta** y **ajusta el tono** con lo que le pegas. **No** consulta la lista de pacientes y **no** envía nada. Puede **inventar cifras** o **reintroducir datos** que quitaste, así que todo lo que devuelve hay que validarlo."

        - slot: 2
          block_id: ai_textfield_guided
          title: "Arma el pedido al Asistente Lumen."
          body: "Define **objetivo**, **audiencia** y **límites** del mensaje que quieres. Sé claro con lo que no puede usar."
          content:
            guided:
              objetivos:
                - "Invitar a reactivar una cita médica, con tono cálido y respetuoso."
                - "Recordar que la consulta sigue disponible, sin presionar."
              audiencias:
                - "Pacientes inactivos con consentimiento activo."
                - "Pacientes con cita vencida hace pocos meses."
              limites:
                - "No menciones ninguna condición de salud."
                - "No incluyas el correo ni el nombre completo del paciente."

        - slot: 3
          block_id: ai_output_review
          title: "Primer borrador del Asistente Lumen."
          body: "Léelo con cuidado y marca lo que esté mal. Fíjate en **datos sensibles**, **cifras inventadas** y **tono**."
          content:
            segments:
              - { id: r1, text: "Hola Tomás, vimos que tu control de diabetes quedó pendiente desde diciembre.", flagIfMarked: dato_sensible, issue: "Expone la condición de salud y el nombre." }
              - { id: r2, text: "El 90% de nuestros pacientes ya volvió a agendar este mes.", flagIfMarked: claim_no_verificado, issue: "Cifra inventada, no está en los datos." }
              - { id: r3, text: "Agenda ya o perderás tu lugar para siempre.", flagIfMarked: tono_agresivo, issue: "Tono de presión, inadecuado en salud." }
              - { id: r4, text: "Estamos para acompañarte cuando lo necesites.", flagIfMarked: frase_reutilizable, issue: "Frase de relleno, no aporta." }

        - slot: 4
          block_id: ai_textfield_free
          title: "Dile qué corregir."
          body: "Escríbele al **Asistente Lumen** qué cambiar del borrador anterior. Apunta a lo que marcaste."
          content:
            placeholder: "Por ejemplo: quita cualquier dato de salud, no inventes cifras y baja el tono de urgencia."

        - slot: 5
          block_id: ai_output_review
          title: "Borrador revisado."
          body: "Revisa de nuevo. Aquí lo importante es que el cambio **refleje tu instrucción** y que ya no haya datos sensibles."
          content:
            segments:
              - { id: r5, text: "Hola, queríamos recordarte que tu consulta sigue disponible cuando quieras retomarla.", flagIfMarked: frase_reutilizable, issue: "Está bien; corregido respecto al anterior." }
              - { id: r6, text: "Tu última cita fue hace unos meses; agendar de nuevo toma un minuto.", flagIfMarked: claim_no_verificado, issue: "Usa la fecha de cita, sin exponer salud." }
              - { id: r7, text: "Sabemos que el 100% de los pacientes prefiere este horario.", flagIfMarked: claim_no_verificado, issue: "Otra cifra inventada que se coló." }

    - id: revision
      name: "Revisión"
      slides:
        - slot: 1
          block_id: ai_output_review
          title: "Caza las cifras que no puedes probar."
          body: "Última pasada de revisión. Marca cualquier **número** que no salga de los datos del caso."
          content:
            segments:
              - { id: v1, text: "Nueve de cada diez pacientes vuelven en menos de una semana.", flagIfMarked: claim_no_verificado, issue: "No hay dato que lo respalde." }
              - { id: v2, text: "Tu cita anterior fue en una fecha que tenemos registrada.", flagIfMarked: frase_reutilizable, issue: "Vago, pero no es una cifra falsa." }
              - { id: v3, text: "Somos la clínica número uno del país.", flagIfMarked: claim_no_verificado, issue: "Afirmación sin sustento." }

        - slot: 2
          block_id: ai_comparison
          title: "Elige el cierre del mensaje."
          body: "Cuatro versiones del cierre. Elige la que invita sin presionar y justifica en una línea."
          content:
            options:
              - { id: A, title: "Cálido", body: "Cuando quieras retomar tu consulta, aquí estamos para ayudarte a agendar." }
              - { id: B, title: "Urgente", body: "Agenda hoy mismo, los lugares se acaban rápido." }
              - { id: C, title: "Seco", body: "Ingrese al portal para reservar una cita." }
              - { id: D, title: "Culposo", body: "No dejes tu salud para después, ya pasó demasiado tiempo." }

        - slot: 3
          block_id: reading_message
          title: "Renata responde con una condición."
          body: "Te escribe por chat antes de cerrar."
          content:
            message:
              channel: chat
              from: { name: "Renata Solís", role: "Directora de Operaciones Clínicas" }
              to: { name: "Tú", role: "Coordinador de Cumplimiento" }
              timestamp: "Hoy, 11:20"
              subject: "Antes de lanzar"
              body: "Bien. Antes de lanzar confírmame que excluiste a quien pidió baja, como marcó **Óscar** en su regla, y que el correo lleva un **enlace para darse de baja** visible."

        - slot: 4
          block_id: categorize_rows
          title: "Checklist del mensaje final."
          body: "Por cada parte del correo: **dejar**, **corregir** o **quitar**."
          content:
            actions:
              - { value: dejar, label: "Dejar" }
              - { value: corregir, label: "Corregir" }
              - { value: quitar, label: "Quitar" }
            rows:
              - { id: k_asunto, label: "Asunto: retomar tu consulta", hint: "Dejar: claro y sin presión." }
              - { id: k_saludo, label: "Saludo genérico, sin nombre completo", hint: "Dejar." }
              - { id: k_condicion, label: "Mención de la condición de salud", hint: "Quitar siempre." }
              - { id: k_baja, label: "Enlace para darse de baja", hint: "Dejar: lo pidió Renata." }

        - slot: 5
          block_id: ai_comparison
          title: "Elige la versión final."
          body: "Con el feedback de Renata, elige el mensaje que entregarías. Justifica en una línea."
          content:
            options:
              - { id: A, title: "Cumple todo", body: "Hola, tu consulta sigue disponible cuando quieras retomarla. Agendar toma un minuto. Si prefieres no recibir estos correos, puedes darte de baja aquí." }
              - { id: B, title: "Sin enlace de baja", body: "Hola, tu consulta sigue disponible. Agenda cuando quieras." }
              - { id: C, title: "Con dato de salud", body: "Hola, retomemos el seguimiento de tu condición; agenda tu cita." }
              - { id: D, title: "Con presión", body: "Hola, agenda ya antes de perder tu lugar; es importante." }

    - id: cierre
      name: "Cierre"
      slides:
        - slot: 1
          block_id: ai_comparison
          title: "Elige el segmento al que le escribes."
          body: "Tres segmentos posibles (y uno que no es de envío). Elige y di en una línea por qué."
          content:
            options:
              - { id: A, title: "Inactivos recientes", body: "Pacientes con consentimiento activo y entrega correcta. Caveat: cuida la frecuencia de correos." }
              - { id: B, title: "Cita vencida hace meses", body: "Reactivables claros. Caveat: que abran no significa que agenden." }
              - { id: C, title: "Sin confirmar", body: "Nunca confirmaron consentimiento. No es segmento de envío: elegirlo es el error." }
              - { id: D, title: "Todos juntos", body: "Mezclar incluye a quienes pidieron baja. No se debe." }

        - slot: 2
          block_id: ai_textfield_free
          title: "Escribe el mensaje base."
          body: "Escribe el **mensaje base completo** para el segmento que elegiste. Sin datos de salud, sin cifras inventadas, con enlace de baja."
          content:
            placeholder: "Escribe aquí el mensaje que recibiría el paciente."

        - slot: 3
          block_id: categorize_rows
          title: "Define qué métricas vas a monitorear."
          body: "Por cada métrica: **monitorear** o **ignorar**. Estas cierran la promesa a Renata."
          content:
            actions:
              - { value: monitorear, label: "Monitorear" }
              - { value: ignorar, label: "Ignorar" }
            rows:
              - { id: m_react, label: "Reactivación de citas a 30 días (superar 4.2%)", hint: "Monitorear: es el objetivo." }
              - { id: m_baja, label: "Quejas y bajas (alarma sobre 1.5%)", hint: "Monitorear: es el riesgo." }
              - { id: m_rebote, label: "Rebote de correos (higiene sobre 2%)", hint: "Monitorear." }
              - { id: m_clicks, label: "Color del botón del correo", hint: "Ignorar: no es señal." }

        - slot: 4
          block_id: reading_passive
          title: "Vista previa del correo final."
          body: "Así quedaría el correo al segmento que elegiste, con el **enlace de baja** visible. Si excluiste bien, aquí no aparece nadie que pidió baja."

        - slot: 5
          block_id: tradeoff_decision_memo
          title: "Tu decisión, y por qué."
          body: "Es lo último: la decisión que vas a defender ante Renata, con su costo y su beneficio."
          content:
            decisions:
              - { id: lanzar_lunes, title: "Lanzar ya", detail: "Enviar a todo el segmento hoy. Beneficio: rapidez. Costo: si la limpieza falló, expones datos o escribes a quien pidió baja." }
              - { id: piloto_controlado, title: "Pilotar primero", detail: "Enviar a una parte y medir 24 horas. Beneficio: cazas problemas a tiempo. Costo: un día más." }
              - { id: pausar_y_limpiar, title: "Pausar y limpiar", detail: "Detener hasta cerrar la lista. Beneficio: cero riesgo. Costo: pierdes la ventana de la semana." }
              - { id: pausar_y_escalar, title: "Pausar y escalar a Óscar", detail: "Subir las dudas a Privacidad antes de enviar. Beneficio: respaldo formal. Costo: depende de su tiempo." }
