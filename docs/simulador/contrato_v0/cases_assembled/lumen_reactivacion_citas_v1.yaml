# Caso ensamblado · lumen_reactivacion_citas (autorado por Claude como el motor,
# siguiendo el pipeline: biblia -> blueprint por receta N1 -> 25 slides).
# Contenido relocalizado a EEUU (2026-07-16). Los identificadores NO cambian:
# case_id, section id, slot, block_id, ids de fila/opcion/decision, flagIfMarked,
# actions[].value, claves de columna y enums de BD siguen igual.
# Biblia (hechos canonicos):
#   Empresa: Lumen Health (telemedicina, EEUU). Rol: Compliance Coordinator.
#   Rachel Sloan: Director of Clinical Operations. Asigna y recibe. Nunca destinataria.
#   Owen Lane: Privacy Advisor. Levanta el ticket; su queja se cierra.
#   Lumen Assistant: la IA. Redacta y ajusta tono; no consulta la base ni envia;
#     puede inventar datos, hay que validar. Instrumento dado, no se elige.
#   Destinatario del mensaje: SIEMPRE un segmento de pacientes. Nunca Rachel.
#   Hoy lunes 1 de junio de 2026. Ultima campana 15 de abril. Deadline viernes 5 de junio.
#   Metricas base: reactivacion de citas 4.2%, quejas/bajas 1.5%, rebote 2%.
# Ancla regulatoria EEUU: HIPAA (PHI) para la regla dura de condicion de salud, y
#   CAN-SPAM para el enlace de baja. NO CCPA/CPRA: el glosario §8.4 pide CCPA/CPRA,
#   pero CCPA exime la PHI que maneja un covered entity (Cal. Civ. Code 1798.145(c)),
#   y Lumen es telemedicina. Anclar esto en CCPA seria un error legal que justo el
#   Compliance Coordinator que el caso mide deberia detectar. Desviacion reportada.

case_assembly:
  case_id: lumen_reactivacion_citas
  version: 1
  status: draft
  schema_version: 1.0.0

  meta:
    level: "N1 · Foundations"
    profile: "Compliance"
    profile_pack: legal_compliance_privacy
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "Can this person clean a patient list with privacy judgment and build a responsible appointment reactivation, without exposing health data?"
    assignment_brief: "Assign this case when you want to know whether someone in Compliance can clean up a patient list (consent, bounces, duplicates, health data), ask AI for a useful message without leaking sensitive information, review what comes back, and decide whether to launch, pilot, or pause. The result tells you whether they can run campaigns with judgment or need practice before touching real patient data."
    business_metric: "30-day appointment reactivation"
    risk_metric: "emails to patients who opted out, or health data used without transforming it"
    expected_signal: "tells careful cleanup apart from a risky shortcut"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:

    - id: contexto
      name: "Context"
      slides:
        - slot: 1
          block_id: case_cover
          title: "Reactivate appointments, with the list as it arrived"
          body: "You work at **Lumen Health**. Your manager asked you to **reactivate appointments** for inactive patients before **Friday, June 5**. The list arrived with duplicates, people who asked to opt out, emails that already bounce and, in some records, **health data** mixed in. You decide what gets cleaned, what you ask AI for, and what you hand your manager."
          content:
            meta:
              profile: "Compliance"
              level: "N1 · Foundations"
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - { kind: ai, label: "AI" }
                - { kind: data, label: "Tables" }
                - { kind: messaging, label: "Messaging" }
                - { kind: documents, label: "Documents" }

        - slot: 2
          block_id: reading_message
          title: "Rachel assigns you the reactivation"
          body: "Read it all the way through. What she asks for here is what you deliver at the end."
          content:
            message:
              channel: email
              from: { name: "Rachel Sloan", role: "Director of Clinical Operations · Lumen Health" }
              to: { name: "You", role: "Compliance Coordinator" }
              timestamp: "Today, 9:30 AM"
              subject: "We reactivate appointments this week"
              body: "Hi. This week we **reactivate appointments** for inactive patients, and it closes **Friday, June 5**. The list I am sending you has problems, so the first job is to get it clean, with no health data exposed. Once you have it, send me a proposal with three things: the **segments** you will write to, the **base message** they receive, and the **metrics you will monitor** to know if it worked."

        - slot: 3
          block_id: reading_data_table
          title: "The patient list, as it arrived"
          body: "Eight records. Look at **consent**, **deliverability**, and whether there is a **health condition** noted (that data does not leave this table)."
          content:
            table:
              caption: "Reactivation list · Jun 1, 2026"
              columns:
                - { key: nombre, label: "Name" }
                - { key: ultima_cita, label: "Last appointment" }
                - { key: consentimiento, label: "Consent" }
                - { key: entregabilidad, label: "Deliverability" }
                - { key: condicion, label: "Condition noted" }
              rows:
                - { nombre: "Paula Bennett", ultima_cita: "Mar 10, 2026", consentimiento: "active", entregabilidad: "ok", condicion: "none" }
                - { nombre: "Thomas Ingram", ultima_cita: "Dec 2, 2025", consentimiento: "active", entregabilidad: "ok", condicion: "diabetes" }
                - { nombre: "Laura Fowler", ultima_cita: "Apr 1, 2026", consentimiento: "revoked", entregabilidad: "ok", condicion: "none" }
                - { nombre: "Brian Salter", ultima_cita: "Feb 18, 2026", consentimiento: "active", entregabilidad: "bounces", condicion: "none" }
                - { nombre: "Maria Cannon", ultima_cita: "Jan 20, 2026", consentimiento: "opt-out requested", entregabilidad: "ok", condicion: "none" }
                - { nombre: "Ian Doyle", ultima_cita: "Mar 22, 2026", consentimiento: "active", entregabilidad: "ok", condicion: "none" }
                - { nombre: "Paula Bennett", ultima_cita: "Mar 10, 2026", consentimiento: "active", entregabilidad: "ok", condicion: "none" }
                - { nombre: "Mark Vance", ultima_cita: "Aug 5, 2025", consentimiento: "never confirmed", entregabilidad: "ok", condicion: "none" }

        - slot: 4
          block_id: reading_kpi_cards
          title: "How reactivation ran in April"
          body: "These are the baseline numbers. The first one is **the one to beat**."
          content:
            kpis:
              - { label: "30-day appointment reactivation", value: "4.2%", delta: { direction: flat, label: "the number to beat", goodWhen: "higher" } }
              - { label: "Complaints and opt-outs", value: "1.5%", delta: { direction: flat, label: "the number to protect", goodWhen: "lower" } }
              - { label: "Email bounce rate", value: "2%", delta: { direction: flat, label: "list hygiene", goodWhen: "lower" } }

        - slot: 5
          block_id: reading_message
          title: "Owen, from Privacy, raises a flag"
          body: "Read it. This sets a rule that is not up for negotiation."
          content:
            message:
              channel: email
              from: { name: "Owen Lane", role: "Privacy Advisor · Lumen Health" }
              to: { name: "You", role: "Compliance Coordinator" }
              timestamp: "Today, 9:50 AM"
              subject: "Careful with the patient list"
              body: "I saw you are reactivating appointments. Two things I always check: anyone who **revoked** consent or asked to **opt out** is excluded, no exceptions. And a patient's **health condition** never goes into an email and never goes to AI. That is protected health information under federal privacy rules. If any of that gets out, it is a serious problem."

    - id: datos
      name: "Data"
      slides:
        - slot: 1
          block_id: categorize_rows
          title: "Decide what you do with each patient"
          body: "For each one: **use**, **exclude**, or **escalate** if you are unsure. Remember Owen's rule."
          content:
            actions:
              - { value: usar, label: "Use" }
              - { value: excluir, label: "Exclude" }
              - { value: escalar, label: "Escalate" }
            rows:
              - { id: p1, label: "Paula Bennett · active · delivers ok", hint: "Clear case to use.", example: "Active, no condition noted." }
              - { id: p3, label: "Laura Fowler · consent revoked", hint: "Always exclude (Owen's rule).", example: "Revoked consent." }
              - { id: p4, label: "Brian Salter · the email bounces", hint: "Exclude for deliverability.", example: "Bounces, does not arrive." }
              - { id: p5, label: "Maria Cannon · asked to opt out", hint: "Always exclude.", example: "Opt-out requested." }
              - { id: p7, label: "Paula Bennett · same record, second time", hint: "Escalate: it is a duplicate.", example: "Appears twice." }

        - slot: 2
          block_id: categorize_rows
          title: "What fields can AI see?"
          body: "For each field decide: **goes to the model**, **goes transformed**, or **does not go**. Apply the data policy for this case."
          content:
            actions:
              - { value: va, label: "Goes to the model" }
              - { value: transformado, label: "Goes transformed" }
              - { value: no_va, label: "Does not go" }
            rows:
              - { id: c_nombre, label: "Patient name", hint: "Transformed: use a generic greeting.", example: "'Hi' is better than the full name." }
              - { id: c_correo, label: "Email address", hint: "Does not go: the model does not need the email.", example: "Sending happens separately." }
              - { id: c_condicion, label: "Health condition noted", hint: "Never goes. It is PHI.", example: "Sensitive data, hard rule." }
              - { id: c_ultima_cita, label: "Last appointment date", hint: "Goes: helps personalize without exposing.", example: "Useful for tone." }

        - slot: 3
          block_id: model_tradeoff_sliders
          title: "Tune the model for patient data"
          body: "Move **autonomy**, **security**, and **cost** knowing this is sensitive data. There is no single answer, there is judgment."
          content:
            modelTradeoff:
              prompt: "For a patient list with health data, how much autonomy do you give AI, how much security do you require, and how much cost do you accept?"
              sliderLabels:
                autonomy: "Autonomy"
                security: "Security"
                cost: "Cost"

        - slot: 4
          block_id: ai_textfield_free
          title: "Write the data use limit"
          body: "In one or two lines, tell **Lumen Assistant** what it **cannot** use from this list. This guides what you ask it for next."
          content:
            placeholder: "Write the data use limit here, in one or two lines."

        - slot: 5
          block_id: reading_attachment
          title: "The patient data policy"
          body: "Three rules. You will cite them later."
          content:
            attachments:
              - { name: "Patient data policy · Lumen Health", kind: pdf, description: "1) Anyone who revoked consent or asked to opt out is always excluded. 2) Two bounces and the record is excluded. 3) A health condition never goes to the model or into the message." }

    - id: ia
      name: "AI"
      slides:
        - slot: 1
          block_id: reading_passive
          title: "What Lumen Assistant is and is not"
          body: "**Lumen Assistant** is the company's approved AI. It **drafts** and **adjusts tone** with whatever you paste in. It does **not** query the patient list and does **not** send anything. It can **make up numbers** or **put back data** you removed, so everything it returns has to be verified."

        - slot: 2
          block_id: ai_textfield_guided
          title: "Build your request to Lumen Assistant"
          body: "Define the **goal**, **audience**, and **limits** of the message you want. Be clear about what it cannot use."
          content:
            guided:
              objetivos:
                - "Invite them to reactivate a medical appointment, in a warm and respectful tone."
                - "Remind them the visit is still available, without pressure."
              audiencias:
                - "Inactive patients with active consent."
                - "Patients whose appointment lapsed a few months ago."
              limites:
                - "Do not mention any health condition."
                - "Do not include the patient's email or full name."

        - slot: 3
          block_id: ai_output_review
          title: "First draft from Lumen Assistant"
          body: "Read it carefully and mark what is wrong. Watch for **sensitive data**, **made-up numbers**, and **tone**."
          content:
            segments:
              - { id: r1, text: "Hi Thomas, we saw that your diabetes check-in has been pending since December.", flagIfMarked: dato_sensible, issue: "Exposes the health condition and the name." }
              - { id: r2, text: "90% of our patients have already rebooked this month.", flagIfMarked: claim_no_verificado, issue: "Made-up number, it is not in the data." }
              - { id: r3, text: "Book now or you lose your spot for good.", flagIfMarked: tono_agresivo, issue: "Pressure tone, not appropriate in healthcare." }
              - { id: r4, text: "We are here for you whenever you need us.", flagIfMarked: frase_reutilizable, issue: "Filler line, adds nothing." }

        - slot: 4
          block_id: ai_textfield_free
          title: "Tell it what to fix"
          body: "Write to **Lumen Assistant** with what to change in the draft above. Aim at what you marked."
          content:
            placeholder: "Write what to change in the draft here."

        - slot: 5
          block_id: ai_output_review
          title: "Revised draft"
          body: "Review it again. What matters here is that the change **reflects your instruction** and that the sensitive data is gone."
          content:
            segments:
              - { id: r5, text: "Hi, we wanted to remind you that your visit is still available whenever you want to pick it back up.", flagIfMarked: frase_reutilizable, issue: "This one is fine; corrected from the previous draft." }
              - { id: r6, text: "Your last appointment was a few months ago; rebooking takes a minute.", flagIfMarked: claim_no_verificado, issue: "Uses the appointment date, without exposing health data." }
              - { id: r7, text: "We know 100% of patients prefer this time slot.", flagIfMarked: claim_no_verificado, issue: "Another made-up number that slipped through." }

    - id: revision
      name: "Verification"
      slides:
        - slot: 1
          block_id: ai_output_review
          title: "Hunt the numbers you cannot prove"
          body: "Last review pass. Mark any **number** that does not come from the case data."
          content:
            segments:
              - { id: v1, text: "Nine out of ten patients come back in less than a week.", flagIfMarked: claim_no_verificado, issue: "No data backs it up." }
              - { id: v2, text: "Your previous appointment was on a date we have on record.", flagIfMarked: frase_reutilizable, issue: "Vague, but not a false number." }
              - { id: v3, text: "We are the number one clinic in the country.", flagIfMarked: claim_no_verificado, issue: "Claim with nothing behind it." }

        - slot: 2
          block_id: ai_comparison
          title: "Choose the closing line"
          body: "Four versions of the closing. Choose the one that invites without pressuring and justify it in one line."
          content:
            options:
              - { id: A, title: "Closing 1", body: "Whenever you want to pick your visit back up, we are here to help you book." }
              - { id: B, title: "Closing 2", body: "Book today, spots fill up fast." }
              - { id: C, title: "Closing 3", body: "Kindly access the patient portal to reserve an appointment." }
              - { id: D, title: "Closing 4", body: "Do not put your health off any longer, too much time has passed already." }

        - slot: 3
          block_id: reading_message
          title: "Rachel replies with one condition"
          body: "She messages you on chat before you close."
          content:
            message:
              channel: chat
              from: { name: "Rachel Sloan", role: "Director of Clinical Operations" }
              to: { name: "You", role: "Compliance Coordinator" }
              timestamp: "Today, 11:20 AM"
              subject: "Before we launch"
              body: "Good. Before we launch, tell me how you left the list and what email the patient gets. I want to see your judgment before it goes out."

        - slot: 4
          block_id: categorize_rows
          title: "Final message checklist"
          body: "For each part of the email: **keep**, **fix**, or **remove**."
          content:
            actions:
              - { value: dejar, label: "Keep" }
              - { value: corregir, label: "Fix" }
              - { value: quitar, label: "Remove" }
            rows:
              - { id: k_asunto, label: "Subject: pick your visit back up", hint: "Keep: clear and no pressure." }
              - { id: k_saludo, label: "Generic greeting, no full name", hint: "Keep." }
              - { id: k_condicion, label: "Mention of the health condition", hint: "Always remove." }
              - { id: k_baja, label: "Unsubscribe link", hint: "Keep: Rachel asked for it, and CAN-SPAM requires it." }

        - slot: 5
          block_id: ai_comparison
          title: "Choose the final version"
          body: "With Rachel's feedback, choose the message you would deliver. Justify it in one line."
          content:
            options:
              - { id: A, title: "Version 1", body: "Hi, your visit is still available whenever you want to pick it back up. Booking takes a minute. If you would rather not get these emails, you can unsubscribe here." }
              - { id: B, title: "Version 2", body: "Hi, your visit is still available. Book whenever you want." }
              - { id: C, title: "Version 3", body: "Hi, let's pick your condition follow-up back up; book your appointment." }
              - { id: D, title: "Version 4", body: "Hi, book now before you lose your spot; this matters." }

    - id: cierre
      name: "Close"
      slides:
        - slot: 1
          block_id: ai_comparison
          title: "Choose the segment you write to"
          body: "Four possible segments. Choose the one you would write to and say why in one line."
          content:
            options:
              - { id: A, title: "Recently inactive", body: "Patients with active consent and good deliverability; worth watching how often they get emails." }
              - { id: B, title: "Appointment lapsed months ago", body: "Reactivatable patients; opening does not mean booking." }
              - { id: C, title: "Never confirmed", body: "Patients who never confirmed their consent." }
              - { id: D, title: "All together", body: "Every record received in the original list, unfiltered." }

        - slot: 2
          block_id: ai_textfield_free
          title: "Write the base message"
          body: "Write the **full base message** for the segment you chose. No health data, no made-up numbers, with an unsubscribe link."
          content:
            placeholder: "Write the message the patient would receive here."

        - slot: 3
          block_id: categorize_rows
          title: "Define the metrics you will monitor"
          body: "For each metric: **monitor** or **ignore**. These close the promise you made to Rachel."
          content:
            actions:
              - { value: monitorear, label: "Monitor" }
              - { value: ignorar, label: "Ignore" }
            rows:
              - { id: m_react, label: "30-day appointment reactivation (beat 4.2%)", hint: "Monitor: it is the goal." }
              - { id: m_baja, label: "Complaints and opt-outs (alarm above 1.5%)", hint: "Monitor: it is the risk." }
              - { id: m_rebote, label: "Email bounce rate (hygiene above 2%)", hint: "Monitor." }
              - { id: m_clicks, label: "Color of the button in the email", hint: "Ignore: it is not a signal." }

        - slot: 4
          block_id: reading_passive
          title: "Final email preview"
          body: "This is how the email to the segment you chose would look, with the **unsubscribe link** visible."

        - slot: 5
          block_id: tradeoff_decision_memo
          title: "Your decision, and why"
          body: "This is the last one: the decision you will defend to Rachel, with its cost and its benefit."
          content:
            decisions:
              - { id: lanzar_lunes, title: "Launch now", detail: "Send to the whole segment today. Benefit: speed. Cost: if the cleanup failed, you expose data or write to someone who opted out." }
              - { id: piloto_controlado, title: "Pilot first", detail: "Send to a slice and measure for 24 hours. Benefit: you catch problems in time. Cost: one more day." }
              - { id: pausar_y_limpiar, title: "Pause and clean", detail: "Stop until the list is closed out. Benefit: zero risk. Cost: you lose this week's window." }
              - { id: pausar_y_escalar, title: "Pause and escalate to Owen", detail: "Take the open questions to Privacy before sending. Benefit: formal backing. Cost: depends on his availability." }
