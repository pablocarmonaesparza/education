        - slot: 4
          block_id: reading_kpi_cards
          title: Sundial by the numbers
          body: Here are the headline figures for the full dataset and company context.
          content:
            kpis:
              - label: Support tickets in raw export
                value: '400'
              - label: Churn survey responses
                value: 1,200
              - label: Satisfaction-survey verbatims
                value: '850'
              - label: Feature-request spreadsheet entries
                value: '310'
              - label: Sundial Money employees
                value: '90'
              - label: Last feature release (shared budget pilot)
                value: April 15, 2026 (Enterprise only)
        - slot: 5
          block_id: reading_message
          title: Marcus Webb on Compass limits
          body: Marcus Webb, Engineering Lead, sends you a Slack message about what Sundial Compass can and cannot do.
          content:
            message:
              channel: slack_dm
              from:
                name: Marcus Webb
              timestamp: '2026-06-05T10:30:00-04:00'
              body: |-
                Hey, quick heads up on Sundial Compass before you dive in.

                What it CAN do:
                - Draft text from structured summaries and anonymized themes
                - Synthesize patterns from aggregated, non-identifiable input
                - Generate feature specs and roadmap documents from curated prompts
                - Rewrite and format content for different audiences

                What it CANNOT do:
                - Access Sundial's product analytics, customer records system, or user database
                - Verify claims against real usage data or revenue figures
                - Distinguish real quotes from plausible-sounding invented ones
                - Know which accounts are enterprise vs. consumer
                - Process personal data under Sundial's user-data agreements

                So you need to feed it clean, anonymized summaries. Don't give it raw rows with names, emails, account IDs, or financial figures. And double-check any numbers or quotes it generates against real data.

                Let me know if you have questions.
