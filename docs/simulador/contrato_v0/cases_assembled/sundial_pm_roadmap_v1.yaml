              - value: exclude
                label: Exclude from analysis
            rows:
              - id: row_1
                label: Jennifer Alvarez, support_ticket, opted_in, no flag
                hint: opted_in and no flag. Include.
                example: Consent is verified, no exclusion flag. Safe to use.
              - id: row_2
