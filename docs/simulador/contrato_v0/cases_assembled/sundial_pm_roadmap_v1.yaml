                  user_name: Jennifer Alvarez
                  email: jen.alvarez@email.com
                  account_id: SA-10234
                  text_excerpt: My direct deposit of $3,400 USD posted to the wrong envelope. My account number is 987654321 at Chase.
                  consent_status: opted_in
                  account_tier: Plus
