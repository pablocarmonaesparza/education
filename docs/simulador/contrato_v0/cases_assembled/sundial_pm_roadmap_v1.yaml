case_assembly:
  case_id: sundial_pm_roadmap
  version: 1
  status: draft
  schema_version: 1.0.0
  meta:
    level: N2 · Workflow
    profile: Product Management
    profile_pack: marketing_growth
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools:
      - ai
      - data
      - messaging
      - documents
  manager_outcome:
    primary_question: 'Whether this product manager can turn messy user input into a roadmap with judgment: keeping identifiable and sensitive user data out of the AI tool, catching demand numbers and impact estimates the tool made up, grounding priorities in real evidence instead of the loudest accounts, and knowing which parts of the draft are safe to put in front of leadership.'
    assignment_brief: 'Priya needs the Q3 roadmap and a spec for the top feature by Monday. You have four raw data sources: **400 support tickets**, a churn survey with **1,200 responses**, **850 satisfaction-survey verbatims**, and a feature-request spreadsheet with **310 entries**. Every source contains personal data: email addresses, account IDs, and free-text where users pasted bank balances and account numbers while describing bugs. Priya wants you to use the AI assistant to find the top themes, draft the feature spec, and produce a prioritized roadmap with estimated revenue impact. She needs to know what you put into the tool, what you kept out, and whether the output is ready for leadership or needs rework.'
    business_metric: 'Roadmap accuracy: percentage of prioritized features that match real user demand signals from verified data'
    risk_metric: 'Data exposure incidents: count of identifiable or sensitive user data points that enter the AI tool outside approved agreements'
    expected_signal: The participant strips or aggregates personal and sensitive data before pasting anything into the AI tool, catches the invented demand percentages and revenue estimates in the output, checks priority rankings against real evidence rather than loud accounts, and decides to keep the draft as a working draft with numbers marked unverified rather than sending it to leadership or pausing entirely.
    expected_action: entrenar
    alternatives:
      - pilotar
      - pausar
      - escalar
  sections:
    - id: contexto
      name: Context
      slides:
        - slot: 1
          block_id: case_cover
          title: Sundial Money Q3 roadmap
          body: |-
            You are a **Product Manager** at **Sundial Money**, a 90-person fintech company based in Columbus, Ohio. Sundial helps consumers manage their spending with a digital envelope-budgeting app. Your main tool is **Sundial Compass**, an AI drafting assistant that can synthesize themes, generate feature specs, and rewrite content for different audiences. It cannot access Sundial's product analytics, customer records system, or user database, and it cannot process personal data under Sundial's user-data agreements.

            **Priya Chandrasekhar**, VP of Product, has just assigned you a high-stakes project. It is **Friday, June 5, 2026**. She wants a prioritized Q3 roadmap delivered to the leadership team by **Monday, June 8, 2026**.
          content:
            meta:
              profile: Product Management
              level: N2 · Workflow
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - kind: ai
                  label: AI
                - kind: data
                  label: Tables
                - kind: messaging
                  label: Messaging
                - kind: documents
                  label: Documents
        - slot: 2
          block_id: reading_message
          title: Priya's assignment email
          body: Priya sends you an email with the full scope of the project.
          content:
            message:
              channel: email
              from:
                name: Priya Chandrasekhar
              timestamp: '2026-06-05T09:15:00-04:00'
              body: |-
                Subject: Q3 Roadmap, due Monday

                Hi team,

                We need a prioritized Q3 2026 roadmap ready for the Monday, June 8 leadership presentation. Here is what I need from you:

                1. A prioritized Q3 roadmap with the top 3 features ranked by user demand.
                2. A feature spec for the #1 priority feature, including a problem statement and proposed solution.
                3. Estimated revenue impact for each of the top 3 features.
                4. A summary of what data was fed into the AI tool and what was kept out.
                5. A readiness assessment: whether the draft is safe to present to leadership or needs rework.

                Use Sundial Compass to help draft the roadmap and spec. But remember its limitations: it cannot access our product analytics, customer records system, or user database, and it cannot process personal data.

                Deadline: Monday, June 8, 2026, by 9:00 AM ET.

                Thanks,
                Priya
        - slot: 3
          block_id: reading_data_table
          title: User feedback dataset
          body: |-
            You have a **12-row sample** of user feedback drawn from support tickets, churn surveys, satisfaction-survey verbatims, and feature requests. Each row contains personal data, financial details, and consent flags. You must apply these **data-policy rules** before feeding anything into Sundial Compass:

            - **Rule 1:** Any user who has opted out of data sharing must be excluded from all analysis and never have their data processed by any tool.
            - **Rule 2:** Any user whose consent status is unknown or unconfirmed must be excluded until consent is verified.
            - **Rule 3:** Any record flagged as a duplicate or internal test must be removed before analysis to avoid double-counting or false signals.
          content:
            table:
              columns:
                - key: source
                  label: Source
                - key: user_name
                  label: User name
                - key: email
                  label: Email
                - key: account_id
                  label: Account ID
                - key: text_excerpt
                  label: Text excerpt
                - key: consent_status
                  label: Consent status
                - key: account_tier
                  label: Account tier
                - key: flag
                  label: Flag
              rows:
