# Biblia (hechos canónicos):
#   Empresa: Tallgrass Outdoor Co. (retailer de camping / hiking gear, EEUU).
#     Rol del participante: Recruiting Coordinator.
#   Diane Marchetti: Hiring Manager, Distribution Center Operations. Asigna y
