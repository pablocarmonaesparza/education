          block_id: reading_passive
          title: Summit Assist capabilities and limits
          body: |-
            You open Summit Assist to review what it can and cannot do for this assignment.

            **What Summit Assist can do:**
            - Summarize application text against a list of job requirements
            - Draft a neutral comparison table of candidates on defined criteria
            - Flag missing or incomplete fields in a structured data set
            - Generate a plain-language notice about AI-assisted screening for applicants

            **What Summit Assist cannot do:**
            - Connect to the applicant tracking system or any company HR system
            - Access candidate data under a signed data-processing agreement
            - Produce a legally defensible ranking or fit score
            - Guarantee that personal data pasted into it stays within company control
            - Detect or correct for bias in its own outputs
          content: {}
        - slot: 2
          block_id: ai_textfield_guided
          title: Build your request to Summit Assist
          body: |-
            Diane needs a shortlist of **20 candidates** from **220 applicants** by **Friday, June 5, 2026**. You will use Summit Assist to summarize applicant data against the posted job requirements for the shift-supervisor role.

            Before you write, choose the goal, the audience for the summary, and the data limits you want Summit Assist to follow.
          content:
            guided:
              objetivos:
                - Summarize each applicant against the posted job requirements for shift supervisor
                - Flag which applicants are missing required fields in their application
                - Generate a notice about AI-assisted screening to send to applicants
                - Rank all 220 applicants from best to worst fit for the role
              audiencias:
                - Diane Marchetti, Hiring Manager
                - Marcus Webb, Senior Recruiter
                - All 220 applicants
                - The 20 shortlisted candidates only
              limites:
                - 'Use only job-relevant fields: supervisory experience, shift availability, and warehouse experience'
                - Include all data fields so the hiring manager has the full picture
                - Exclude home address, date of birth, salary history, and photo from the analysis
                - Filter candidates by how close they live to the distribution center
