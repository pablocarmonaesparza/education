# Caso ensamblado · vertiz_backlog_entregas (autorado por Claude como el motor,
# siguiendo el pipeline: biblia -> blueprint por receta N1 -> 25 slides).
# Relocalizado a EEUU 2026-07-16 (glosario §8). case_id/slug/step_key/block_id
# intactos: son claves acopladas al registry y a case_steps en BD.
# Biblia (hechos canonicos):
#   Empresa: Vantage Logistics (ultima milla + mesa de claims, EEUU).
#     Rol: Operations Analyst. La operacion es una COLA DE CLAIMS por excepcion de
#     entrega, no un analista aprobando reembolsos: en EEUU el porch piracy se
#     resuelve como claim con proof of loss. Misma estructura de decision.
#   Dana Whitfield: Director of Operations. Asigna y recibe. Nunca destinataria.
#   Marcus Reed: Claims Control Analyst. Fija la regla de evidencia; no se negocia.
#   Vantage Assistant: la IA aprobada. Redacta y ajusta tono; no consulta el sistema
#     de rastreo ni envia; puede inventar tracking, montos y fechas, hay que validar.
#   Destinatario del aviso: SIEMPRE un cliente con entrega fallida. Nunca Dana.
#   Hoy lunes 1 de junio de 2026. Deadline viernes 5 de junio (weekdays verificados).
#   Montos: USD explicito en la columna ("Declared value (USD)") para que el simbolo
#     no sea ambiguo — la respuesta de la rubrica depende de leerlo como USD.
#   Metricas base: on-time resolution 62%, claims payout cost 3.1%, repeat complaints 2.4%.
#   Beat regulatorio anclado en CCPA/CPRA, no LFPDPPP.

case_assembly:
  case_id: vertiz_backlog_entregas
  version: 1
  status: draft
  schema_version: 1.0.0

  meta:
    level: "N1 · Fundamentals"
    profile: "Operations"
    profile_pack: operations_automation
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "Can this person clear a delivery exception backlog using AI with judgment, without paying out claims that have no proof of loss or exposing customer data?"
    assignment_brief: "Assign this case when you want to know if someone in Operations can sort a queue of failed deliveries (claims, fraud, duplicates, customer data), ask AI for a useful customer notice without leaking sensitive information or inventing amounts, review what comes back, and decide whether to resolve, run it solo, or escalate. The result tells you whether they can close exceptions with judgment or need practice before they touch real claim payouts."
    business_metric: "on-time exception resolution at 72 hours"
    risk_metric: "claims paid without proof of loss, or customer data sent to AI"
    expected_signal: "tells closing with judgment apart from clearing the queue for speed"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:

    - id: contexto
      name: "Context"
      slides:
        - slot: 1
          block_id: case_cover
          title: "Clear the delivery exception backlog, with the claims as they came in"
          body: "You work at **Vantage Logistics**. Your director asked you to **close out this week's delivery exceptions** before **Friday, Jun 5**. The queue came in with claims that have no proof, a duplicate, a package still in transit, and **customer data** mixed into several records. You decide what gets resolved, what you ask AI for, and what you hand your director."
          content:
            meta:
              profile: "Operations"
              level: "N1 · Fundamentals"
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - { kind: ai, label: "AI" }
                - { kind: data, label: "Tables" }
                - { kind: messaging, label: "Messaging" }
                - { kind: documents, label: "Documents" }

        - slot: 2
          block_id: reading_message
          title: "Dana assigns you the backlog close-out"
          body: "Read it in full. What she asks for here is what you deliver at the end."
          content:
            message:
              channel: email
              from: { name: "Dana Whitfield", role: "Director of Operations · Vantage Logistics" }
              to: { name: "You", role: "Operations Analyst" }
              timestamp: "Today, 9:15 AM"
              subject: "We close the exceptions this week"
              body: "Hi. This week we **close the delivery exceptions** and the deadline is **Friday, Jun 5**. The queue I'm handing you has questionable claims in it, so the first job is to sort it and not pay out anything that has no support. Once you have it, send me a proposal with three things: the **claims** you're going to resolve and how, the **base notice** that goes out to customers, and the **metrics you'll monitor** so we know if we did this well."

        - slot: 3
          block_id: reading_data_table
          title: "The exception queue, as it came in"
          body: "Eight claims. Look at the **exception type**, whether there is **evidence**, and the **declared value** (the high-value ones with no proof are the ones that hurt)."
          content:
            table:
              caption: "Exception queue · Jun 1, 2026"
              columns:
                - { key: guia, label: "Tracking" }
                - { key: excepcion, label: "Exception" }
                - { key: antiguedad, label: "Age" }
                - { key: valor, label: "Declared value (USD)" }
                - { key: evidencia, label: "Evidence" }
              rows:
                - { guia: "V-1001", excepcion: "Incomplete address", antiguedad: "1 day", valor: "$420", evidencia: "on-site photo" }
                - { guia: "V-1002", excepcion: "Recipient unavailable (3 attempts)", antiguedad: "4 days", valor: "$190", evidencia: "attempt log" }
                - { guia: "V-1003", excepcion: "Damaged in transit", antiguedad: "2 days", valor: "$1,250", evidencia: "damage photo" }
                - { guia: "V-1004", excepcion: "Theft claim, marked delivered", antiguedad: "5 days", valor: "$3,400", evidencia: "none" }
                - { guia: "V-1005", excepcion: "Not received, POD on file", antiguedad: "3 days", valor: "$260", evidencia: "signature + delivery photo" }
                - { guia: "V-1006", excepcion: "Incomplete address", antiguedad: "1 day", valor: "$420", evidencia: "on-site photo" }
                - { guia: "V-1007", excepcion: "Route flagged, no delivery attempt", antiguedad: "6 days", valor: "$510", evidencia: "route alert" }
                - { guia: "V-1008", excepcion: "Refund requested", antiguedad: "1 day", valor: "$330", evidencia: "out for delivery" }

        - slot: 4
          block_id: reading_kpi_cards
          title: "How the operation ran last month"
          body: "These are the baseline numbers. The one on the left is **the one to beat**."
          content:
            kpis:
              - { label: "On-time resolution (72h)", value: "62%", delta: { direction: flat, label: "the number to beat", goodWhen: "higher" } }
              - { label: "Claims payout cost", value: "3.1%", delta: { direction: flat, label: "the number to protect", goodWhen: "lower" } }
              - { label: "Repeat complaints", value: "2.4%", delta: { direction: flat, label: "the number to protect", goodWhen: "lower" } }

        - slot: 5
          block_id: reading_message
          title: "Marcus, from Claims, sets a rule"
          body: "Read it. This draws a line that isn't up for negotiation."
          content:
            message:
              channel: email
              from: { name: "Marcus Reed", role: "Claims Control Analyst · Vantage Logistics" }
              to: { name: "You", role: "Operations Analyst" }
              timestamp: "Today, 9:40 AM"
              subject: "Careful with the payouts in this queue"
              body: "I saw you're closing out the exceptions. Two things I always check. A claim with **no proof of loss** doesn't get paid, it gets escalated, and that goes double when the declared value is high. And the customer's **address and phone** never go into AI to draft anything; the exception type is enough. Under our privacy policy that counts as a disclosure to a vendor, so if any of it gets out, it's a serious problem."

    - id: datos
      name: "Data"
      slides:
        - slot: 1
          block_id: categorize_rows
          title: "Decide what you do with each claim"
          body: "For each one: **resolve**, **escalate** if there's doubt or a high value with no proof, or **reject** if it doesn't apply yet. Remember Marcus's rule."
          content:
            actions:
              - { value: resolver, label: "Resolve" }
              - { value: escalar, label: "Escalate" }
              - { value: rechazar, label: "Reject" }
            rows:
              - { id: g3, label: "V-1003 · damaged in transit · damage photo", hint: "Resolve: it has clear evidence.", example: "Damage with a photo, payout is justified." }
              - { id: g4, label: "V-1004 · theft claim $3,400 USD · no proof of loss", hint: "Always escalate (Marcus's rule).", example: "High declared value with no proof." }
              - { id: g6, label: "V-1006 · identical to V-1001", hint: "Escalate: it's a duplicate.", example: "Same tracking and value as V-1001." }
              - { id: g8, label: "V-1008 · package still in transit", hint: "Reject for now: it isn't an exception yet.", example: "Still on the way, no claim applies." }
              - { id: g2, label: "V-1002 · unavailable after 3 attempts · attempt log", hint: "Resolve: there's a log of the attempts.", example: "Three documented attempts." }

        - slot: 2
          block_id: categorize_rows
          title: "What fields can AI see?"
          body: "For each field decide: **send to model**, **send transformed**, or **don't send**. Apply the case's data policy."
          content:
            actions:
              - { value: va, label: "Send to model" }
              - { value: transformado, label: "Send transformed" }
              - { value: no_va, label: "Don't send" }
            rows:
              - { id: c_tipo, label: "Exception type", hint: "Send: it helps tune the tone of the notice.", example: "Useful for drafting without exposing anything." }
              - { id: c_direccion, label: "Customer address", hint: "Don't send: the model doesn't need it to draft.", example: "Sensitive data, Marcus's rule." }
              - { id: c_monto, label: "Payout amount", hint: "Don't send: the amount comes from the system, not the model.", example: "If AI writes it, it makes it up." }
              - { id: c_nombre, label: "Customer name", hint: "Transformed: use a generic greeting.", example: "'Hi' is better than the full name." }

        - slot: 3
          block_id: model_tradeoff_sliders
          title: "Tune the model for customer data and money"
          body: "Move **autonomy**, **security**, and **cost** knowing there's customer data and claim payouts in play. There's no single answer, there's judgment."
          content:
            modelTradeoff:
              prompt: "For a queue with customer data and claim payout amounts, how much autonomy do you give AI, how much security do you require, and how much cost do you accept?"
              sliderLabels:
                autonomy: "Autonomy"
                security: "Security"
                cost: "Cost"

        - slot: 4
          block_id: ai_textfield_free
          title: "Write the data use limit"
          body: "In one or two lines, tell the **Vantage Assistant** what it **can't** use from this queue. This will guide what you ask it for next."
          content:
            placeholder: "Write the data use limit here, in one or two lines."

        - slot: 5
          block_id: reading_attachment
          title: "The claims and data policy"
          body: "Three rules. You'll be citing them later."
          content:
            attachments:
              - { name: "Claims and data policy · Vantage Logistics", kind: pdf, description: "1) A claim with no proof of loss is escalated, not paid. 2) A duplicate is closed as a single claim. 3) The address, the phone, and the payout amount never go to AI." }

    - id: ia
      name: "AI"
      slides:
        - slot: 1
          block_id: reading_passive
          title: "What the Vantage Assistant is, and what it isn't"
          body: "The **Vantage Assistant** is the company's approved AI. It **drafts** and **adjusts tone** with whatever you paste into it. It does **not** query the tracking system and it does **not** send anything. It can **invent tracking numbers, amounts, or dates**, so everything it gives back has to be verified."

        - slot: 2
          block_id: ai_textfield_guided
          title: "Build your request to the Vantage Assistant"
          body: "Define the **goal**, the **audience**, and the **limits** of the notice you want. Be explicit about what it can't use."
          content:
            guided:
              objetivos:
                - "Tell the customer their claim is under review, in a clear and respectful tone."
                - "Explain the next step without promising a payout that isn't confirmed."
              audiencias:
                - "Customers with a failed delivery under review."
                - "Customers waiting on a response to an open claim."
              limites:
                - "Don't mention any payout amount."
                - "Don't include the customer's address or phone."

        - slot: 3
          block_id: ai_output_review
          title: "First draft from the Vantage Assistant"
          body: "Read it carefully and flag what's wrong. Watch for **sensitive data**, **invented amounts**, and **tone**."
          content:
            segments:
              - { id: r1, text: "Hi Brian, we see your package to 1425 Oak St, Apt 3B is still pending.", flagIfMarked: dato_sensible, issue: "Exposes the customer's address and name." }
              - { id: r2, text: "We're confirming a $3,400 payout that you'll see within 24 hours.", flagIfMarked: claim_no_verificado, issue: "Invented amount and an unconfirmed payout." }
              - { id: r3, text: "Resolve now or your claim closes for good.", flagIfMarked: tono_agresivo, issue: "Pressure tone, wrong for customer support." }
              - { id: r4, text: "We're here to help with anything you need.", flagIfMarked: frase_reutilizable, issue: "Filler line, adds nothing." }

        - slot: 4
          block_id: ai_textfield_free
          title: "Tell it what to fix"
          body: "Write to the **Vantage Assistant** about what to change in that draft. Aim at what you flagged."
          content:
            placeholder: "Write what to change in the draft here."

        - slot: 5
          block_id: ai_output_review
          title: "Revised draft"
          body: "Review it again. What matters here is that the change **reflects your instruction** and that there's no sensitive data or amounts left."
          content:
            segments:
              - { id: r5, text: "Hi, we wanted to let you know your delivery claim is under review.", flagIfMarked: frase_reutilizable, issue: "This one is fine; fixed from the previous draft." }
              - { id: r6, text: "We'll contact you with the next step within 72 hours.", flagIfMarked: claim_no_verificado, issue: "Uses the real process window, without promising an amount." }
              - { id: r7, text: "Your $260 payout has already been approved by the system.", flagIfMarked: claim_no_verificado, issue: "Another amount slipped in, and it isn't confirmed." }

    - id: revision
      name: "Verification"
      slides:
        - slot: 1
          block_id: ai_output_review
          title: "Hunt the amounts and figures you can't prove"
          body: "Last review pass. Flag any **amount** or **number** that doesn't come from the case data."
          content:
            segments:
              - { id: v1, text: "95% of claims are resolved the same day.", flagIfMarked: claim_no_verificado, issue: "No data backs this up." }
              - { id: v2, text: "Your claim is on file with a tracking number.", flagIfMarked: frase_reutilizable, issue: "Vague, but it isn't a false figure." }
              - { id: v3, text: "We're the fastest carrier in the country.", flagIfMarked: claim_no_verificado, issue: "Unsupported claim." }

        - slot: 2
          block_id: ai_comparison
          title: "Pick the closing line for the notice"
          body: "Four versions of the closing line. Pick the one that informs without over-promising and justify it in one line."
          content:
            options:
              - { id: A, title: "Closing 1", body: "We'll contact you with the outcome of your claim within 72 hours." }
              - { id: B, title: "Closing 2", body: "Your payout will be deposited within the next 24 hours." }
              - { id: C, title: "Closing 3", body: "Your claim has been filed. Await a response." }
              - { id: D, title: "Closing 4", body: "Respond today or your claim will be canceled." }

        - slot: 3
          block_id: reading_message
          title: "Dana answers with one condition"
          body: "She messages you on chat before you close."
          content:
            message:
              channel: chat
              from: { name: "Dana Whitfield", role: "Director of Operations" }
              to: { name: "You", role: "Operations Analyst" }
              timestamp: "Today, 11:05 AM"
              subject: "Before you close"
              body: "Good. Before you close, tell me how you left the queue and what notice the customer gets. I want to see your judgment before this goes out."

        - slot: 4
          block_id: categorize_rows
          title: "Final notice checklist"
          body: "For each part of the notice: **keep**, **fix**, or **cut**."
          content:
            actions:
              - { value: dejar, label: "Keep" }
              - { value: corregir, label: "Fix" }
              - { value: quitar, label: "Cut" }
            rows:
              - { id: k_asunto, label: "Subject: your delivery claim is under review", hint: "Keep: clear and promises nothing." }
              - { id: k_saludo, label: "Generic greeting, no full name", hint: "Keep." }
              - { id: k_monto, label: "Mention of a payout amount", hint: "Always cut." }
              - { id: k_plazo, label: "72 hour response window", hint: "Keep: it's the real figure." }

        - slot: 5
          block_id: ai_comparison
          title: "Pick the final version"
          body: "With Dana's feedback, pick the notice you'd ship. Justify it in one line."
          content:
            options:
              - { id: A, title: "Version 1", body: "Hi, your delivery claim is under review. We'll contact you with the outcome within 72 hours. Thanks for your patience." }
              - { id: B, title: "Version 2", body: "Hi, your payout is approved and lands within 24 hours." }
              - { id: C, title: "Version 3", body: "Hi, your package to your address on file is still under review; we'll write to you." }
              - { id: D, title: "Version 4", body: "Hi, respond today or your claim closes; this is important." }

    - id: cierre
      name: "Close"
      slides:
        - slot: 1
          block_id: ai_comparison
          title: "Pick the batch you resolve first"
          body: "Four possible batches. Pick which one you resolve first and say why in one line."
          content:
            options:
              - { id: A, title: "With evidence", body: "Claims with a photo or a log like V-1003 and V-1002, grouped by attached evidence." }
              - { id: B, title: "High value in dispute", body: "The $3,400 USD theft claim that still has no proof of loss attached." }
              - { id: C, title: "Repeated record", body: "V-1006 comes in with the same tracking and the same value as V-1001." }
              - { id: D, title: "The whole queue", body: "All eight claims together in a single send, without splitting them by type." }

        - slot: 2
          block_id: ai_textfield_free
          title: "Write the base notice"
          body: "Write the **full base notice** for the batch you picked. No address, no invented amounts, with the real 72 hour window."
          content:
            placeholder: "Write the notice the customer would receive here."

        - slot: 3
          block_id: categorize_rows
          title: "Define the metrics you'll monitor"
          body: "For each metric: **monitor** or **ignore**. These close the promise you made to Dana."
          content:
            actions:
              - { value: monitorear, label: "Monitor" }
              - { value: ignorar, label: "Ignore" }
            rows:
              - { id: m_sla, label: "On-time resolution at 72h (beat 62%)", hint: "Monitor: it's the goal." }
              - { id: m_reemb, label: "Claims payout cost (alarm above 3.1%)", hint: "Monitor: it's the risk." }
              - { id: m_quejas, label: "Repeat complaints (watch above 2.4%)", hint: "Monitor." }
              - { id: m_color, label: "Button color on the notice", hint: "Ignore: not a signal." }

        - slot: 4
          block_id: reading_passive
          title: "Preview of the final notice"
          body: "This is how the notice to your chosen batch would land, with the **72 hour window** and no promise of an amount."

        - slot: 5
          block_id: tradeoff_decision_memo
          title: "Your decision, and why"
          body: "This is the last one: the decision you'll defend to Dana, with its cost and its benefit."
          content:
            decisions:
              - { id: resolver_todo_hoy, title: "Resolve everything today", detail: "Close all eight claims today. Benefit: you close the most claims inside the window. Cost: if you paid the theft claim with no proof, or the duplicate, you overspend and you open the door to fraud." }
              - { id: pilotar_lote_claro, title: "Resolve the clear batch and escalate the rest", detail: "Close the claims with evidence today and escalate the questionable ones to Marcus. Benefit: you move on what has proof. Cost: the backlog isn't closed today and the questionable ones stay open." }
              - { id: pausar_y_evidencia, title: "Pause and request evidence", detail: "Hold every payout until each one has proof. Benefit: zero improper payment. Cost: you lose the week's window." }
              - { id: escalar_a_finanzas, title: "Escalate the high-value claims to Claims Review", detail: "Send the theft claim and the high-value ones to Marcus before paying. Benefit: formal backing. Cost: it depends on his turnaround." }
