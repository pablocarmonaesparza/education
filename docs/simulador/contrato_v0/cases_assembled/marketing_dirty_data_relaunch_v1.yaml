# Caso ensamblado · marketing_dirty_data_relaunch v2
#
# Una sola historia: relanzar la campana de retencion de Aurora Retail a sus
# clientes propios, con la base sucia. 5 secciones x 5 slides = 25.
# Ratio ai_native: 15/25 = 60%. Nivel N1.
#
# FUENTE DE VERDAD. El demo /case-demo se genera de este archivo
# (scripts/simulador/generate-case-demo.mjs). No editar el TSX a mano: editar
# aqui y regenerar. Cada slide.content es el caseContext del bloque. Los campos
# judge_internal (hint, example, issue, goodWhen) se co-localizan aqui por
# ergonomia de autoria y se remueven antes de llegar al cliente del bloque.
#
# NOTA DE COPY: los comentarios van en ASCII; los strings de title/body/content
# que ve el participante van en espanol ACENTUADO (es copy de usuario).
#
# Biblia de continuidad (hechos canonicos, ningun slide inventa fuera de esto):
#   Empresa: Aurora Retail (retailer omnicanal en LATAM).
#   Tu rol: Analista de Crecimiento / CRM.
#   Mariana Robles: Lider de Crecimiento. Asigna y recibe. Nunca destinataria.
#   Daniela Ruiz: Coordinadora Legal. Levanta el ticket y su queja se cierra.
#   Aurora Copiloto: el asistente de IA. Instrumento dado, no se elige.
#   Destinatario del mensaje: SIEMPRE un segmento de clientes. Nunca Mariana.
#   Fechas absolutas. Hoy 30 may 2026. Ultima campana 18 abr 2026. Deadline
#   viernes 5 jun 2026.

case_assembly:
  case_id: marketing_dirty_data_relaunch
  version: 2
  status: ready
  schema_version: 1.0.0

  meta:
    level: "N1 · Fundamentos"
    profile: "Marketing"
    profile_pack: marketing_growth
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "¿Puede esta persona limpiar una base de clientes con criterio de privacidad y armar un envío de retención responsable?"
    assignment_brief: "Asigna este caso cuando quieras saber si alguien de Marketing puede dejar limpia una base de clientes (consentimiento, rebotes, duplicados), pedirle a la inteligencia artificial un mensaje útil sin filtrar datos personales, revisar lo que devuelve y decidir si lanzar, pilotar o pausar. El resultado te dice si puede operar campañas con criterio o necesita práctica antes de tocar datos reales."
    business_metric: "recompra a 30 días de la campaña de retención"
    risk_metric: "correos a clientes que pidieron baja o uso de datos personales sin transformar"
    expected_signal: "distingue limpieza con criterio de atajo riesgoso"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:

    # ============================================================
    # SECCION 1 · CONTEXTO (5 pasivos · onboarding)
    # ============================================================
    - id: contexto
      name: "Contexto"
      slides:

        - slot: 1
          block_id: case_cover
          title: "Relanzar la retención, con la base como llegó."
          body: "Trabajas en **Aurora Retail**. Tu jefa te pidió **relanzar la campaña de retención** a los clientes de siempre antes del **viernes**. La base llegó con duplicados, gente que pidió darse de baja y correos que ya rebotan. Tú decides qué se limpia, qué le pides a la inteligencia artificial y qué le entregas a tu jefa."
          content:
            meta:
              profile: "Marketing"
              level: "N1 · Fundamentos"
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - { kind: ai, label: "Inteligencia artificial" }
                - { kind: data, label: "Tablas" }
                - { kind: messaging, label: "Mensajería" }
                - { kind: documents, label: "Documentos" }

        - slot: 2
          block_id: reading_message
          title: "Mariana te asigna el relanzamiento."
          body: "Léelo completo. Lo que pide aquí es lo que vas a entregar al final."
          content:
            message:
              channel: email
              from: { name: "Mariana Robles", role: "Líder de Crecimiento · Aurora Retail" }
              to: { name: "Tú", role: "Analista de Crecimiento" }
              timestamp: "Hoy, 9:40"
              subject: "Relanzamos la campaña de retención esta semana"
              body: "Hola. Esta semana **relanzamos la campaña de retención** a nuestros clientes de siempre, y cierra el **viernes**. La base que te paso viene con problemas, así que el primer trabajo es dejarla limpia. Cuando la tengas, mándame una propuesta con tres cosas: los **segmentos** a los que les vas a escribir, el **mensaje base** que les llega, y las **métricas que vas a monitorear** para saber si funcionó. Cualquier duda me dices."

        - slot: 3
          block_id: reading_data_table
          title: "Así llegó la base de clientes."
          body: "Una muestra de la base, con los problemas típicos. En la sección siguiente decides qué hacer con cada cliente."
          content:
            table:
              caption: "Muestra de la base de clientes (de 480)"
              columns:
                - { key: nombre, label: "Cliente" }
                - { key: ultima_compra, label: "Última compra" }
                - { key: consentimiento, label: "Consentimiento" }
                - { key: entrega, label: "Entrega" }
                - { key: valor, label: "Compras 12 meses" }
              rows:
                - { nombre: "Paola Restrepo", ultima_compra: "22 abr 2026", consentimiento: "Activo", entrega: "Ok", valor: "$8,400" }
                - { nombre: "Renata Gómez", ultima_compra: "10 may 2026", consentimiento: "Revocado", entrega: "Ok", valor: "$12,900" }
                - { nombre: "Bruno Salas", ultima_compra: "15 mar 2026", consentimiento: "Activo", entrega: "Rebota", valor: "$3,200" }
                - { nombre: "Lía Fonseca", ultima_compra: "01 feb 2026", consentimiento: "Pidió baja", entrega: "Ok", valor: "$5,100" }

        - slot: 4
          block_id: reading_kpi_cards
          title: "Cómo le fue a la campaña de abril."
          body: "Los números del último envío de retención, el del **18 de abril**. Son tu referencia para lo que vas a proponer."
          content:
            kpis:
              - { label: "Tasa de apertura", value: "22%", delta: { direction: flat, label: "estable desde el último envío" } }
              - { label: "Recompra a 30 días", value: "3.4%", delta: { direction: flat, label: "el número a superar", goodWhen: "más alto" } }
              - { label: "Quejas y bajas", value: "1.8%", delta: { direction: flat, label: "el número a cuidar", goodWhen: "más bajo" } }

        - slot: 5
          block_id: reading_message
          title: "Daniela, de Legal, ya levantó una alerta."
          body: "Antes de tocar nada, lee lo que pasó con el envío anterior."
          content:
            message:
              channel: ticket
              from: { name: "Daniela Ruiz", role: "Coordinadora Legal · Aurora Retail" }
              to: { name: "Marketing" }
              timestamp: "Hace 6 días"
              subject: "Quejas por correos a clientes que pidieron baja"
              body: "En el envío de abril llegaron quejas de **clientes que ya habían pedido darse de baja** y aun así recibieron el correo. Antes del próximo envío necesito que confirmes dos cosas: que **excluiste a todos los que pidieron baja** y que el correo lleva **un enlace visible para darse de baja**. Si algo no queda claro, escríbeme."

    # ============================================================
    # SECCION 2 · DATOS (4 ai_native + 1 pasivo)
    # ============================================================
    - id: datos
      name: "Datos"
      slides:

        - slot: 1
          block_id: categorize_rows
          title: "Decide qué haces con cada cliente."
          body: "Por cada cliente elige una acción. Algunas son claras por la política de datos; otras piden tu criterio. Regla dura: **quien pidió baja o revocó el consentimiento se excluye siempre**."
          content:
            actionStyle: permission
            actions:
              - { value: usar, label: "Usar" }
              - { value: anonimizar, label: "Anonimizar" }
              - { value: excluir, label: "Excluir" }
              - { value: escalar, label: "Escalar" }
            rows:
              - { id: c1, label: "Paola Restrepo · compró hace 5 semanas · abre seguido", example: "Cliente activa, sin problemas", hint: "Usar" }
              - { id: c2, label: "Tomás Iglesias · no compra hace 6 meses · sigue abriendo", example: "Candidato a reactivación", hint: "Usar" }
              - { id: c3, label: "Renata Gómez · consentimiento revocado", example: "Revocado, regla dura", hint: "Excluir" }
              - { id: c4, label: "Bruno Salas · su correo rebota", example: "Rebota, correo inválido", hint: "Excluir" }
              - { id: c5, label: "Lía Fonseca · pidió darse de baja", example: "Pidió baja, origen del ticket de Daniela", hint: "Excluir" }

        - slot: 2
          block_id: categorize_rows
          title: "Decide qué columnas le pasas a la inteligencia artificial."
          body: "El mensaje lo va a redactar **Aurora Copiloto**, el asistente de la empresa. Por cada columna decide si se la pasas tal cual, transformada, o no se la pasas. Lo que escribas en el asistente sale de la base protegida."
          content:
            actionStyle: neutral
            actions:
              - { value: va, label: "Va al modelo" }
              - { value: transformada, label: "Va transformada" }
              - { value: no_va, label: "No va" }
            rows:
              - { id: f1, label: "Nombre del cliente", example: "Dato personal directo", hint: "No va o anonimizar" }
              - { id: f2, label: "Correo", example: "Identificador personal", hint: "No va" }
              - { id: f3, label: "Última compra (fecha)", example: "Señal útil, no identifica", hint: "Va" }
              - { id: f5, label: "Consentimiento", example: "Ya se usó para filtrar, no va al texto", hint: "No va" }
              - { id: f6, label: "Compras de los últimos 12 meses", example: "Mejor como rango que como monto exacto", hint: "Va transformada" }

        - slot: 3
          block_id: model_tradeoff_sliders
          title: "Pondera qué pesa más al usar IA con datos de clientes."
          body: "Para datos de clientes, ¿cuánto pesa la autonomía del modelo, la seguridad y el costo? Mueve los tres controles según tu criterio."
          content:
            modelTradeoff:
              prompt: "Para datos de clientes, ¿qué pesa más?"
              sliderLabels:
                autonomy: "Autonomía del modelo"
                security: "Seguridad de los datos"
                cost: "Costo"

        - slot: 4
          block_id: ai_textfield_free
          title: "Escríbele a Aurora Copiloto qué datos NO puede usar."
          body: "Antes de pedirle el mensaje, déjale claro el límite. En una o dos frases, dile qué columnas no debe usar y cómo tratar lo personal. Esto es lo que revisarás después, cuando veas si lo respetó."
          content:
            placeholder: "Dile al asistente qué datos no debe usar y cómo tratar lo personal..."

        - slot: 5
          block_id: reading_attachment
          title: "La política de datos de Aurora, en tres reglas."
          body: "Es corta. Estas tres reglas aplican a este envío. Vas a tener que sostenerlas si Legal pregunta."
          content:
            attachments:
              - name: "Politica_de_datos_Aurora_Retail.pdf"
                size: "2 páginas"
                kind: pdf
                description: "Regla 1: si un correo rebota dos veces, se excluye. Regla 2: quien revocó el consentimiento o pidió baja se excluye siempre. Regla 3: a quien nunca confirmó su correo, máximo se le manda un correo para pedir permiso otra vez."

    # ============================================================
    # SECCION 3 · IA (4 ai_native + 1 pasivo)
    # ============================================================
    - id: ia
      name: "IA"
      slides:

        - slot: 1
          block_id: reading_passive
          title: "Qué es Aurora Copiloto y qué no."
          body: "**Aurora Copiloto** es el asistente de lenguaje aprobado de la empresa. Corre en la infraestructura de Aurora.\n\n**Lo que puede:** redactar, resumir y ajustar el tono de lo que le pegas.\n\n**Lo que no puede:** entrar a la base de clientes por su cuenta ni mandar correos. Solo ve lo que tú escribes en el prompt.\n\nUna cosa importante: a veces **inventa cifras** o mete datos que parecen del cliente aunque tú no se los diste. Por eso todo lo que devuelve hay que revisarlo."

        - slot: 2
          block_id: ai_textfield_guided
          title: "Arma el encargo para Aurora Copiloto."
          body: "Vas a generar el **mensaje base** de la campaña. Define el objetivo, a quién le hablas y los límites. Sin esas tres decisiones, el asistente improvisa."
          content:
            guided:
              entrega: "Redacta el mensaje base de la campaña de retención, sin cifras inventadas y sin datos personales del cliente."
              objetivos:
                - "Recuperar a clientes que dejaron de comprar"
                - "Reforzar a los clientes que siguen comprando"
                - "Reactivar a quienes abren pero no compran"
                - "Avisar de un beneficio para clientes actuales"
              audiencias:
                - "Clientes activos de alto valor"
                - "Clientes que no compran hace meses"
                - "Clientes que abren pero no compran"
                - "Toda la base junta"
              limites:
                - "No usar nombres ni correos en el texto"
                - "No inventar cifras ni resultados"
                - "Dejarlo como borrador para revisar"
                - "Incluir el enlace para darse de baja"

        - slot: 3
          block_id: ai_output_review
          title: "Aurora Copiloto devolvió este borrador."
          body: "Es el primer intento. **Marca lo que no dejarías pasar** antes de pedir una corrección. Fíjate en cifras que no puedes sostener, en datos personales que no debían aparecer y en el tono."
          content:
            segments:
              - { id: s1, text: "Hola, te extrañamos en Aurora Retail. Sabemos que tu última compra fue hace exactamente 47 días.", issue: "Dato personal exacto que no debía ir al modelo", flagIfMarked: "dato_sensible" }
              - { id: s2, text: "Los clientes que vuelven gastan un 35% más en promedio.", issue: "Cifra inventada sin fuente", flagIfMarked: "claim_no_verificado" }
              - { id: s3, text: "Preparamos una selección pensada para ti y un beneficio si vuelves esta semana.", issue: "Oferta concreta y aceptable", flagIfMarked: "frase_reutilizable" }
              - { id: s4, text: "Si ya no quieres recibir estos correos, puedes darte de baja aquí.", issue: "Incluye el enlace de baja, correcto", flagIfMarked: "frase_reutilizable" }

        - slot: 4
          block_id: ai_textfield_free
          title: "Pídele la corrección."
          body: "Escribe el siguiente encargo para Aurora Copiloto. Sé concreto: qué quita, qué cambia, qué deja. Aquí es donde el borrador se vuelve enviable."
          content:
            placeholder: "Dile qué corregir del borrador anterior..."

        - slot: 5
          block_id: ai_output_review
          title: "Esta es la versión corregida."
          body: "Aurora Copiloto aplicó tu encargo. **Revisa que de verdad arregló lo que pediste** y marca lo que aún no te convence. Ojo: al corregir, a veces vuelve a meter algo nuevo."
          content:
            segments:
              - { id: v1, text: "Hola, en Aurora Retail preparamos algo para clientes como tú.", issue: "Quitó la fecha exacta, ahora habla en general", flagIfMarked: "frase_reutilizable" }
              - { id: v2, text: "Muchos clientes vuelven por nuestras temporadas nuevas.", issue: "Quitó el 35% inventado, ahora es una frase sin cifra", flagIfMarked: "frase_reutilizable" }
              - { id: v3, text: "Tenemos una selección para ti y un beneficio si vuelves esta semana.", issue: "Se mantuvo, está bien", flagIfMarked: "frase_reutilizable" }
              - { id: v4, text: "Además, ahora el 92% de los pedidos llega en menos de 48 horas.", issue: "El modelo metió una cifra nueva e inventada al corregir", flagIfMarked: "claim_no_verificado" }

    # ============================================================
    # SECCION 4 · REVISION (4 ai_native + 1 pasivo)
    # ============================================================
    - id: revision
      name: "Revisión"
      slides:

        - slot: 1
          block_id: ai_output_review
          title: "Caza las cifras que no puedes sostener."
          body: "El mensaje ya está más limpio, pero quedan **números**. Marca cada cifra que no podrías defender si Mariana o Legal te la cuestionan."
          content:
            segments:
              - { id: r1, text: "Más del 80% de nuestros clientes vuelve a comprar en tres meses.", issue: "Estadística sin fuente", flagIfMarked: "claim_no_verificado" }
              - { id: r2, text: "Tu categoría favorita tiene 200 productos nuevos esta temporada.", issue: "Cifra de catálogo inventada", flagIfMarked: "claim_no_verificado" }
              - { id: r3, text: "Tenemos una selección para ti y un beneficio si vuelves esta semana.", issue: "Frase sin cifra, aceptable", flagIfMarked: "frase_reutilizable" }
              - { id: r4, text: "Si ya no quieres recibir estos correos, puedes darte de baja aquí.", issue: "Enlace de baja, correcto", flagIfMarked: "frase_reutilizable" }

        - slot: 2
          block_id: ai_comparison
          title: "Elige cómo cierra el mensaje."
          body: "Cuatro formas de cerrar, de la más directa a la más suave. Elige la que le hablaría mejor a un cliente que ya te conoce."
          content:
            options:
              - { id: A, title: "Directo", body: "Vuelve esta semana y aprovecha el beneficio. Compra aquí." }
              - { id: B, title: "Cercano", body: "Si quieres pasar a ver lo nuevo, aquí está tu beneficio. Cuando gustes." }
              - { id: C, title: "Suave", body: "Te dejamos la selección por aquí. Si te late, el beneficio te espera." }
              - { id: D, title: "Sobrio", body: "Gracias por seguir con nosotros. Aquí tienes una selección y un beneficio si decides volver." }

        - slot: 3
          block_id: reading_message
          title: "Mariana revisó tu borrador."
          body: "Te responde por chat."
          content:
            message:
              channel: chat
              from: { name: "Mariana Robles", role: "Líder de Crecimiento" }
              to: { name: "Tú" }
              timestamp: "Hace 10 minutos"
              body: "Va quedando bien. Dos cosas antes de que sigas: confirma que **sacaste a la gente que pidió baja** (es lo que pidió Daniela, la regla 2 de la política) y revisa que el correo deje **el enlace para darse de baja** bien visible. Si esas dos están, por mí avanza."

        - slot: 4
          block_id: categorize_rows
          title: "Última revisión del mensaje, línea por línea."
          body: "Por cada parte del correo, decide si la dejas, la corriges o la quitas antes de mandar."
          content:
            actionStyle: neutral
            actions:
              - { value: dejar, label: "Dejar" }
              - { value: corregir, label: "Corregir" }
              - { value: quitar, label: "Quitar" }
            rows:
              - { id: m1, label: "Asunto: Algo nuevo para ti en Aurora Retail", example: "Asunto claro, sin promesa falsa", hint: "Dejar" }
              - { id: m2, label: "Más del 80% de los clientes vuelve en tres meses", example: "Cifra inventada que ya marcaste", hint: "Quitar" }
              - { id: m3, label: "Tenemos una selección para ti y un beneficio esta semana", example: "Oferta concreta y honesta", hint: "Dejar" }
              - { id: m4, label: "Saludo con el nombre completo del cliente", example: "Mejor un saludo general, sin el dato exacto", hint: "Corregir" }
              - { id: m5, label: "Enlace para darse de baja", example: "Lo pidió Legal, tiene que estar", hint: "Dejar" }

        - slot: 5
          block_id: ai_comparison
          title: "Elige la versión final."
          body: "Tres versiones del mensaje completo, ya con tus correcciones. Elige la que mandarías el lunes."
          content:
            options:
              - { id: A, title: "Versión A", body: "Hola, en Aurora Retail preparamos una selección para ti y un beneficio si vuelves esta semana. Si ya no quieres estos correos, puedes darte de baja aquí." }
              - { id: B, title: "Versión B", body: "Gracias por seguir con nosotros en Aurora Retail. Tenemos algo nuevo y un beneficio si decides pasar. Puedes darte de baja en este enlace cuando quieras." }
              - { id: C, title: "Versión C", body: "En Aurora Retail pensamos en ti: una selección y un beneficio esta semana. Si prefieres no recibir más correos, te das de baja aquí." }
              - { id: D, title: "Versión D", body: "Tu beneficio de cliente te espera esta semana en Aurora Retail. Pásate a ver la selección que armamos. Si ya no quieres estos correos, te das de baja en este enlace." }

    # ============================================================
    # SECCION 5 · CIERRE (3 ai_native + 1 traditional + 1 pasivo)
    # ============================================================
    - id: cierre
      name: "Cierre"
      slides:

        - slot: 1
          block_id: ai_comparison
          title: "Elige a qué segmento le mandas primero."
          body: "Cuatro formas de armar el segmento con los clientes que decidiste usar. Cada una tiene un pero. Elige cuál llevas a Mariana. Es el primer entregable: los **segmentos**."
          content:
            options:
              - { id: A, title: "Clientes activos de alto valor", body: "Los que compran seguido y gastan más. El pero: ya están comprando, el riesgo es cansarlos con otro correo." }
              - { id: B, title: "Clientes por reactivar", body: "Los que abren los correos pero no compran hace meses. El reto es darles una razón concreta para volver, no solo decir que los extrañas." }
              - { id: C, title: "Toda la base limpia, sin segmentar", body: "Mandarle a todos los clientes usables. Es lo más rápido, pero el mismo mensaje no le habla igual a cada grupo." }
              - { id: D, title: "Solo quienes compraron el último mes", body: "Los más recientes. Llegas seguro, pero te dejas fuera justo a los que querías reactivar." }

        - slot: 2
          block_id: ai_textfield_free
          title: "Escribe el mensaje base que entregas."
          body: "Es el segundo entregable: el **mensaje base** que pide Mariana, el texto completo que recibiría el segmento que elegiste. Escríbelo como lo mandarías, con el beneficio y el enlace de baja."
          content:
            placeholder: "Escribe el mensaje completo para el segmento elegido..."

        - slot: 3
          block_id: categorize_rows
          title: "Define qué métricas vas a monitorear."
          body: "El tercer entregable. De esta lista, marca cuáles vas a vigilar después del envío y cuáles no te dicen nada para este caso."
          content:
            actionStyle: neutral
            actions:
              - { value: monitorear, label: "Monitorear" }
              - { value: ignorar, label: "Ignorar" }
            rows:
              - { id: met1, label: "Recompra a 30 días", example: "El objetivo del envío, hay que superar 3.4%", hint: "Monitorear" }
              - { id: met2, label: "Quejas y bajas", example: "La alarma de Legal, no debe pasar de 1.8%", hint: "Monitorear" }
              - { id: met3, label: "Tasa de rebote", example: "Dice si la base quedó limpia", hint: "Monitorear" }
              - { id: met4, label: "Seguidores en redes sociales", example: "No tiene que ver con este envío", hint: "Ignorar" }
              - { id: met5, label: "Clics totales del sitio", example: "Muy general, no mide retención", hint: "Ignorar" }

        - slot: 4
          block_id: reading_passive
          title: "Así llega el correo al cliente."
          body: "Vista previa del correo final, como lo recibiría el segmento que elegiste. El sistema ya dejó fuera a los clientes que pidieron baja, como pidió Legal.\n\n---\n\n**Asunto:** Algo nuevo para ti en Aurora Retail\n\nHola, en Aurora Retail preparamos una selección para ti y un beneficio si vuelves esta semana.\n\n**[ Ver la selección ]**\n\n*Si ya no quieres recibir estos correos, puedes darte de baja aquí.*"

        - slot: 5
          block_id: tradeoff_decision_memo
          title: "Cierra con tu recomendación para Mariana."
          body: "Elige qué haces con el envío y escríbele el memo a Mariana. Es lo último: la decisión que vas a defender."
          content:
            decisions:
              - { id: lanzar_lunes, title: "Lanzar el lunes", detail: "Si la base quedó limpia, las cifras inventadas se fueron y el correo lleva el enlace de baja, mándalo según el plan." }
