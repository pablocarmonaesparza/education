# Caso ensamblado · marketing_dirty_data_relaunch v2
#
# Una sola historia: relanzar la campana de retencion de Aurora Retail a sus
# clientes propios, con la base sucia. 5 secciones x 5 slides = 25.
# Ratio ai_native: 15/25 = 60%. Nivel N1.
#
# FUENTE DE VERDAD. El demo /case-demo se genera de este archivo
# (scripts/simulador/generate-case-demo.mjs). No editar el TSX a mano: editar
# aqui y regenerar. Cada slide.content es el caseContext del bloque. Los campos
# judge_internal (hint, example, issue, goodWhen) se co-localizan aqui por
# ergonomia de autoria y se remueven antes de llegar al cliente del bloque.
#
# NOTA DE COPY: los comentarios van en ASCII y en espanol (son para el equipo);
# los strings de title/body/content que ve el participante van en INGLES DE
# NEGOCIOS DE EEUU. Glosario canonico: docs/simulador/front/copy/00_EN_GLOSSARY.md.
#
# RELOCALIZADO A EEUU 2026-07-16 (glosario §8). No es traduccion:
#   - Moneda: USD explicito en la columna de valor. El monto ya no es ambiguo.
#   - Cast: nombres US-plausibles, sin acentos.
#   - Beat regulatorio: anclado en CCPA/CPRA (opt-out de privacidad) y CAN-SPAM
#     (enlace de baja visible), no en LFPDPPP / Ley 1581.
#   - Los identificadores NO cambiaron: case_id, ids de seccion y slot (de ahi
#     salen contexto-1, datos-3, ia-2...), block_id, ids de fila (c1..c5, f1..f6,
#     m1..m5, met1..met5, s1..s4, v1..v4, r1..r4, A/B/C/D), los value de acciones
#     (usar/anonimizar/excluir/escalar, dejar/corregir/quitar, monitorear/ignorar,
#     va/transformada/no_va), los flagIfMarked (ReviewFlag en
#     lib/simulador/exercise-registry.ts), las claves de guided (entrega,
#     objetivos, audiencias, limites: las lee AITextfieldGuided.tsx literal), ni
#     los enums de BD (entrenar/pilotar/pausar). Todo eso es display-layer.
#
# Biblia de continuidad (hechos canonicos, ningun slide inventa fuera de esto):
#   Empresa: Aurora Retail (retailer omnicanal en EEUU).
#   Tu rol: Growth / CRM Analyst.
#   Megan Rowe: Growth Lead. Asigna y recibe. Nunca destinataria.
#   Nicole Barrett: Privacy Counsel. Levanta el ticket y su queja se cierra.
#   Aurora Copilot: el asistente de IA. Instrumento dado, no se elige.
#   Destinatario del mensaje: SIEMPRE un segmento de clientes. Nunca Megan.
#   Fechas absolutas, formato US. Hoy May 30, 2026. Ultima campana Apr 18, 2026.
#   Deadline viernes Jun 5, 2026.
#   Dinero: SIEMPRE USD explicito. La tension del caso: Renee Grant es la cliente
#   de mayor valor de la lista ($14,200 USD a 12 meses) Y trae opt-out de CCPA.
#   La regla dura le gana al monto. Si el monto se lee ambiguo, el ejercicio
#   pierde el filo: por eso la columna dice USD.
#
# Dos beats regulatorios distintos, a proposito (asi opera un CRM en EEUU):
#   - Opt-out de CCPA (Renee Grant): bandera de privacidad. Se excluye.
#   - Unsubscribe (Lily Foster): baja de email, CAN-SPAM. Se excluye.
#   No son la misma cosa y el participante tiene que reconocer las dos.

case_assembly:
  case_id: marketing_dirty_data_relaunch
  version: 2
  status: ready
  schema_version: 1.0.0

  meta:
    level: "N1 · Fundamentals"
    profile: "Marketing"
    profile_pack: marketing_growth
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "Can this person clean a customer list with privacy judgment and put together a responsible retention send?"
    assignment_brief: "Assign this case when you want to know whether someone in Marketing can clean up a customer list (consent, bounces, duplicates), ask AI for a useful message without leaking personal data, review what comes back, and decide whether to launch, pilot, or pause. The result tells you whether they can run campaigns with judgment or need practice before touching real data."
    business_metric: "30-day repeat purchase from the retention campaign"
    risk_metric: "emails to customers who opted out, or personal data sent to the model without transformation"
    expected_signal: "tells the difference between cleaning with judgment and taking a risky shortcut"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:

    # ============================================================
    # SECCION 1 · CONTEXTO (5 pasivos · onboarding)
    # ============================================================
    - id: contexto
      name: "Context"
      slides:

        - slot: 1
          block_id: case_cover
          title: "Relaunch retention with the list as it came in"
          body: "You work at **Aurora Retail**. Your manager asked you to **relaunch the retention campaign** to your regular customers before **Friday**. The list arrived with duplicates, people who unsubscribed, and emails that already bounce. You decide what gets cleaned, what you ask AI for, and what you hand your manager."
          content:
            meta:
              profile: "Marketing"
              level: "N1 · Fundamentals"
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - { kind: ai, label: "AI" }
                - { kind: data, label: "Tables" }
                - { kind: messaging, label: "Messaging" }
                - { kind: documents, label: "Documents" }

        - slot: 2
          block_id: reading_message
          title: "Megan assigns you the relaunch"
          body: "Read it all the way through. What she asks for here is what you deliver at the end."
          content:
            message:
              channel: email
              from: { name: "Megan Rowe", role: "Growth Lead · Aurora Retail" }
              to: { name: "You", role: "Growth Analyst" }
              timestamp: "Today, 9:40 AM"
              subject: "We relaunch the retention campaign this week"
              body: "Hi. This week we **relaunch the retention campaign** to our regular customers, and it closes **Friday**. The list I am sending you has problems, so the first job is to get it clean. Once you have it, send me a proposal with three things: the **segments** you will write to, the **base message** they receive, and the **metrics you will track** to know whether it worked. Any questions, let me know."

        - slot: 3
          block_id: reading_data_table
          title: "This is how the customer list arrived"
          body: "A sample of the list, with the usual problems. In the next section you decide what to do with each customer."
          content:
            table:
              caption: "Sample of the customer list (of 480)"
              columns:
                - { key: nombre, label: "Customer" }
                - { key: ultima_compra, label: "Last purchase" }
                - { key: consentimiento, label: "Consent status" }
                - { key: entrega, label: "Deliverability" }
                - { key: valor, label: "12-month spend (USD)" }
              rows:
                - { nombre: "Paula Reed", ultima_compra: "Apr 22, 2026", consentimiento: "Subscribed", entrega: "OK", valor: "$8,400" }
                - { nombre: "Renee Grant", ultima_compra: "May 10, 2026", consentimiento: "Privacy opt-out", entrega: "OK", valor: "$14,200" }
                - { nombre: "Brian Sloan", ultima_compra: "Mar 15, 2026", consentimiento: "Subscribed", entrega: "Bounces", valor: "$3,200" }
                - { nombre: "Lily Foster", ultima_compra: "Feb 1, 2026", consentimiento: "Unsubscribed", entrega: "OK", valor: "$5,100" }

        - slot: 4
          block_id: reading_kpi_cards
          title: "How the April campaign did"
          body: "The numbers from the last retention send, the one on **Apr 18**. They are your baseline for what you propose."
          content:
            kpis:
              - { label: "Open rate", value: "22%", delta: { direction: flat, label: "flat since the last send" } }
              - { label: "30-day repeat purchase", value: "3.4%", delta: { direction: flat, label: "the number to beat", goodWhen: "higher" } }
              - { label: "Complaints and unsubscribes", value: "1.8%", delta: { direction: flat, label: "the number to protect", goodWhen: "lower" } }

        - slot: 5
          block_id: reading_message
          title: "Nicole, from Legal, already raised a flag"
          body: "Before you touch anything, read what happened with the last send."
          content:
            message:
              channel: ticket
              from: { name: "Nicole Barrett", role: "Privacy Counsel · Aurora Retail" }
              to: { name: "Marketing" }
              timestamp: "6 days ago"
              subject: "Complaints from customers who had unsubscribed"
              body: "The April send drew complaints from **customers who had already unsubscribed** and got the email anyway. Before the next send I need you to confirm two things: that you **excluded everyone who unsubscribed or has a privacy opt-out on file**, and that the email carries **a visible unsubscribe link**, which commercial email rules require. If anything is unclear, write to me."

    # ============================================================
    # SECCION 2 · DATOS (4 ai_native + 1 pasivo)
    # ============================================================
    - id: datos
      name: "Data handling"
      slides:

        - slot: 1
          block_id: categorize_rows
          title: "Decide what you do with each customer"
          body: "Pick one action per customer. Some are clear from the data policy; others take your judgment. Hard rule: **anyone who unsubscribed or has a privacy opt-out on file is always excluded**."
          content:
            actionStyle: permission
            actions:
              - { value: usar, label: "Use" }
              - { value: anonimizar, label: "Anonymize" }
              - { value: excluir, label: "Exclude" }
              - { value: escalar, label: "Escalate" }
            rows:
              - { id: c1, label: "Paula Reed · bought 5 weeks ago · opens often", example: "Active customer, no issues", hint: "Use" }
              - { id: c2, label: "Tom Ingram · no purchase in 6 months · still opens", example: "Reactivation candidate", hint: "Use" }
              - { id: c3, label: "Renee Grant · privacy opt-out on file · $14,200 USD over 12 months", example: "Top spender on the list, and the opt-out still wins. The money is the pull; the hard rule is the answer.", hint: "Exclude" }
              - { id: c4, label: "Brian Sloan · his email bounces", example: "Bounces, invalid address", hint: "Exclude" }
              - { id: c5, label: "Lily Foster · unsubscribed", example: "Unsubscribed, source of Nicole's ticket", hint: "Exclude" }

        - slot: 2
          block_id: categorize_rows
          title: "Decide which columns you pass to AI"
          body: "**Aurora Copilot**, the company assistant, will write the message. For each column, decide whether you pass it as is, transformed, or not at all. Whatever you type into the assistant leaves the protected list."
          content:
            actionStyle: neutral
            actions:
              - { value: va, label: "Goes to the model" }
              - { value: transformada, label: "Goes transformed" }
              - { value: no_va, label: "Does not go" }
            rows:
              - { id: f1, label: "Customer name", example: "Personal information, direct identifier", hint: "Does not go, or anonymize" }
              - { id: f2, label: "Email", example: "Personal identifier under state privacy law", hint: "Does not go" }
              - { id: f3, label: "Last purchase (date)", example: "Useful signal, does not identify anyone", hint: "Goes" }
              - { id: f5, label: "Consent status", example: "Already used to filter, does not belong in the copy", hint: "Does not go" }
              - { id: f6, label: "12-month spend (USD)", example: "Better as a range than as an exact amount", hint: "Goes transformed" }

        - slot: 3
          block_id: model_tradeoff_sliders
          title: "Weigh what matters most when you use AI with customer data"
          body: "For customer data, how much weight goes to model autonomy, security, and cost? Move the three controls to match your judgment."
          content:
            modelTradeoff:
              prompt: "For customer data, what matters most?"
              sliderLabels:
                autonomy: "Model autonomy"
                security: "Data security"
                cost: "Cost"

        - slot: 4
          block_id: ai_textfield_free
          title: "Tell Aurora Copilot which data it cannot use"
          body: "Before you ask for the message, set the limit. In one or two sentences, tell it which columns it must not use and how to handle personal information. This is what you will review later, when you check whether it held the line."
          content:
            placeholder: "Tell the assistant which data it must not use and how to handle personal information..."

        - slot: 5
          block_id: reading_attachment
          title: "Aurora's data policy, in three rules"
          body: "It is short. These three rules apply to this send. You will have to stand behind them if Legal asks."
          content:
            attachments:
              - name: "Aurora_Retail_Data_Policy.pdf"
                size: "2 pages"
                kind: pdf
                description: "Rule 1: if an email bounces twice, it is excluded. Rule 2: anyone with a privacy opt-out on file, or who unsubscribed, is always excluded. Rule 3: anyone who never confirmed their email gets at most one re-permission email."

    # ============================================================
    # SECCION 3 · IA (4 ai_native + 1 pasivo)
    # ============================================================
    - id: ia
      name: "AI"
      slides:

        - slot: 1
          block_id: reading_passive
          title: "What Aurora Copilot is and what it is not"
          body: "**Aurora Copilot** is the company's approved language assistant. It runs on Aurora's infrastructure.\n\n**What it can do:** draft, summarize, and adjust the tone of whatever you paste in.\n\n**What it cannot do:** reach into the customer list on its own, or send email. It only sees what you type into the prompt.\n\nOne thing to know: it sometimes **invents figures** or adds details that look like customer data even though you never gave them to it. That is why everything it returns has to be checked."

        - slot: 2
          block_id: ai_textfield_guided
          title: "Set up the request for Aurora Copilot"
          body: "You are going to generate the campaign's **base message**. Define the goal, who you are talking to, and the limits. Without those three decisions, the assistant improvises."
          content:
            guided:
              entrega: "Write the base message for the retention campaign, with no invented figures and no personal customer data."
              objetivos:
                - "Win back customers who stopped buying"
                - "Reinforce customers who keep buying"
                - "Reactivate people who open but do not buy"
                - "Announce a benefit for current customers"
              audiencias:
                - "High-value active customers"
                - "Customers who have not bought in months"
                - "Customers who open but do not buy"
                - "The whole list at once"
              limites:
                - "Do not use names or emails in the copy"
                - "Do not invent figures or results"
                - "Leave it as a draft to review"
                - "Include the unsubscribe link"

        - slot: 3
          block_id: ai_output_review
          title: "Aurora Copilot returned this draft"
          body: "It is the first attempt. **Flag what you would not let through** before you ask for a fix. Look for figures you cannot stand behind, personal data that should not be there, and tone."
          content:
            segments:
              - { id: s1, text: "Hi, we have missed you at Aurora Retail. We know your last purchase was exactly 47 days ago.", issue: "Exact personal detail that should never have gone to the model", flagIfMarked: "dato_sensible" }
              - { id: s2, text: "Customers who come back spend 35% more on average.", issue: "Invented figure with no source", flagIfMarked: "claim_no_verificado" }
              - { id: s3, text: "We put together a selection for you and a benefit if you come back this week.", issue: "Concrete offer, acceptable", flagIfMarked: "frase_reutilizable" }
              - { id: s4, text: "If you no longer want these emails, you can unsubscribe here.", issue: "Includes the unsubscribe link, correct", flagIfMarked: "frase_reutilizable" }

        - slot: 4
          block_id: ai_textfield_free
          title: "Ask for the fix"
          body: "Write the next request for Aurora Copilot. Be specific: what comes out, what changes, what stays. This is where the draft becomes sendable."
          content:
            placeholder: "Tell it what to fix in the previous draft..."

        - slot: 5
          block_id: ai_output_review
          title: "This is the corrected version"
          body: "Aurora Copilot applied your request. **Check that it actually fixed what you asked for** and flag whatever still does not convince you. Watch out: when it fixes things, it sometimes slips in something new."
          content:
            segments:
              - { id: v1, text: "Hi, at Aurora Retail we put something together for customers like you.", issue: "Dropped the exact date, now speaks in general terms", flagIfMarked: "frase_reutilizable" }
              - { id: v2, text: "A lot of customers come back for our new seasons.", issue: "Dropped the invented 35%, now it is a line with no figure", flagIfMarked: "frase_reutilizable" }
              - { id: v3, text: "We have a selection for you and a benefit if you come back this week.", issue: "Kept, it is fine", flagIfMarked: "frase_reutilizable" }
              - { id: v4, text: "Also, 92% of orders now arrive in under 48 hours.", issue: "The model slipped in a new invented figure while fixing the old one", flagIfMarked: "claim_no_verificado" }

    # ============================================================
    # SECCION 4 · REVISION (4 ai_native + 1 pasivo)
    # ============================================================
    - id: revision
      name: "Verification"
      slides:

        - slot: 1
          block_id: ai_output_review
          title: "Hunt the figures you cannot stand behind"
          body: "The message is cleaner now, but **numbers** are still in there. Flag every figure you could not defend if Megan or Legal pushed back."
          content:
            segments:
              - { id: r1, text: "More than 80% of our customers buy again within three months.", issue: "Statistic with no source", flagIfMarked: "claim_no_verificado" }
              - { id: r2, text: "Your favorite category has 200 new products this season.", issue: "Invented catalog figure", flagIfMarked: "claim_no_verificado" }
              - { id: r3, text: "We have a selection for you and a benefit if you come back this week.", issue: "Line with no figure, acceptable", flagIfMarked: "frase_reutilizable" }
              - { id: r4, text: "If you no longer want these emails, you can unsubscribe here.", issue: "Unsubscribe link, correct", flagIfMarked: "frase_reutilizable" }

        - slot: 2
          block_id: ai_comparison
          title: "Pick how the message closes"
          body: "Four ways to close. Pick the one that would speak best to a customer who already knows you."
          content:
            options:
              - { id: A, title: "Closing 1", body: "Come back this week and take the benefit. Shop here." }
              - { id: B, title: "Closing 2", body: "If you want to see what is new, your benefit is here. Whenever you like." }
              - { id: C, title: "Closing 3", body: "We are leaving the selection right here. If you like it, the benefit is waiting." }
              - { id: D, title: "Closing 4", body: "Thanks for staying with us. Here is a selection and a benefit if you decide to come back." }

        - slot: 3
          block_id: reading_message
          title: "Megan reviewed your draft"
          body: "She replies over chat."
          content:
            message:
              channel: chat
              from: { name: "Megan Rowe", role: "Growth Lead" }
              to: { name: "You" }
              timestamp: "10 minutes ago"
              body: "This is coming along. Two things before you go further: confirm you **took out the people who unsubscribed** (that is what Nicole asked for, rule 2 of the policy) and check that the email keeps **the unsubscribe link** clearly visible. If those two are in, go ahead as far as I am concerned."

        - slot: 4
          block_id: categorize_rows
          title: "Last pass on the message, line by line"
          body: "For each part of the email, decide whether you keep it, fix it, or cut it before sending."
          content:
            actionStyle: neutral
            actions:
              - { value: dejar, label: "Keep" }
              - { value: corregir, label: "Fix" }
              - { value: quitar, label: "Cut" }
            rows:
              - { id: m1, label: "Subject: Something new for you at Aurora Retail", example: "Clear subject, no false promise", hint: "Keep" }
              - { id: m2, label: "More than 80% of customers buy again within three months", example: "Invented figure you already flagged", hint: "Cut" }
              - { id: m3, label: "We have a selection for you and a benefit this week", example: "Concrete, honest offer", hint: "Keep" }
              - { id: m4, label: "Greeting with the customer's full name", example: "Better a general greeting, without the exact detail", hint: "Fix" }
              - { id: m5, label: "Unsubscribe link", example: "Legal asked for it, it has to be there", hint: "Keep" }

        - slot: 5
          block_id: ai_comparison
          title: "Pick the final version"
          body: "Four versions of the full message, with your fixes in. Pick the one you would send Monday."
          content:
            options:
              - { id: A, title: "Version A", body: "Hi, at Aurora Retail we put together a selection for you and a benefit if you come back this week. If you no longer want these emails, you can unsubscribe here." }
              - { id: B, title: "Version B", body: "Thanks for staying with us at Aurora Retail. We have something new and a benefit if you decide to stop by. You can unsubscribe at this link whenever you want." }
              - { id: C, title: "Version C", body: "At Aurora Retail we had you in mind: a selection and a benefit this week. If you would rather not get more emails, unsubscribe here." }
              - { id: D, title: "Version D", body: "Your customer benefit is waiting this week at Aurora Retail. Come see the selection we put together. If you no longer want these emails, unsubscribe at this link." }

    # ============================================================
    # SECCION 5 · CIERRE (3 ai_native + 1 traditional + 1 pasivo)
    # ============================================================
    - id: cierre
      name: "Close"
      slides:

        - slot: 1
          block_id: ai_comparison
          title: "Pick which segment you send to first"
          body: "Four ways to build the segment out of the customers you decided to use. Each one has a catch. Pick the one you take to Megan. It is the first deliverable: the **segments**."
          content:
            options:
              - { id: A, title: "High-value active customers", body: "The ones who buy often and spend the most. The catch: they are already buying, so the risk is wearing them out with another email." }
              - { id: B, title: "Customers to reactivate", body: "They open the emails but have not bought in months. The challenge is giving them a concrete reason to come back, not just saying you miss them." }
              - { id: C, title: "The whole clean list, no segmentation", body: "Send to every usable customer. It is the fastest, but the same message does not speak to every group the same way." }
              - { id: D, title: "Only people who bought in the last month", body: "The most recent ones. You will land for sure, but you leave out exactly the people you wanted to reactivate." }

        - slot: 2
          block_id: ai_textfield_free
          title: "Write the base message you deliver"
          body: "It is the second deliverable: the **base message** Megan asked for, the full text the segment you picked would receive. Write it the way you would send it, with the benefit and the unsubscribe link."
          content:
            placeholder: "Write the full message for the segment you picked..."

        - slot: 3
          block_id: categorize_rows
          title: "Define which metrics you will track"
          body: "The third deliverable. From this list, mark which ones you will watch after the send and which tell you nothing for this case."
          content:
            actionStyle: neutral
            actions:
              - { value: monitorear, label: "Track" }
              - { value: ignorar, label: "Ignore" }
            rows:
              - { id: met1, label: "30-day repeat purchase", example: "The goal of the send, it has to beat 3.4%", hint: "Track" }
              - { id: met2, label: "Complaints and unsubscribes", example: "Legal's alarm, it must not go above 1.8%", hint: "Track" }
              - { id: met3, label: "Bounce rate", example: "Tells you whether the list came out clean", hint: "Track" }
              - { id: met4, label: "Social media followers", example: "Nothing to do with this send", hint: "Ignore" }
              - { id: met5, label: "Total site clicks", example: "Too general, does not measure retention", hint: "Ignore" }

        - slot: 4
          block_id: reading_passive
          title: "This is how the email lands for the customer"
          body: "Preview of the final email, the way the segment you picked would receive it.\n\n---\n\n**Subject:** Something new for you at Aurora Retail\n\nHi, at Aurora Retail we put together a selection for you and a benefit if you come back this week.\n\n**[ See the selection ]**\n\n*If you no longer want these emails, you can unsubscribe here.*"

        - slot: 5
          block_id: tradeoff_decision_memo
          title: "Close with your recommendation for Megan"
          body: "Pick what you do with the send and write the memo to Megan. This is the last one: the decision you will have to defend."
          content:
            decisions:
              - { id: lanzar_lunes, title: "Launch Monday", detail: "Send the campaign to the whole segment on Monday, per the plan. Benefit: you hit the date Megan asked for. Cost: if anything was left unclean, the error reaches the whole list." }
              - { id: piloto_controlado, title: "Pilot with one segment", detail: "Send to only part of the list this week and measure before expanding. Benefit: you catch problems small. Cost: you reach fewer customers up front." }
              - { id: pausar_y_limpiar, title: "Pause to finish cleaning", detail: "Stop the send to close out the list cleanup. Benefit: you lower the data risk. Cost: you lose part of the week's window." }
              - { id: pausar_y_escalar, title: "Pause and escalate to Legal", detail: "Take the open questions to Megan and Legal before sending. Benefit: formal cover. Cost: it depends on their response time." }
            memoPlaceholder: "Write to Megan: what you decided, why, and what you protected in the list and in the data..."
            memoAudience: "Megan Rowe · Growth Lead"
