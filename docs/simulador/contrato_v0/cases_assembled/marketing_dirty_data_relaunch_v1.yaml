# Caso ejemplo · marketing_dirty_data_relaunch v1
#
# Primer caso ensamblado con el nuevo formato CASE_ASSEMBLY_SCHEMA v1.0.0.
# 5 secciones × 5 diapositivas = 25 slides totales.
#
# Nivel: N1 (Fundamentos)
# Perfil: Marketing operativo
# Duracion: ~12 minutos
#
# Manager outcome: ¿puede esta persona limpiar datos sucios y armar un
# envio responsable antes del lunes?
#
# Ratio: 15 activos (60%) + 10 pasivos (40%). Cumple AI-native >= 60%.

case_assembly:
  case_id: marketing_dirty_data_relaunch
  version: 1
  status: draft
  schema_version: 1.0.0

  meta:
    level: "N1 · Fundamentos"
    profile: "Marketing"
    profile_pack: marketing_growth
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools: [ai, data, messaging, documents]

  manager_outcome:
    primary_question: "Puede esta persona limpiar datos sucios y armar un envio responsable antes del lunes?"
    assignment_brief: "Asigna este caso cuando quieras saber si alguien de Marketing operativo puede limpiar una base de contactos con problemas reales, escribir un prompt util a la inteligencia artificial y decidir si lanzar, pilotar o pausar bajo presion de fecha. El resultado te dira si esa persona puede operar campanas con criterio de datos o necesita practica antes de tocar bases reales."
    business_metric: "tiempo de respuesta a la campana del lunes"
    risk_metric: "envios con datos personales no autorizados o contactos duplicados"
    expected_signal: "distingue limpieza util de atajo riesgoso"
    expected_action: entrenar
    alternatives: [pilotar, pausar]

  sections:
    # ============================================================
    # SECCION 1 · CONTEXTO
    # Objetivo: entender la situacion, el deadline, los stakeholders.
    # Mix: 5 pasivos (onboarding completo al caso · OK por regla).
    # ============================================================

    - id: contexto
      name: "Contexto"
      slides:

        - slot: 1
          block_id: case_cover
          content:
            title: "Envío del lunes con datos sucios."
            body: "Tu manager acaba de pasarte la **lista de 480 contactos** para la campaña del **lunes a las 8 de la mañana**. Hay registros **duplicados**, cargos **mal escritos** y tres filas **sin nombre**. Decides cómo limpiar la base, qué pedirle a la inteligencia artificial y qué entregar antes del cierre del viernes."
            cta_label: "Iniciar caso"

        - slot: 2
          block_id: reading_message
          content:
            title: "Correo de Mariana, tu jefa."
            body: "Lo que llega antes de empezar."
            channel: email
            from:
              name: "Mariana Robles"
              role: "Líder de Crecimiento · Aurora Retail"
            to: "Tú · Líder de Marketing"
            timestamp: "Hoy, 09:42"
            subject: "Necesitamos relanzar la campaña antes del viernes"
            body_message: "Hola, el comité directivo pidió relanzar la campaña de retención antes del viernes. Presupuesto sin tocar. Mándame propuesta hoy mismo con segmentos, mensaje base y métricas que vas a monitorear. Gracias."

        - slot: 3
          block_id: reading_data_table
          content:
            title: "Vista previa de la base que te pasaron."
            body: "Vista rápida de los primeros 5 contactos. **Hay problemas evidentes** desde la primera mirada."
            caption: "Contactos pendientes para el envío del lunes"
            columns:
              - { key: contacto, label: "Contacto" }
              - { key: empresa, label: "Empresa" }
              - { key: cargo, label: "Cargo" }
              - { key: ultima_apertura, label: "Última apertura" }
              - { key: estatus, label: "Estatus" }
            rows:
              - { contacto: "Mariana Robles", empresa: "Aurora Retail", cargo: "Líder de Crecimiento", ultima_apertura: "Hace 3 días", estatus: "Activa" }
              - { contacto: "mariana robles", empresa: "Aurora Retail", cargo: "head of growth", ultima_apertura: "Hace 21 días", estatus: "Activa" }
              - { contacto: "", empresa: "Bosa Industrial", cargo: "Director", ultima_apertura: "Hace 7 días", estatus: "Activa" }
              - { contacto: "Carlos Méndez", empresa: "Cresta Software", cargo: "DIR MKT", ultima_apertura: "Hace 60 días", estatus: "Inactiva" }
              - { contacto: "Lucía Soto", empresa: "Delta Logistics", cargo: "Gerente comercial", ultima_apertura: "Hace 5 días", estatus: "Activa" }

        - slot: 4
          block_id: reading_kpi_cards
          content:
            title: "Cómo va la cuenta hasta hoy."
            body: "Métricas de la **última campaña** que enviaste hace un mes. Te dan el punto de partida para esta."
            kpis:
              - { value: "23.4%", label: "Tasa de apertura", delta: { value: "-4.2 pp", direction: down } }
              - { value: "3.1%", label: "Conversión a demo", delta: { value: "+0.6 pp", direction: up } }
              - { value: "12", label: "Quejas por privacidad", delta: { value: "+8", direction: down } }

        - slot: 5
          block_id: reading_message
          content:
            title: "Ticket de Legal sobre la base anterior."
            body: "Lo que dejó la última campaña antes de empezar esta."
            channel: ticket
            from:
              name: "Daniela Ruiz"
              role: "Legal · Aurora Retail"
            to: "Marketing"
            timestamp: "Hace 6 días"
            subject: "Quejas por uso de datos personales"
            body_message: "Llegaron 3 quejas por correos enviados a personas que pidieron baja hace meses. Antes del próximo envío necesitamos confirmar que la base está limpia y que tenemos consentimiento vigente. Cualquier duda, marcar para revisión."

    # ============================================================
    # SECCION 2 · DATOS
    # Objetivo: decidir que datos usar, transformar o excluir.
    # Mix: 4 activos (categorize_rows × 3 + reading_attachment) + 1 pasivo.
    # ============================================================

    - id: datos
      name: "Datos"
      slides:

        - slot: 1
          block_id: reading_data_table
          content:
            title: "La base completa con todos los flags."
            body: "Aquí están los **8 contactos** problemáticos extraídos de los 480. Cada fila tiene una bandera del sistema. Lee bien antes de clasificar en la siguiente diapositiva."
            caption: "Contactos con problemas detectados"
            columns:
              - { key: contacto, label: "Contacto" }
              - { key: empresa, label: "Empresa" }
              - { key: problema, label: "Problema detectado" }
              - { key: consentimiento, label: "Consentimiento" }
            rows:
              - { contacto: "Mariana Robles", empresa: "Aurora Retail", problema: "Duplicado de fila 2", consentimiento: "Vigente" }
              - { contacto: "mariana robles", empresa: "Aurora Retail", problema: "Duplicado de fila 1 · capitalización distinta", consentimiento: "Vigente" }
              - { contacto: "", empresa: "Bosa Industrial", problema: "Sin nombre", consentimiento: "Vigente" }
              - { contacto: "Carlos Méndez", empresa: "Cresta Software", problema: "Cargo en mayúsculas raras (DIR MKT)", consentimiento: "Vigente" }
              - { contacto: "Ana Pérez", empresa: "Eclipse Health", problema: "Pidió baja hace 2 meses", consentimiento: "Revocado" }
              - { contacto: "Pedro Castillo", empresa: "Foro Studio", problema: "Correo rebota desde hace 4 envíos", consentimiento: "Vigente" }
              - { contacto: "", empresa: "Gama Capital", problema: "Sin nombre", consentimiento: "Vigente" }
              - { contacto: "Sofía Lara", empresa: "Helix Bio", problema: "Cargo vacío", consentimiento: "Vigente" }

        - slot: 2
          block_id: categorize_rows
          content:
            title: "Decide qué hacer con cada contacto."
            body: "Por cada fila elige una acción. **No hay opción correcta evidente** en todos los casos. Justifica con criterio operativo."
            prompt: "¿Qué haces con este contacto antes del envío?"
            action_style: permission
            actions: [usar, anonimizar, agregar, excluir]
            rows:
              - { id: 1, title: "Mariana Robles · Aurora Retail", subtitle: "Duplicado de fila 2", hint: "Capitalización distinta, mismo contacto" }
              - { id: 2, title: "mariana robles · Aurora Retail", subtitle: "Duplicado de fila 1", hint: "Capitalización distinta, mismo contacto" }
              - { id: 3, title: "(sin nombre) · Bosa Industrial", subtitle: "Sin nombre", hint: "Correo genérico info@bosa.example" }
              - { id: 4, title: "Carlos Méndez · Cresta Software", subtitle: "Cargo en mayúsculas raras", hint: "DIR MKT vs Director de Marketing" }
              - { id: 5, title: "Ana Pérez · Eclipse Health", subtitle: "Pidió baja hace 2 meses", hint: "Consentimiento revocado" }
              - { id: 6, title: "Pedro Castillo · Foro Studio", subtitle: "Correo rebota desde hace 4 envíos", hint: "Rebote permanente repetido" }
              - { id: 7, title: "(sin nombre) · Gama Capital", subtitle: "Sin nombre", hint: "Correo personal sofia.lara@gmail.example" }
              - { id: 8, title: "Sofía Lara · Helix Bio", subtitle: "Cargo vacío", hint: "Solo nombre y empresa" }

        - slot: 3
          block_id: categorize_rows
          content:
            title: "Decide qué campos van al modelo."
            body: "El **mensaje personalizado** lo va a generar la inteligencia artificial. Decide qué columnas le pasas y cuáles transformas antes para proteger los datos personales."
            prompt: "¿Qué hacemos con este campo antes de pasarlo a la IA?"
            action_style: permission
            actions: [usar, anonimizar, agregar, excluir]
            rows:
              - { id: contacto, title: "Contacto", subtitle: "Nombre completo", hint: "Dato personal directo" }
              - { id: email, title: "Email", subtitle: "Correo del contacto", hint: "Identificador único de la persona" }
              - { id: empresa, title: "Empresa", subtitle: "Razón social", hint: "Contexto de la cuenta" }
              - { id: cargo, title: "Cargo", subtitle: "Rol del contacto", hint: "Útil para personalizar tono" }
              - { id: ultima_apertura, title: "Última apertura", subtitle: "Engagement reciente", hint: "Señal de interés" }
              - { id: notas_internas, title: "Notas internas", subtitle: "Comentarios del equipo de ventas", hint: "Pueden contener info sensible" }

        - slot: 4
          block_id: reading_attachment
          content:
            title: "Política de datos vigente."
            body: "Lee antes de seguir. El documento define **qué se puede usar** con modelos externos y **qué requiere aprobación** legal."
            attachments:
              - name: "Politica_Datos_Aurora_Retail_v2.pdf"
                size: "184 KB"
                type: "pdf"
                description: "Política interna · datos permitidos para uso con inteligencia artificial externa"

        - slot: 5
          block_id: categorize_rows
          content:
            title: "Decide qué segmentos vas a incluir en el envío."
            body: "Tres segmentos posibles para el lunes. Cada uno tiene un tradeoff entre **alcance** y **calidad de respuesta**."
            prompt: "¿Cómo manejas este segmento?"
            action_style: neutral
            actions: [enviar, validar, excluir, posponer]
            rows:
              - { id: activos_recientes, title: "Activos recientes", subtitle: "Abrieron en los últimos 14 días", hint: "Mayor probabilidad de conversión" }
              - { id: dormidos, title: "Dormidos", subtitle: "Sin apertura entre 30 y 90 días", hint: "Necesitan mensaje de re-enganche" }
              - { id: inactivos, title: "Inactivos", subtitle: "Sin apertura hace más de 90 días", hint: "Riesgo de quejas por privacidad" }
              - { id: nuevos, title: "Nuevos sin engagement", subtitle: "Suscritos hace menos de 30 días, sin apertura", hint: "Pueden marcar como spam" }

    # ============================================================
    # SECCION 3 · IA
    # Objetivo: formular la peticion al modelo.
    # Mix: 4 activos + 1 pasivo (ai_output_review como cierre de iteracion).
    # ============================================================

    - id: ia
      name: "IA"
      # NOTA · model_tradeoff_sliders NO se usa en esta sección porque
      # DIAGNOSTICO_1_CASO_V0 §7 prohíbe selectores de modelo en el beat
      # IA ("el modelo es instrumento, no decisión del participante"). El
      # modelo se presenta como dado vía reading_passive en slot 1.
      slides:

        - slot: 1
          block_id: reading_passive
          content:
            title: "Modelo aprobado para este envío."
            body: "Para campañas con datos personales, el equipo de plataforma aprobó el **modelo corporativo interno**. Si necesitas otro modelo para algo específico, abres ticket. Para este envío usas el corporativo."

        - slot: 2
          block_id: ai_textfield_guided
          content:
            title: "Construye el prompt para el modelo."
            body: "Vas a generar el **mensaje base** del envío. Define objetivo, audiencia y límites en pasos. Sin estas decisiones, el modelo va a improvisar."
            objectives:
              - { id: convertir, label: "Convertir a demo" }
              - { id: reenganchar, label: "Reenganchar dormidos" }
              - { id: notificar, label: "Notificar mejora nueva" }
              - { id: educar, label: "Educar sobre uso" }
            audiences:
              - { id: head_growth, label: "Responsable de crecimiento de empresa mediana" }
              - { id: director_marketing, label: "Director de marketing" }
              - { id: gerente_ops, label: "Gerente de operaciones" }
              - { id: fundador, label: "Fundador o director general" }
            limits:
              - { id: sin_datos_personales, label: "Sin datos personales en el prompt" }
              - { id: sin_promesas, label: "Sin promesas de resultados específicos" }
              - { id: tono_directo, label: "Tono directo, sin adjetivos vacíos" }
              - { id: max_120_palabras, label: "Máximo 120 palabras" }

        - slot: 3
          block_id: ai_output_review
          content:
            title: "La inteligencia artificial generó esto. ¿Qué te detiene?"
            body: "Primer borrador del mensaje. **Marca lo que no usarías** antes de pedirle al modelo que corrija."
            prompt: "¿Qué problemas detectas en este borrador?"
            segments:
              # judge_internal: issue + flagIfMarked viven aquí · el shell
              # remueve issue antes de render · flagIfMarked es funcional.
              - { id: s1, text: "Hola Mariana, vimos que tu equipo abre nuestros correos desde hace meses.", issue: "Afirmación sin verificar", flagIfMarked: claim_no_verificado }
              - { id: s2, text: "Aurora Retail está creciendo 40% mes a mes, lo que nos motiva a contactarte.", issue: "Cifra sin fuente", flagIfMarked: claim_no_verificado }
              - { id: s3, text: "Nuestro producto ayudó a empresas similares a duplicar conversión en 2 semanas.", issue: "Promesa sin respaldo", flagIfMarked: claim_no_verificado }
              - { id: s4, text: "Agenda 15 minutos esta semana para ver cómo aplicaría a tu caso.", issue: "Llamado de acción aceptable", flagIfMarked: frase_reutilizable }
            flag_options: [claim_no_verificado, tono_agresivo, dato_sensible, frase_reutilizable]

        - slot: 4
          block_id: ai_textfield_free
          content:
            title: "Pídele a la inteligencia artificial que corrija."
            body: "Escribe el **siguiente prompt** que mandarías. Sé específico: qué quitar, qué cambiar, qué mantener. La iteración es donde se gana o se pierde el envío."
            model: "Modelo corporativo interno"
            placeholder: "Escribe el prompt de corrección..."
            attachments_allowed: false
            voice_allowed: false

        - slot: 5
          block_id: ai_output_review
          content:
            title: "Versión corregida. ¿Algo todavía te detiene?"
            body: "El modelo aplicó tu corrección. **Última pasada** antes de mandar a revisión completa de tono y cierre."
            prompt: "¿Qué marcarías todavía?"
            segments:
              - { id: v1, text: "Hola Mariana, vi en una nota pública que Aurora Retail abrió oficina en Monterrey la semana pasada.", issue: "Dato personalizado de fuente externa", flagIfMarked: dato_sensible }
              - { id: v2, text: "Trabajamos con equipos de Marketing en empresas medianas de retail en la región.", issue: "Afirmación interna verificable", flagIfMarked: frase_reutilizable }
              - { id: v3, text: "Si te interesa explorar cómo aplicaría a tu caso, te dejo dos horarios la próxima semana.", issue: "Cierre directo y opcional", flagIfMarked: frase_reutilizable }
              - { id: v4, text: "Si prefieres que mande la propuesta por escrito antes de cualquier llamada, también funciona.", issue: "Opción alterna educada", flagIfMarked: frase_reutilizable }
            flag_options: [claim_no_verificado, tono_agresivo, dato_sensible, frase_reutilizable]

    # ============================================================
    # SECCION 4 · REVISION
    # Objetivo: detectar errores antes de usar el output.
    # Mix: 4 activos (ai_output_review × 3 + ai_comparison) + 1 pasivo.
    # ============================================================

    - id: revision
      name: "Revisión"
      slides:

        - slot: 1
          block_id: ai_output_review
          content:
            title: "Revisión profunda del mensaje completo."
            body: "Versión más larga del mensaje. **Marca cada segmento** con la bandera que aplique. Puede no aplicar bandera si está bien."
            prompt: "¿Qué marcarías para corregir antes de enviar?"
            segments:
              - { id: r1, text: "Mariana, vi en LinkedIn que Aurora Retail abrió oficina en Monterrey la semana pasada." }
              - { id: r2, text: "El 87% de empresas como la tuya reducen costo operativo con nuestro producto." }
              - { id: r3, text: "Adjunto te dejo el reporte interno de Cresta Software, que tiene un caso muy similar al tuyo." }
              - { id: r4, text: "¿Puedo agendar 20 minutos contigo el jueves a las 10?" }
            flag_options:
              - claim_no_verificado
              - tono_agresivo
              - dato_sensible
              - frase_reutilizable

        - slot: 2
          block_id: ai_comparison
          content:
            title: "Elige el llamado a la acción para el envío."
            body: "Cuatro versiones del **cierre del mensaje**. Cada una tiene un equilibrio entre ser directo y dar espacio. Elige la que enviarías el lunes."
            prompt: "¿Cuál versión usarías como cierre del email?"
            options:
              - { id: A, text: "Agenda 15 min esta semana en este link." }
              - { id: B, text: "¿Tienes 15 minutos esta semana para una llamada corta?" }
              - { id: C, text: "Si te interesa, mándame un mensaje y coordinamos." }
              - { id: D, text: "Te dejamos la info por aquí; cuando puedas, agendamos." }

        - slot: 3
          block_id: ai_output_review
          content:
            title: "Datos que el modelo afirmó sin fuente."
            body: "El modelo metió **cifras** en el borrador. Marca las que no podrías sostener si te las cuestionan."
            prompt: "¿Qué afirmaciones no tienen respaldo verificable?"
            segments:
              - { id: c1, text: "Nuestros clientes duplican conversión en 2 semanas." }
              - { id: c2, text: "Aurora Retail está creciendo 40% mes a mes." }
              - { id: c3, text: "El 87% de empresas como la tuya reduce costo operativo." }
              - { id: c4, text: "Tenemos integraciones con HubSpot, Salesforce y Pipedrive." }
            flag_options:
              - claim_no_verificado
              - tono_agresivo
              - dato_sensible
              - frase_reutilizable

        - slot: 4
          block_id: reading_message
          content:
            title: "Feedback de Mariana sobre el primer borrador."
            body: "Tu jefa ya leyó la primera versión. Lee qué te respondió antes del último ajuste."
            channel: chat
            from:
              name: "Mariana Robles"
              role: "Líder de Crecimiento · Aurora Retail"
            to: "Tú"
            timestamp: "Hace 12 minutos"
            body_message: "Está bien la dirección, pero el cierre está muy agresivo y la cifra del 87% no sé de dónde sale. Si nos preguntan en el comité de privacidad, no la podemos sostener. Ajusta esos dos puntos y mándalo de nuevo."

        - slot: 5
          block_id: ai_output_review
          content:
            title: "Última pasada sobre la versión final."
            body: "Versión **post-feedback** de Mariana. Marca lo que todavía te genera dudas o lo que dejarías ir."
            prompt: "¿Qué dejarías como está y qué marcarías para una última corrección?"
            segments:
              - { id: f1, text: "Mariana, vi que Aurora Retail abrió oficina en Monterrey." }
              - { id: f2, text: "Trabajamos con equipos de Marketing en empresas medianas de retail." }
              - { id: f3, text: "Si quieres ver cómo lo aplicaríamos a tu caso, agendamos una llamada cuando te acomode." }
              - { id: f4, text: "Te dejo dos horarios la próxima semana, dime cuál te sirve." }
            flag_options:
              - claim_no_verificado
              - tono_agresivo
              - dato_sensible
              - frase_reutilizable

    # ============================================================
    # SECCION 5 · CIERRE
    # Objetivo: decidir y comunicar al manager.
    # Mix: 4 activos (dashboard, workflow, memo × 2) + 1 pasivo.
    # ============================================================

    - id: cierre
      name: "Cierre"
      slides:

        - slot: 1
          block_id: dashboard_pivot
          content:
            title: "Elige el segmento que vas a llevar al manager."
            body: "Tres segmentos con métricas reales. Cada uno tiene **caveats**. Elige cuál llevas a la reunión del lunes con Mariana."
            prompt: "¿Qué segmento prioriza esta campaña?"
            filters:
              - id: activos_recientes
                label: "Activos recientes"
                metrics:
                  - { label: "Tamaño del segmento", value: "82 contactos", band: medio }
                  - { label: "Conversión esperada", value: "4.1%", band: alto }
                  - { label: "Riesgo de queja", value: "Bajo", band: bajo }
              - id: dormidos
                label: "Dormidos"
                metrics:
                  - { label: "Tamaño del segmento", value: "164 contactos", band: alto }
                  - { label: "Conversión esperada", value: "1.8%", band: bajo }
                  - { label: "Riesgo de queja", value: "Medio", band: medio }
              - id: mixto
                label: "Mixto activos + dormidos"
                metrics:
                  - { label: "Tamaño del segmento", value: "246 contactos", band: alto }
                  - { label: "Conversión esperada", value: "2.6%", band: medio }
                  - { label: "Riesgo de queja", value: "Medio", band: medio }

        - slot: 2
          block_id: workflow_builder
          content:
            title: "Define el flujo del envío con revisión humana."
            body: "Ordena los pasos del envío. Decide **dónde entra revisión humana** y dónde el modelo opera solo. Puedes reordenar arrastrando."
            prompt: "¿Cómo queda el flujo del envío?"
            steps:
              - { id: limpiar_base, label: "Limpiar base de contactos" }
              - { id: generar_borrador, label: "Generar borrador con la IA" }
              - { id: revision_legal, label: "Revisión rápida de Legal" }
              - { id: ajustar_segmento, label: "Ajustar segmentos por consentimiento" }
              - { id: enviar, label: "Programar envío" }
              - { id: monitorear, label: "Monitorear quejas y bajas" }

        - slot: 3
          block_id: tradeoff_decision_memo
          content:
            title: "Decide qué le recomiendas a Mariana."
            body: "Llegó el momento. Tres opciones con ventajas y costos reales. Elige la que defenderías ante el comité directivo."
            prompt: "¿Qué recomendación le llevas a Mariana?"
            options:
              - id: lanzar_ahora
                label: "Lanzar el lunes"
                hint: "Úsalo si el beneficio supera el riesgo y los huecos están mitigados."
              - id: piloto_controlado
                label: "Piloto controlado"
                hint: "Úsalo si hay señales prometedoras, pero el riesgo de quejas o datos requiere validar primero con un grupo reducido."
              - id: pausar_y_escalar
                label: "Pausar y escalar"
                hint: "Úsalo si la base no está lista, hay datos sensibles sin consentimiento o el modelo afirma cosas que no se pueden sostener."
            memo_placeholder: "Explica qué harías, por qué, qué riesgo aceptas y qué tendrías que revisar antes de avanzar."
            memo_max_chars: 700
            memo_audience: "Mariana Robles · Líder de Crecimiento"

        - slot: 4
          block_id: reading_message
          content:
            title: "Vista previa del email que se enviaría."
            body: "Así se vería en la bandeja del contacto. **Última oportunidad** para detectar algo antes del envío real."
            channel: email
            from:
              name: "Aurora Retail · Marketing"
