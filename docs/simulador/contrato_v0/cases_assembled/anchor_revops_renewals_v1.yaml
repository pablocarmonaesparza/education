# Caso ensamblado · anchor_revops_renewals (generado por el motor, run
# 20260723_213705__anchor_revops_renewals, attempt-1). Gates deterministas en
# PASS (check-assembled-case + lint-case-copy). El juez narrativo NO se corrió
# (requiere llave de API); queda para revisión humana, igual que los casos
# salvados crestline/harborview.
#
# Salvado a mano tras el run:
#   1. La sección 'ia' venía con 4 slides (faltaba el slot 2). Se agregó el slot 2
#      canónico ai_textfield_guided (prompt guiado para calcular el total de
#      renovaciones comprometidas), dejando 5/sección y 25 slides. El ratio
#      ai_native queda en 60% (15/25), el mínimo del schema.
#   2. Se reemplazó el acrónimo corporativo prohibido "CRM" por "customer records
#      system" en todo el copy visible. Glosario 00_EN_GLOSSARY.md: cero acrónimos
#      corporativos en el copy visible (AI es la única excepción).
#
# Biblia (hechos canónicos):
#   Empresa: Anchor POS (point-of-sale para restaurantes y food-service, EEUU).
#     Rol del participante: Revenue Operations Analyst.
#   Jordan Chen: Director of Revenue Operations. Asigna y recibe el forecast.
#     Nunca destinatario del reply.
#   Priya Mehta: VP of Sales. Revisa; pide un número limpio y defendible para el board.
#   Marcus Webb: Account Executive. Recibe su lista de cuentas (Ohio, contratos
#     por encima de $10,000 USD).
#   Anchor AI Assistant: la IA aprobada. Limpia listas, arma roll-ups de números
#     dados y formatea; NO conecta al customer records system ni al billing, no ve
#     señales reales de uso/pago/renovación, no verifica y no envía. Instrumento dado.
#   Hoy lunes 19 oct 2026. Deadline miércoles 21 oct 2026 (forecast a Jordan).
#     Board meeting jueves 22 oct 2026.
#   Total correcto de renovaciones comprometidas: $149,900 USD (7 cuentas activas,
#     sin duplicados ni churned). Inflado incorrecto: $179,900 USD (cuenta churned
#     + doble conteo del merge de Main Street Deli).
#   Acción esperada: pausar (no comprometer al board scores inventados por la IA
#     sin señales reales de renovación). Alternativas: pilotar, entrenar, escalar.
# Los identificadores NO cambian respecto al run: section id, slot, block_id, ids
# de fila/opción/segmento/decisión, flagIfMarked, actions[].value siguen igual.
# El slot ia/2 agregado usa ids nuevos propios del bloque guiado.

case_assembly:
  case_id: anchor_revops_renewals
  version: 1
  status: draft
  schema_version: 1.0.0
  meta:
    level: N1 · Foundations
    profile: Revenue Operations
    profile_pack: sales_revops
    estimated_minutes: 12
    timer_seconds: 600
    timer_default_on: false
    tools:
      - ai
      - data
      - messaging
      - documents
  manager_outcome:
    primary_question: 'Whether this analyst can produce a renewals number leadership will stand behind: cleaning the account list with judgment, keeping customer contract and contact data out of the AI tool, catching a double-counted roll-up, and refusing to hand the board per-account scores the tool simply made up.'
    assignment_brief: 'Jordan Chen, Director of Revenue Operations, needs you to produce a committed renewals forecast for the board meeting on Thursday. The customer records system export of accounts up for renewal this quarter is messy: duplicate entries, accounts that already churned, incorrect renewal dates, and contract values mixed with customer contact notes. Jordan wants you to clean the list, assign each account a renewal-likelihood score, and roll everything into a single commit number. Use the AI assistant to help, but you are responsible for the final number. Jordan needs to know by end of day Wednesday whether the forecast is board-ready.'
    business_metric: Committed renewals forecast accuracy (dollar variance between forecast and actual renewals)
    risk_metric: Exposure from processing customer contract and contact data outside the company's data agreements, plus risk of presenting fabricated per-account scores to the board
    expected_signal: The analyst identifies that the AI tool invented likelihood scores with no real signal, catches the double-counted merged accounts, keeps customer contract and contact data out of the tool, and refuses to commit the AI-generated forecast to the board without real renewal signals.
    expected_action: pausar
    alternatives:
      - pilotar
      - entrenar
      - escalar
  sections:
    - id: contexto
      name: Context
      slides:
        - slot: 1
          block_id: case_cover
          title: Anchor POS revenue operations
          body: |-
            You are a **Revenue Operations Analyst** at **Anchor POS**, a company that sells point-of-sale systems and software to restaurants and food-service businesses across the United States. Your team owns the data, forecasting, and pipeline hygiene for the sales organization.

            Your main tool is the **Anchor AI Assistant**, a text-based AI that can clean and deduplicate lists, draft summaries, calculate roll-ups from numbers you provide, and format output into tables. It does **not** connect to the customer records system, the billing system, or any live data source. It cannot verify accuracy or send emails. You are responsible for every number it produces.
          content:
            meta:
              profile: Revenue Operations
              level: N1 · Foundations
              estimatedMinutes: 12
              timerSeconds: 600
              timerDefaultOn: false
              tools:
                - kind: ai
                  label: AI
                - kind: data
                  label: Tables
                - kind: messaging
                  label: Messaging
                - kind: documents
                  label: Documents
        - slot: 2
          block_id: reading_message
          title: Jordan assigns the Q4 renewals forecast
          body: Your manager, **Jordan Chen**, Director of Revenue Operations, sends you a message on **Monday, October 19, 2026**.
          content:
            message:
              channel: email
              from:
                name: Jordan Chen
              body: |-
                Hi team,

                We need the Q4 renewals forecast ready for Thursday's board meeting. I'm attaching the customer records system export of accounts up for renewal this quarter. Here is what I need from you by end of day **Wednesday, October 21**:

                1. Clean the export. Remove duplicates, churned accounts, and any incorrect records.
                2. Assign each account a renewal-likelihood score (high, medium, low).
                3. Roll everything into a single committed renewals dollar number.
                4. Deliver the final forecast to me.
                5. State whether the forecast is board-ready for Thursday's meeting.

                Let me know if you have questions.

                Jordan
              timestamp: Monday, October 19, 2026 9:14 AM
