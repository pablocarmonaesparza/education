                  Subject: Your Q4 accounts

                  Hi Marcus,

                  Here are your assigned accounts for Q4 renewals: Bella Napoli Ristorante ($24,000 USD), Smokehouse BBQ & Grill ($18,500 USD), Riverfront Tavern ($31,200 USD), Golden Dragon Chinese ($12,000 USD), Main Street Deli ($15,000 USD), and Pizza Tower franchise ($42,000 USD). Total renewal target: $142,700 USD.

