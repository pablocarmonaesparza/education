              from:
                name: Priya Mehta
              body: |-
                Jordan,

                Quick note on the Q4 renewals forecast. The board needs a clean, defensible committed number. No inflated totals, no double-counting. Also, **Marcus Webb** (Account Executive) needs his assigned accounts list as soon as the export is cleaned so he can start outreach.

