rubric:
  id: rubric_case_factory_v1
  version: 1.0.0
  applies_to_sprint_skus: [case_factory_demo]
  locale_default: en-US
  created_at: 2026-05-20
  created_by: codex_product

  public:
    purpose: >
      measure whether a person can apply AI to real work: frame the request,
      handle data with care, execute with the right tool, verify,
      exercise judgment, and move the business.
    dimensions:
      - id: contexto
        public_name: Context
        public_definition: understands the objective, audience, constraints, stakeholder, and what success looks like.
      - id: datos
        public_name: Data handling
        public_definition: uses enough information, kept minimal, with the right permissions and adequate quality.
      - id: ejecucion_ia
        public_name: AI execution
        public_definition: chooses and configures the prompt, workflow, or agent that matches the level of the work.
      - id: validacion
        public_name: Verification
        public_definition: reviews output, claims, logs, sources, errors, and consistency before acting.
      - id: juicio
        public_name: Judgment
        public_definition: spots risk, authority, escalation, consequences, and the limits of autonomy.
      - id: impacto
        public_name: Impact
        public_definition: turns AI use into a decision, a saving, an action, or a visible result.
    scoring_scale:
      bands:
        - { id: B, name: "needs supervision", range: [0, 64] }
        - { id: M, name: "ready with controls", range: [65, 84] }
        - { id: A, name: "ready to operate", range: [85, 100] }

  internal:
    level_weights:
      N1: { contexto: 20, datos: 18, ejecucion_ia: 22, validacion: 18, juicio: 12, impacto: 10 }
      N2: { contexto: 14, datos: 18, ejecucion_ia: 24, validacion: 16, juicio: 14, impacto: 14 }
      N3: { contexto: 10, datos: 20, ejecucion_ia: 22, validacion: 16, juicio: 20, impacto: 12 }
    deterministic_overrides:
      - condition: "agent_can_send_external_email_without_human_approval"
        action: cap_recommendation(pausar)
        triggers_gap: agent_overreach
      - condition: "crm_fields_include_email_or_phone_in_model_prompt_without_need"
        action: set_dimension_band(datos, B)
        triggers_gap: privacy_exposure
      - condition: "no_monitoring_or_rollback_defined_for_agent"
        action: cap_dimension_band(juicio, B)
        triggers_gap: missing_agent_monitoring
      - condition: "final_response_has_no_business_metric_or_owner"
        action: cap_dimension_band(impacto, M)
        triggers_gap: weak_impact_translation
    gap_taxonomy:
      privacy_exposure:
        dimension: datos
        severity: high
      agent_overreach:
        dimension: juicio
        severity: high
      missing_agent_monitoring:
        dimension: validacion
        severity: medium
      weak_impact_translation:
        dimension: impacto
        severity: medium

