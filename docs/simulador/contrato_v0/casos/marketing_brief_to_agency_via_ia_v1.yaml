# case_template — marketing_brief_to_agency_via_ia
# cuarto caso del Sprint marketing_30d. tensión: brief a vendor externo
# con IA sin leak de estrategia.

case_template:
  id: marketing_brief_to_agency_via_ia
  version: 1
  status: active
  difficulty: baseline
  locale: es-MX

  target_role: [marketing_manager, growth_marketer, content_lead]
  sprint_skus: [marketing_30d]

  duration_estimate_min: 18
  rubric_ref: rubric_marketing_v1
  rubric_version_used: 1.0.0

  freshness:
    live_signal: "uso de IA para preparar briefs a vendors externos"
    review_by: 2026-07-30
    last_reviewed: 2026-05-12
    rationale: |
      caso "vivo" porque post-2024 las empresas trabajan con vendors
      externos (agencias, freelancers, BPOs) cada vez más, y el riesgo
      de leak de estrategia vía brief sube. la práctica de pasar briefs
      "limpios" por LLM antes de enviar es ahora estándar profesional.

  expected_manager_action:
    default: entrenar
    possible: [pilotar, entrenar, pausar, escalar]

  required_template_vars:
    - company_name
    - industry
    - region
    - vendor_type             # agencia_creativa / freelancer / BPO
    - vendor_relationship     # nuevo / 6m / 2y+
    - campaign_topic
    - strategic_sensitivity   # ej: contiene_lanzamiento_no_publico, contiene_competitor_intel
    - deadline_days

  context_template:
    role_play: |
      eres Marketing Manager en {company_name} ({industry}, región
      {region}). estás briefando a {vendor_type} externa con la que
      tienes relación de {vendor_relationship} para una campaña.
    scenario: |
      necesitas que la agencia produzca el material creativo de
      {campaign_topic}. tienes el brief interno completo — pero
      contiene info que la agencia NO debería ver crudo: planes de
      lanzamiento Q3 que aún no son públicos, lecciones del último
      Q sobre por qué falló una campaña, competitive intel de
      research interno, números financieros de targets.

      tu trabajo: usar IA para preparar la versión que vas a
      compartir con la agencia. tienes {deadline_days} días.

      la trampa: pegar el brief crudo al LLM y pedirle "limpia esto
      para enviar a agencia". si el LLM no entiende qué es estratégico
      vs táctico, va a dejar info sensible adentro O va a quitar todo
      y dejar la agencia sin material para trabajar.
    pressure:
      - vendor_external_trust_limited
      - strategic_info_at_risk
      - deadline_{deadline_days}d
      - agency_needs_enough_context_to_work

  data_policy:
    sensitive_fields:
      - launch_plans_non_public
      - financial_targets_quarter
      - competitive_intel_internal
      - postmortem_q4_campaign
      - pricing_strategy_future
    safe_to_share_fields:
      - brand_voice
      - target_audience_categorical
      - past_campaign_creative_assets_public
      - timeline_general
      - deliverables_specs
    handling_rules:
      - "sensitive_fields → NO compartir con vendor externo, incluso
        si scrubbing parcial es viable"
      - "safe_to_share_fields → compartir tal cual"
      - "regla v0: la agencia debe poder hacer SU trabajo, no inferir
        toda tu estrategia. tensión real."

  inputs_spec:
    - kind: doc
      name: brief_interno_completo.md
      content_template_ref: marketing_brief_agency_interno
    - kind: doc
      name: brief_template_agencia.md
      content_template_ref: marketing_brief_agency_template

  steps:
    - id: 1
      type: data_scope
      prompt: "marca qué secciones del brief interno NO vas a incluir en lo que envías a la agencia."
      sections_available:
        - section_1_overview_campaign      # safe
        - section_2_target_audience        # safe
        - section_3_brand_voice            # safe
        - section_4_creative_specs         # safe
        - section_5_launch_timeline_q3_public  # safe
        - section_6_launch_plans_q3_non_public  # SENSITIVE
        - section_7_competitive_intel      # SENSITIVE
        - section_8_postmortem_q4          # SENSITIVE
        - section_9_financial_targets      # SENSITIVE
        - section_10_pricing_strategy_future  # SENSITIVE
      expected_action: exclude_all_sensitive_keep_all_safe
      capture:
        - sections_excluded
        - sections_included
      evaluates: [privacidad, contexto, juicio]
      gap_trigger_logic: |
        si incluye cualquiera de las 5 sensitive: dispara leak_strategy (high)
        si excluye sections 1-5 (safe): dispara over_redacted_brief (low)
        si incluye exactamente las 5 safe + exclude las 5 sensitive: correct

    - id: 2
      type: llm_beat
      llm_provider: itera_provided
      model_alias: itera_default_2026q2
      task_to_user: |
        ya marcaste qué excluir. ahora redacta el prompt al LLM para
        que tome las secciones safe y las reescriba en formato del
        brief_template_agencia.md. el LLM no debe agregar info que tú
        no le diste.
      max_turns: 2
      capture:
        - user_prompt
        - model_response_brief_draft
        - user_followup_decisions
      evaluates_prompt: [contexto, privacidad, juicio]
      followup:
        type: decision_open_short
        prompt: |
          revisa el brief que generó el modelo. ¿el LLM agregó alguna
          info que NO le diste? ¿descartó alguna safe importante? ¿está
          listo para enviar? menos de 100 palabras.
        max_chars: 400
        evaluates: [validacion, juicio, decision]

    - id: 3
      type: artifact_review
      artifact: llm_brief_draft
      prompt: "revisa el brief generado. marca segmentos problemáticos."
      review_targets:
        - leaks_sensitive_info_back     # el LLM 'inferió' info no dada y la metió
        - missing_critical_context      # la agencia no puede trabajar sin esto
        - generic_filler                # texto vacío que no aporta
        - on_target_for_agency          # OK
        - hallucinated_metrics          # cifra inventada
      review_mode: multi_select_per_segment
      capture:
        - flagged_problems_per_segment
        - sound_segments_count
      evaluates: [validacion, privacidad, juicio]
      gap_trigger_logic: |
        si falla en marcar segmento con leak inferido: dispara accept_llm_scrubbing_without_review (medium)
        si marca solo segmentos cosméticos sin marcar leaks reales: weak_artifact_review (low)
        si discrimina: correct

    - id: 4
      type: decision_select
      prompt: "¿cómo entregas el brief final a la agencia?"
      options:
        - id: brief_with_q_a_offer
          label: "brief filtrado + nota: 'si necesitan más contexto, agendamos call'"
          signal: correct
        - id: brief_raw
          label: "envío el brief crudo, total la agencia firmó NDA"
          signal: gap_leak_strategy
        - id: brief_silent
          label: "brief filtrado, sin contexto extra"
          signal: weak_communication
        - id: brief_over_redacted_safe_only
          label: "envío solo lo absolutamente público (brand voice + dates)"
          signal: gap_over_redacted_brief
      evaluates: [decision, juicio]
      risk_event_trigger:
        condition: "selecciona brief_raw"
        event: external_vendor_full_strategic_exposure
        severity: high

    - id: 5
      type: decision_open_short
      prompt: |
        tu CMO te escribe: "¿la agencia ya tiene todo lo que necesita
        para arrancar?". ¿qué le respondes? menos de 200 caracteres.
      max_chars: 200
      evaluates: [juicio, decision]
      gap_trigger_logic: |
        si responde "sí, todo" cuando hay info estratégica que NO compartiste: dispara pretend_full_brief (medium)
        si responde transparente (filtrado por confidencialidad + Q&A si necesitan): correct
        si responde defensivo: weak_communication

  evaluation_meta:
    llm_judge_model: itera_default_2026q2
    estimated_eval_duration_seconds: 14
    rubric_version_used: 1.0.0
    deterministic_signals: [step_1.sections_excluded, step_4.option_selected]
    llm_judge_signals: [step_2.user_prompt, step_2.followup_text, step_3.justification_per_segment, step_5.text]

  telemetry_required:
    - time_on_step
    - prompt_iterations
    - hint_requested
    - sensitive_copy_detected
    - answer_changed
    - abandoned_step

  evidence_emitted:
    - kind: readiness_dimension_scores
      shape: { contexto, privacidad, validacion, juicio, decision }
    - kind: risk_events_detected
      shape: [{ event_type, severity, step_id, evidence_text, timestamp }]
    - kind: decision_replay
      shape: ordered_list_of_decisions
    - kind: transfer_delta
      shape: { primary_session_id, resim_session_id, delta_per_dimension, delta_global, narrative }
      emitted_when: resim_completed_after_primary
    - kind: manager_recommendation
      values: [pilotar, entrenar, pausar, escalar]
      includes: justification_text

  resimulation_spec:
    requires_variant_with_role: resimulation
    delay_days_default: 7
    expected_behavior_shift_axis:
      - vendor_type                # cambia: agencia conocida → freelancer nuevo
      - vendor_relationship        # cambia: 2y+ → primera vez
      - strategic_sensitivity      # cambia: lanzamiento futuro → M&A en curso
    scoring_note: |
      rúbrica y pesos no cambian. el contraste prueba que el empleado
      aprendió el principio (filtrar info estratégica antes de
      enviar) más allá del contexto específico.

  gap_definitions:
    leak_strategy:
      dimension: juicio
      severity: high
      triggered_by: [step_1.includes_sensitive_sections, step_4.brief_raw]
    over_redacted_brief:
      dimension: decision
      severity: low
      triggered_by: [step_1.excludes_safe_sections, step_4.brief_over_redacted_safe_only]
    accept_llm_scrubbing_without_review:
      dimension: validacion
      severity: medium
      triggered_by: [step_3.fails_mark_llm_inferred_leak]
    weak_artifact_review:
      dimension: juicio
      severity: low
      triggered_by: [step_3.fails_discriminate_critical_from_cosmetic]
    weak_communication:
      dimension: decision
      severity: low
      triggered_by: [step_4.brief_silent, step_5.defensive_response]
    pretend_full_brief:
      dimension: juicio
      severity: medium
      triggered_by: [step_5.claims_complete_when_filtered]
    poor_context:
      dimension: contexto
      severity: medium
      triggered_by: [step_2.prompt_lacks_template_format]

  practice_beats:
    leak_strategy: practice_scrub_strategy_from_brief_v1
    over_redacted_brief: practice_brief_completeness_v1
    accept_llm_scrubbing_without_review: practice_validate_llm_output_v1  # reusa caso 1
    pretend_full_brief: practice_transparent_peer_response_v1  # reusa caso 3

  authoring_meta:
    written_by: claude_product
    reviewed_by: codex_engineering
    initial_review_pending: true
    last_updated: 2026-05-12
    style_notes: |
      caso enfocado en juicio + decision con peso bajo de validacion
      directa (porque el LLM hace scrubbing, no análisis). tensión
      sutil: la agencia ES tu socio, pero también es externo —
      balance entre confianza y protección.
