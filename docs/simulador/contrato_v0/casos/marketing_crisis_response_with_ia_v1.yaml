# case_template — marketing_crisis_response_with_ia
# octavo y último caso del Sprint. tensión: responder a crisis
# pública con IA sin saltarse aprobación legal/PR.

case_template:
  id: marketing_crisis_response_with_ia
  version: 1
  status: active
  difficulty: advanced  # último caso del Sprint, mayor stakes
  locale: es-MX

  target_role: [marketing_manager, growth_marketer, comms_lead]
  sprint_skus: [marketing_30d]

  duration_estimate_min: 22
  rubric_ref: rubric_marketing_v1
  rubric_version_used: 1.0.0

  freshness:
    live_signal: "uso de IA en respuesta a crisis pública"
    review_by: 2026-06-30  # crisis playbooks cambian rápido
    last_reviewed: 2026-05-12
    rationale: |
      caso "vivo" porque crisis comms es el escenario donde el LLM
      es MÁS tentador (presión de tiempo) y MENOS apropiado (stakes
      legales + reputacionales + emocionales). cada quarter trae
      nuevos tipos de crisis (data breach AI, deepfake de CEO, leak
      de docs internos).

  expected_manager_action:
    default: escalar  # crisis casi siempre escala
    possible: [pilotar, entrenar, pausar, escalar]

  required_template_vars:
    - company_name
    - industry
    - region
    - crisis_type            # data_breach / viral_complaint / service_outage / pr_scandal / deepfake
    - crisis_severity        # low / medium / high / existential
    - twitter_thread_velocity  # tweets/hour mentioning crisis
    - press_coverage_started # boolean
    - deadline_minutes       # 30-120 min típicamente

  context_template:
    role_play: |
      eres Marketing Manager en {company_name} ({industry}, región
      {region}). estás de guardia esta noche.
    scenario: |
      a las 10:42 PM detectas: {crisis_type} con severity
      {crisis_severity}. tweets mencionando el incidente acelerando
      ({twitter_thread_velocity}/hour). press coverage:
      {press_coverage_started}. tu CEO está en avión, no contesta;
      tu VP marketing en cena; legal teóricamente disponible
      pero "fuera de horario".

      la presión: cada minuto sin respuesta, la narrativa la define
      Twitter. tu instinto: usar IA para draft respuesta rápida y
      publicar.

      la trampa: 99% de las crisis se empeoran por respuesta apurada.
      la IA no sabe historia de tu marca, no sabe contexto legal,
      no sabe qué prometieron tus ejecutivos antes, no sabe qué dijo
      tu competencia en crisis similar. publicar IA crudo en crisis
      es enterprise-level error.

      tienes {deadline_minutes} minutos antes de que la coverage
      sea irrecuperable.
    pressure:
      - crisis_severity_{crisis_severity}
      - tight_deadline_{deadline_minutes}m
      - normal_approval_chain_unavailable
      - twitter_narrative_being_set

  data_policy:
    sensitive_fields:
      - customer_pii_affected
      - internal_postmortem_assumptions
      - legal_position_internal
      - executive_quotes_unreleased
    safe_to_share_fields:
      - public_facts_confirmed
      - publicly_promised_remediation
      - what_we_already_disclosed
    handling_rules:
      - "NUNCA pasar customer_pii_affected al LLM"
      - "NUNCA usar internal_postmortem como source para respuesta pública sin legal review"
      - "regla absoluta: aún en crisis, el approval chain existe"

  inputs_spec:
    - kind: doc
      name: incident_internal_brief.md
      content_template_ref: marketing_crisis_internal_brief
    - kind: dataset
      name: twitter_mentions_real_time.json
      schema: [tweet_id, timestamp, author_followers, sentiment, mentions_competitor, ask_to_company]
      row_count: 24
      sample_rows_ref: marketing_crisis_twitter_mentions
    - kind: doc
      name: brand_crisis_playbook.md
      content_template_ref: marketing_crisis_playbook

  steps:
    - id: 1
      type: data_scope
      prompt: "qué información pasarías al LLM si decides usarlo para draft?"
      fields_available:
        - public_facts_only           # safe minimal
        - public_facts_plus_brand_voice  # safe extended
        - all_internal_incident_brief  # leak risk
        - twitter_thread_excerpts      # safe (público)
        - customer_pii_affected         # NEVER
      expected_action: select_public_facts_plus_brand_voice_plus_twitter_excerpts
      capture:
        - selected_data
      evaluates: [privacidad, juicio]
      gap_trigger_logic: |
        si selecciona all_internal_incident_brief: dispara leak_internal_info (high)
        si selecciona customer_pii_affected: dispara expose_affected_customers (critical)
        si selecciona public_only + voice + twitter: correct

    - id: 2
      type: llm_beat
      llm_provider: itera_provided
      model_alias: itera_default_2026q2
      task_to_user: |
        si decides usar el LLM, redacta el prompt. el LLM puede
        producir borrador rápido — pero no aprueba publicación.
        especifica: tono empático sin admisión legal, máximo 280
        chars (para Twitter primary), evita prometer cosas no
        confirmadas.
      max_turns: 2
      capture:
        - user_prompt
        - model_response_draft
      evaluates_prompt: [contexto, juicio, validacion]
      followup:
        type: decision_open_short
        prompt: |
          mira el draft. ¿qué te incomoda? ¿hay promesa que no puedes
          sostener? ¿tono off para el momento? ¿algo que legal/PR
          debería revisar antes? menos de 150 palabras.
        max_chars: 500
        evaluates: [validacion, juicio]

    - id: 3
      type: artifact_review
      artifact: llm_crisis_response_draft
      prompt: "revisa el draft del LLM. marca problemas."
      review_targets:
        - off_tone_corporate           # frío en momento humano
        - defensive_blame              # culpa a externos
        - premature_promise            # promete remediation no confirmada
        - admits_legal_liability       # admite culpa legal sin asesoría
        - leak_internal                # menciona info interna
        - acceptable_holding_statement  # OK como "estamos investigando"
      review_mode: multi_select_per_segment
      capture:
        - flagged_problems
      evaluates: [validacion, juicio, privacidad]

    - id: 4
      type: decision_select
      prompt: "el reloj sigue corriendo. ¿qué haces ahora?"
      options:
        - id: publish_holding_then_escalate
          label: "publicar holding statement minimal ('estamos al tanto, investigando, actualizamos en 1h') y escalar a legal + VP + CEO en paralelo"
          signal: correct
        - id: publish_full_response_no_review
          label: "publicar respuesta completa del LLM AHORA. crisis = velocidad. legal aprueba mañana."
          signal: gap_bypass_approval
        - id: silence_until_approval
          label: "no publicar nada hasta que legal + VP aprueben formalmente. puede tomar horas."
          signal: gap_silence_amplifies_crisis
        - id: hand_to_pr_agency
          label: "delegar a agencia de PR de retainer (tomará 30 min para responder)"
          signal: correct_with_escalation
      evaluates: [decision, juicio]
      risk_event_trigger:
        condition: "selecciona publish_full_response_no_review"
        event: published_unreviewed_in_crisis
        severity: critical

    - id: 5
      type: decision_open_short
      prompt: |
        después de holding statement, ¿qué quieres validar con legal
        + VP antes de respuesta completa en las próximas 2-4 horas?
        menos de 250 caracteres.
      max_chars: 250
      evaluates: [decision, juicio]
      gap_trigger_logic: |
        si responde "nada, ya está manejado": dispara overconfidence_after_holding (medium)
        si responde con lista concreta (admisión legal, remediation pública, executive quote, customer message): correct
        si responde defensivo: deflection (medium)

  evaluation_meta:
    llm_judge_model: itera_default_2026q2
    estimated_eval_duration_seconds: 14
    rubric_version_used: 1.0.0
    deterministic_signals: [step_1.selected_data, step_4.option_selected]
    llm_judge_signals: [step_2.user_prompt, step_2.followup_text, step_3.justification_per_problem, step_5.text]

  telemetry_required:
    - time_on_step
    - prompt_iterations
    - hint_requested
    - sensitive_copy_detected
    - answer_changed
    - abandoned_step

  evidence_emitted:
    - kind: readiness_dimension_scores
      shape: { contexto, privacidad, validacion, juicio, decision }
    - kind: risk_events_detected
      shape: [{ event_type, severity, step_id, evidence_text, timestamp }]
    - kind: decision_replay
      shape: ordered_list_of_decisions
    - kind: transfer_delta
      shape: { primary_session_id, resim_session_id, delta_per_dimension, delta_global, narrative }
      emitted_when: resim_completed_after_primary
    - kind: manager_recommendation
      values: [pilotar, entrenar, pausar, escalar]
      includes: justification_text

  resimulation_spec:
    requires_variant_with_role: resimulation
    delay_days_default: 7
    expected_behavior_shift_axis:
      - crisis_type                  # cambia: viral_complaint → data_breach AI (más legal)
      - crisis_severity               # cambia: medium → existential
      - deadline_minutes              # cambia: 60 → 20 min

  gap_definitions:
    leak_internal_info:
      dimension: privacidad
      severity: high
      triggered_by: [step_1.all_internal_brief]
    expose_affected_customers:
      dimension: privacidad
      severity: critical
      triggered_by: [step_1.customer_pii_affected]
    off_tone_corporate:
      dimension: juicio
      severity: medium
      triggered_by: [step_3.fails_mark_corporate_tone]
    defensive_blame:
      dimension: juicio
      severity: medium
      triggered_by: [step_3.fails_mark_blame]
    premature_promise:
      dimension: validacion
      severity: medium
      triggered_by: [step_3.fails_mark_unconfirmed_promise]
    admits_legal_liability:
      dimension: juicio
      severity: high
      triggered_by: [step_3.fails_mark_liability_admission]
    bypass_approval:
      dimension: juicio
      severity: high
      triggered_by: [step_4.publish_full_response_no_review]
    silence_amplifies_crisis:
      dimension: decision
      severity: medium
      triggered_by: [step_4.silence_until_approval]
    overconfidence_after_holding:
      dimension: juicio
      severity: medium
      triggered_by: [step_5.claims_handled]

  practice_beats:
    bypass_approval: practice_crisis_approval_chain_v1
    off_tone_corporate: practice_crisis_tone_human_v1
    defensive_blame: practice_crisis_tone_human_v1
    premature_promise: practice_validate_llm_output_v1  # reusa caso 1
    leak_internal_info: practice_scrub_strategy_from_brief_v1  # reusa caso 4

  authoring_meta:
    written_by: claude_product
    reviewed_by: codex_engineering
    initial_review_pending: true
    last_updated: 2026-05-12
    difficulty_note: |
      caso `advanced` — último del Sprint. enfatiza que aún en crisis
      (cuando velocidad parece todo) la cadena de aprobación existe.
      el "right answer" v0 es: holding statement minimal + escalar
      en paralelo. el LLM puede acelerar el draft pero NO reemplaza
      a legal/PR/exec approval.
