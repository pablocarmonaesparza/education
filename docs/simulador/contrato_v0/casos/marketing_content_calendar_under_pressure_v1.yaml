# case_template — marketing_content_calendar_under_pressure
# séptimo caso del Sprint. tensión: 30 días de contenido con IA sin
# caer en repetición disfrazada de variedad.

case_template:
  id: marketing_content_calendar_under_pressure
  version: 1
  status: active
  difficulty: baseline
  locale: es-MX

  archetype_ref: speed-to-action-vs-validation
  level_primary: 2

  target_role: [marketing_manager, content_lead, social_media_manager]
  sprint_skus: [marketing_30d]

  duration_estimate_min: 18
  rubric_ref: rubric_marketing_v1
  rubric_version_used: 1.0.0

  freshness:
    live_signal: "uso de IA para planear calendario de contenido"
    review_by: 2026-07-30
    last_reviewed: 2026-05-12
    rationale: |
      caso "vivo" porque "GPT, dame 30 ideas de contenido" es flujo
      universal en 2026. la trampa es la mediocridad por volumen:
      20 ideas "ok" en lugar de 5 muy buenas + 15 derivadas.

  expected_manager_action:
    default: entrenar
    possible: [pilotar, entrenar, pausar, escalar]

  required_template_vars:
    - company_name
    - industry
    - region
    - pieces_per_week        # 5 LinkedIn + 3 email + 2 blog (default)
    - calendar_duration_days # 30
    - quarter_objective
    - deadline_hours

  context_template:
    role_play: |
      eres Marketing Manager en {company_name}. tu equipo debe ejecutar
      un calendario de contenido de {calendar_duration_days} días
      ({pieces_per_week} piezas/semana). la meta de Q es
      {quarter_objective}.
    scenario: |
      tu CEO/CMO te dijo "necesito un calendario para los próximos
      30 días, mañana". sin él, el equipo no sabe qué producir esta
      semana. tienes {deadline_hours}h.

      la trampa: el LLM va a darte 20-30 ideas plausibles. parecerán
      distintas en superficie pero serán variaciones del mismo punto.
      sin tu intervención, vas a entregar calendario que se siente
      uniforme y no construye narrativa.
    pressure:
      - tight_deadline_{deadline_hours}h
      - team_blocked_without_calendar
      - llm_produces_volume_easily

  data_policy:
    sensitive_fields: []
    handling_rules:
      - "no PII en este caso"
      - "brand voice + audience profile + past performance OK para pasar al LLM"

  inputs_spec:
    - kind: doc
      name: brand_audience_themes.md
      content_template_ref: marketing_calendar_brand_themes
    - kind: dataset
      name: past_content_performance.json
      schema: [piece_type, headline, theme, engagement_score, conversions]
      row_count: 30
      sample_rows_ref: marketing_calendar_past_performance
    - kind: doc
      name: quarter_objectives.md
      content_template_ref: marketing_calendar_quarter_obj

  steps:
    - id: 1
      type: data_scope
      prompt: "qué contexto vas a pasar al LLM para que arme las 20+ ideas?"
      fields_available:
        - brand_voice_only
        - brand_voice_plus_audience
        - brand_voice_plus_audience_plus_past_perf
        - brand_voice_plus_audience_plus_past_perf_plus_qtr_obj
        - everything_plus_competitor_calendar  # extra info — ruido?
      expected_action: select_brand_audience_past_perf_qtr_obj_4_inputs
      capture:
        - selected_inputs
      evaluates: [contexto, juicio]
      gap_trigger_logic: |
        si selecciona brand_voice_only o brand_voice_plus_audience: dispara insufficient_context (medium)
        si selecciona 4 elementos clave (sin competitor): correct
        si selecciona everything (incluido competitor): dispara excessive_context (low)

    - id: 2
      type: llm_beat
      llm_provider: itera_provided
      model_alias: itera_default_2026q2
      task_to_user: |
        redacta el prompt al LLM para que genere 20 ideas de contenido
        para los próximos 30 días. especifica funnel stage (TOFU/MOFU/
        BOFU) y diversificación por theme y formato.
      max_turns: 2
      capture:
        - user_prompt
        - model_response_calendar
      evaluates_prompt: [contexto, juicio]
      followup:
        type: decision_open_short
        prompt: |
          mira las 20 ideas. ¿cuántas son realmente distintas? ¿hay
          progression narrativa (intro → deep dive → social proof →
          objection handle → CTA)? menos de 100 palabras.
        max_chars: 400
        evaluates: [validacion, juicio]

    - id: 3
      type: artifact_review
      artifact: llm_content_calendar_proposed
      prompt: "revisa las 20 ideas. marca problemas por idea o por grupo."
      review_targets:
        - repetitive_with_other        # variación cosmética de otra idea
        - no_funnel_stage_signal        # no clarifica si es TOFU/MOFU/BOFU
        - off_brand_voice               # tono no Loop
        - distinct_strong               # OK
        - seasonal_misalignment         # no encaja con calendario real
        - generic_no_audience_specificity
      review_mode: multi_select_per_idea
      capture:
        - flagged_problems_per_idea
        - distinct_strong_count
      evaluates: [contexto, juicio, validacion]

    - id: 4
      type: decision_open_short
      prompt: |
        a partir de tu review: ¿qué cambios estructurales aplicas
        al calendario? ¿reduces de 20 a 10 mejores + repurpose
        para llenar volumen? ¿pides al LLM rehacer con mejor
        progression? ¿agregas tu propio criterio editorial? menos
        de 200 palabras.
      max_chars: 800
      evaluates: [decision, juicio]
      gap_trigger_logic: |
        si decide entregar las 20 sin cambios: dispara accept_volume_over_quality (medium)
        si decide reescribir TODO desde cero: dispara reject_llm_value (low)
        si decide curaduría editorial (10 fuertes + repurpose o pedido especifico al LLM): correct

    - id: 5
      type: decision_select
      prompt: "¿cómo entregas el calendario al equipo?"
      options:
        - id: deck_with_themes
          label: "calendario en deck + agrupado por theme + cada pieza con funnel stage + caveat sobre ideas que aún necesitan refinamiento"
          signal: correct
        - id: spreadsheet_dates_only
          label: "spreadsheet con dates + topics, sin más contexto"
          signal: weak_communication
        - id: full_briefs_per_piece
          label: "30 briefs detallados, uno por pieza"
          signal: overengineering
        - id: raw_llm_output
          label: "exporto el output del LLM tal cual"
          signal: gap_accept_output_no_validation
      evaluates: [decision, juicio]

  evaluation_meta:
    llm_judge_model: itera_default_2026q2
    estimated_eval_duration_seconds: 12
    rubric_version_used: 1.0.0

  telemetry_required:
    - time_on_step
    - prompt_iterations
    - hint_requested
    - sensitive_copy_detected
    - answer_changed
    - abandoned_step

  evidence_emitted:
    - kind: readiness_dimension_scores
      shape: { contexto, privacidad, validacion, juicio, decision }
    - kind: risk_events_detected
      shape: [{ event_type, severity, step_id, evidence_text, timestamp }]
    - kind: decision_replay
      shape: ordered_list_of_decisions
    - kind: transfer_delta
      shape: { primary_session_id, resim_session_id, delta_per_dimension, delta_global, narrative }
      emitted_when: resim_completed_after_primary
    - kind: manager_recommendation
      values: [pilotar, entrenar, pausar, escalar]
      includes: justification_text

  resimulation_spec:
    requires_variant_with_role: resimulation
    delay_days_default: 7
    expected_behavior_shift_axis:
      - calendar_duration_days       # 30 → 90 (escala 3x)
      - quarter_objective             # awareness → launch (cambia funnel mix)
      - pieces_per_week               # 10 → 25 (multi-canal)

  gap_definitions:
    insufficient_context:
      dimension: contexto
      severity: medium
      triggered_by: [step_1.brand_voice_only, step_1.brand_voice_plus_audience]
    excessive_context:
      dimension: contexto
      severity: low
      triggered_by: [step_1.everything_plus_competitor]
    repetitive_calendar_blind:
      dimension: juicio
      severity: medium
      triggered_by: [step_3.fails_mark_repetitive]
    no_progression_storyline:
      dimension: juicio
      severity: medium
      triggered_by: [step_2.followup_no_progression_mention, step_3.fails_mark_no_funnel]
    accept_volume_over_quality:
      dimension: decision
      severity: medium
      triggered_by: [step_4.entrega_20_sin_cambios]
    reject_llm_value:
      dimension: decision
      severity: low
      triggered_by: [step_4.rescribe_todo_cero]
    weak_communication:
      dimension: decision
      severity: low
      triggered_by: [step_5.spreadsheet_dates_only]
    overengineering:
      dimension: decision
      severity: low
      triggered_by: [step_5.full_briefs_per_piece]
    accept_output_no_validation:
      dimension: validacion
      severity: medium
      triggered_by: [step_5.raw_llm_output]

  practice_beats:
    repetitive_calendar_blind: practice_spot_calendar_redundancy_v1
    no_progression_storyline: practice_content_progression_storytelling_v1
    accept_volume_over_quality: practice_content_progression_storytelling_v1
    accept_output_no_validation: practice_validate_llm_output_v1  # reusa caso 1

  authoring_meta:
    written_by: claude_product
    reviewed_by: codex_engineering
    initial_review_pending: true
    last_updated: 2026-05-12
