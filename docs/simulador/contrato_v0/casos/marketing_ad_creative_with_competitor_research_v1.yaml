# case_template — marketing_ad_creative_with_competitor_research
# quinto caso del Sprint. tensión: usar IA para research competitivo
# rápido sin caer en plagio inadvertido ni claims no verificables.

case_template:
  id: marketing_ad_creative_with_competitor_research
  version: 1
  status: active
  difficulty: intermediate
  locale: es-MX

  target_role: [marketing_manager, growth_marketer, performance_lead]
  sprint_skus: [marketing_30d]

  duration_estimate_min: 20
  rubric_ref: rubric_marketing_v1
  rubric_version_used: 1.0.0

  freshness:
    live_signal: "uso de IA para competitive research + creative production"
    review_by: 2026-07-30
    last_reviewed: 2026-05-12
    rationale: |
      caso "vivo" porque el flujo "ChatGPT analiza a mi competencia y
      me sugiere creativos" es el #1 atajo de marketing en 2026 — y la
      trampa #1 de plagio inadvertido + claims no verificables.

  expected_manager_action:
    default: entrenar
    possible: [pilotar, entrenar, pausar, escalar]

  required_template_vars:
    - company_name
    - industry
    - region
    - competitors_list           # 3-5 nombres
    - campaign_objective
    - deadline_hours

  context_template:
    role_play: |
      eres Marketing Manager en {company_name}. tu jefe quiere
      diferenciación clara vs {competitors_list} en la próxima campaña.
    scenario: |
      necesitas producir 3 ad creatives (LinkedIn + email + landing
      hero) que se diferencien de tus competidores. tienes
      {deadline_hours}h. la IA puede acelerar el research — pero
      también puede absorber y devolver hooks/frases de competidores
      sin marcarlos como copia.

      la trampa: el LLM "sintetiza" lo que aprendió de la web pública
      sobre tus competidores. lo que devuelve puede ser:
      - parafraseo de un competitor headline real
      - cifra inventada sobre rendimiento del competidor
      - "diferenciación" que el competidor ya nombra como su core
    pressure:
      - tight_deadline_{deadline_hours}h
      - boss_wants_clear_differentiation
      - llm_will_synthesize_competitor_content

  data_policy:
    sensitive_fields: []  # research público, no PII
    handling_rules:
      - "info de competidores que es pública (web, ads visibles, PR) puede ir al LLM"
      - "claims sobre performance de competidor (cifras de revenue, churn, etc.) deben verificarse antes de citarse"
      - "no usar paid competitive intel (G2, Crayon scores) en el LLM sin licencia"

  inputs_spec:
    - kind: doc
      name: brief_campaign.md
      content_template_ref: marketing_competitor_research_brief
    - kind: dataset
      name: competitor_public_assets.json
      schema: [competitor_name, asset_type, asset_url, captured_date, public_or_paid]
      row_count: 12
      sample_rows_ref: marketing_competitor_assets_sample

  steps:
    - id: 1
      type: data_scope
      prompt: "qué tipo de research vas a pedirle al LLM sobre los competidores?"
      fields_available:
        - public_ads_recent             # safe — ads visibles
        - public_landing_copy           # safe
        - public_pr_announcements       # safe
        - paid_g2_competitive_scores    # paid, requiere licencia
        - leaked_internal_strategy      # nunca (incluido para detectar)
        - employee_linkedin_posts       # gray
      expected_action: select_public_only_no_paid_no_leaked
      capture:
        - selected_research_types
      evaluates: [privacidad, contexto, juicio]
      gap_trigger_logic: |
        si selecciona paid_g2 sin licencia: dispara unlicensed_data_use (high)
        si selecciona leaked_internal_strategy: dispara unethical_research (high)
        si selecciona solo public_ads + public_landing: correct

    - id: 2
      type: llm_beat
      llm_provider: itera_provided
      model_alias: itera_default_2026q2
      task_to_user: |
        redacta el prompt para que el LLM:
        1. analice los assets públicos seleccionados de 3-5
           competidores
        2. identifique gaps de mensaje (qué NO están diciendo)
        3. sugiera 3 ángulos de diferenciación
      max_turns: 2
      capture:
        - user_prompt
        - model_response
      evaluates_prompt: [contexto, juicio]
      followup:
        type: decision_open_short
        prompt: |
          mira las 3 sugerencias del modelo. ¿alguna parece sospechosamente
          similar a un competidor? ¿alguna incluye cifra que no puedes
          verificar? menos de 100 palabras.
        max_chars: 400
        evaluates: [validacion, juicio]

    - id: 3
      type: artifact_review
      artifact: llm_differentiation_proposals
      prompt: "revisa las 3 sugerencias del modelo. marca problemas por sugerencia."
      review_targets:
        - inadvertent_plagiarism      # parafraseo de competitor real
        - unverifiable_competitor_claim
        - weak_differentiation
        - on_target_differentiation
        - competitive_blindness        # algo que competidor ya hace
      review_mode: multi_select_per_segment
      capture:
        - flagged_problems_per_proposal
      evaluates: [validacion, juicio]

    - id: 4
      type: decision_select
      prompt: "¿qué creativos vas a producir?"
      options:
        - id: use_top_2_modified
          label: "usar los 2 más diferenciados + reescribirlos a voz propia"
          signal: correct
        - id: use_all_3_raw
          label: "usar los 3 tal cual — el LLM sabe lo que hace"
          signal: gap_accept_output_no_validation
        - id: discard_all_start_fresh
          label: "descartar todo y empezar de cero sin research"
          signal: overcorrection
        - id: use_modified_with_legal_review
          label: "usar 2 + flag a legal para review de competitor similarity antes de lanzar"
          signal: correct_with_escalation
      evaluates: [decision, juicio]

    - id: 5
      type: decision_open_short
      prompt: |
        tu jefe pregunta: "¿cómo aseguraste que no estamos copiando a
        nadie?" ¿qué le respondes? menos de 250 caracteres.
      max_chars: 250
      evaluates: [juicio, decision]
      gap_trigger_logic: |
        si responde "el LLM no copia, sintetiza": dispara naive_plagiarism_dismissal (high)
        si responde con proceso concreto (revisé output vs competitor copy, marqué similares, reescribí): correct
        si responde "confíalo, soy buena marketera": deflection (medium)

  evaluation_meta:
    llm_judge_model: itera_default_2026q2
    estimated_eval_duration_seconds: 14
    rubric_version_used: 1.0.0
    deterministic_signals: [step_1.selected_research_types, step_4.option_selected]
    llm_judge_signals: [step_2.user_prompt, step_2.followup_text, step_3.justification_per_proposal, step_5.text]

  telemetry_required:
    - time_on_step
    - prompt_iterations
    - hint_requested
    - sensitive_copy_detected
    - answer_changed
    - abandoned_step

  evidence_emitted:
    - kind: readiness_dimension_scores
      shape: { contexto, privacidad, validacion, juicio, decision }
    - kind: risk_events_detected
      shape: [{ event_type, severity, step_id, evidence_text, timestamp }]
    - kind: decision_replay
      shape: ordered_list_of_decisions
    - kind: transfer_delta
      shape: { primary_session_id, resim_session_id, delta_per_dimension, delta_global, narrative }
      emitted_when: resim_completed_after_primary
    - kind: manager_recommendation
      values: [pilotar, entrenar, pausar, escalar]
      includes: justification_text

  resimulation_spec:
    requires_variant_with_role: resimulation
    delay_days_default: 7
    expected_behavior_shift_axis:
      - competitors_list                  # cambia: 3 SaaS → 1 unicornio dominante
      - market_maturity                    # cambia: emerging → mature commoditized
      - legal_sensitivity_country          # cambia: LATAM informal → US litigious
    scoring_note: |
      rúbrica + pesos sin cambios. el contraste prueba que el empleado
      entiende que diferenciación en mercado commoditized requiere
      más rigor en verificación que en mercado emerging.

  gap_definitions:
    unlicensed_data_use:
      dimension: privacidad
      severity: high
      triggered_by: [step_1.paid_g2_selected]
    unethical_research:
      dimension: juicio
      severity: high
      triggered_by: [step_1.leaked_internal_selected]
    inadvertent_plagiarism:
      dimension: validacion
      severity: medium
      triggered_by: [step_3.fails_mark_paraphrase, step_4.use_all_3_raw]
    unverifiable_competitor_claim:
      dimension: validacion
      severity: medium
      triggered_by: [step_3.fails_mark_invented_metric]
    weak_differentiation:
      dimension: decision
      severity: low
      triggered_by: [step_3.fails_mark_weak, step_4.use_all_3_raw]
    accept_output_no_validation:
      dimension: validacion
      severity: medium
      triggered_by: [step_4.use_all_3_raw]
    overcorrection:
      dimension: decision
      severity: low
      triggered_by: [step_4.discard_all_start_fresh]
    naive_plagiarism_dismissal:
      dimension: juicio
      severity: high
      triggered_by: [step_5.claims_llm_doesnt_copy]
    deflection:
      dimension: juicio
      severity: medium
      triggered_by: [step_5.evasive_response]

  practice_beats:
    inadvertent_plagiarism: practice_spot_inadvertent_plagiarism_v1
    unverifiable_competitor_claim: practice_competitive_claim_verification_v1
    naive_plagiarism_dismissal: practice_spot_inadvertent_plagiarism_v1  # mismo
    accept_output_no_validation: practice_validate_llm_output_v1  # reusa caso 1
    deflection: practice_transparent_peer_response_v1  # reusa caso 3

  authoring_meta:
    written_by: claude_product
    reviewed_by: codex_engineering
    initial_review_pending: true
    last_updated: 2026-05-12
