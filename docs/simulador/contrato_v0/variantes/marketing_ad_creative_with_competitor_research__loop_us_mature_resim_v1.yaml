# case_variant — variante resim del quinto caso
# Loop intentando entrar US mature market dominado por 1 unicornio.

case_variant:
  id: marketing_ad_creative_with_competitor_research__loop_us_mature_resim_v1
  template_ref: marketing_ad_creative_with_competitor_research@v1
  parent_variant_ref: marketing_ad_creative_with_competitor_research__loop_emerging_v1
  variant_role: resimulation
  delay_days_from_parent: 7
  status: active

  template_var_values:
    company_name: Loop
    industry: "SaaS B2B (atención al cliente con IA)"
    region: US
    competitors_list: ["Sierra_AI"]  # 1 unicornio dominante
    campaign_objective: "entrar US mid-market vs Sierra AI dominante"
    deadline_hours: 6

  expected_behavior_shift: |
    contraste vs primary:

    1. competitors_list: 3 conocidos → 1 unicornio dominante (Sierra)
       → research del competidor único requiere más profundidad. cero
       lugar para "promediar a varios". cada hook del competitor es
       referencia conocida del mercado.

    2. market_maturity: emerging LATAM → mature US
       → audiencia US sofisticada reconoce plagio inadvertido al
       segundo. el costo reputacional es 10x.

    3. legal_sensitivity: LATAM informal → US litigious
       → uso de paid competitive intel (G2, Crayon) sin licencia es
       riesgo legal real (no solo ético). cita a competidor sin
       atribuir tiene precedente de demandas.

    4. deadline_hours: 12 → 6
       → presión real cuando los standards de verificación deberían
       subir, no bajar.

    el peor error en resim sería tratar el research como en LATAM
    informal (rápido, sin verificación, atributos parafraseados).

  inputs_resolved:
    synthetic: true
    provenance_note: |
      Sierra_AI es empresa real (sierra.ai) pero copy/headlines
      mencionados son sintéticos. brief y assets reflejan situación
      realista de competencia US mature 2026.
    items:
      - kind: doc
        name: brief_campaign.md
        content: |
          # brief — campaign US market entry, Q3

          ## objetivo
          3 ad creatives para entrada US mid-market. competidor
          dominante: Sierra AI. dolor target: ops teams quemados
          por AI demos que no escalan en producción.

          ## qué sabemos de Sierra
          - dominan US conversational AI customer service desde 2024
          - voice premium-confident: "the AI that actually closes
            tickets"
          - case studies con Notion, Linear, Vercel
          - pricing premium ($85k/year mid-market entry)
          - su debilidad declarada (en sus propios blog posts):
            "we're focused on US enterprise"

          ## restricción
          - cero comparativos por nombre (legal risk en US)
          - cero claims sobre performance Sierra sin source público
          - los reviews G2 son paid intel — necesitamos licencia
            o NO usarlos

          ## voice Loop
          mismo corporate-cálido, ahora en inglés profesional
          (en US no usamos español)

          ## deadline
          6 horas. mañana 8 AM EST presento al US country manager.

      - kind: dataset
        name: competitor_public_assets.json
        sample_rows:
          - ["Sierra_AI", "linkedin_ad", "https://sierra.ai/launch", "2026-04-15", "public",
             "the AI that actually closes customer tickets. not just routes them."]
          - ["Sierra_AI", "landing_hero", "https://sierra.ai", "2026-03-30", "public",
             "production-grade AI customer service for teams that ship."]
          - ["Sierra_AI", "case_study_notion", "https://sierra.ai/notion", "2026-04-22", "public",
             "how Notion cut ticket time 67% with Sierra"]
          - ["Sierra_AI", "blog_post_focus", "https://sierra.ai/blog/us-focus", "2026-02-08", "public",
             "why we're focused on US enterprise (for now)"]
          - ["Sierra_AI", "ad_video", "https://sierra.ai/video/q1", "2026-03-05", "public",
             "we don't promise AI magic. we ship customer service that works."]
          - ["Sierra_AI", "g2_review_aggregate_score", "https://g2.com/...", "2026-05-08", "paid",
             "G2 score 4.8/5 enterprise tier — REQUIRES G2 LICENSE TO USE"]

  rendering_meta:
    rendered_by: claude_product
    rendered_at: 2026-05-12
    used_for: resim_after_primary_completion
    triggers_when: "primary completed AND delay_days_from_parent elapsed"

  authoring_note: |
    Sierra es deliberadamente un solo competidor "dominante" — para
    forzar al empleado a no caer en "diferenciación promedio" y
    requerir specificidad. la weakness pública de Sierra ("focus US
    enterprise") es la oportunidad obvia que el LLM debería sugerir;
    pero el empleado tiene que validar que sea REAL antes de usarla
    en copy.
