# case_variant — variante primary del octavo caso
# Loop con viral complaint medium-severity en LinkedIn.

case_variant:
  id: marketing_crisis_response_with_ia__loop_viral_complaint_v1
  template_ref: marketing_crisis_response_with_ia@v1
  variant_role: primary
  status: active

  template_var_values:
    company_name: Loop
    industry: "SaaS B2B (atención al cliente con IA)"
    region: LATAM
    crisis_type: viral_complaint
    crisis_severity: medium
    twitter_thread_velocity: "8 tweets/hour, acelerando"
    press_coverage_started: false
    deadline_minutes: 60

  inputs_resolved:
    synthetic: true
    provenance_note: |
      crisis ficticia. tweets sintéticos pero con patrones reales
      de viral complaints en LATAM 2026 (queja inicial → amplificación
      → ask explícito a la empresa).
    items:
      - kind: doc
        name: incident_internal_brief.md
        content: |
          # incident internal brief — 10:42 PM 12 de mayo 2026 (CONFIDENCIAL)

          ## qué pasó
          - cliente Aurora Recursos (24k ARR) reportó vía LinkedIn que
            "Loop perdió todos sus tickets" después de un upgrade
            automatic de servicio
          - post tiene 1.2k engagements en 90 min, gaining traction
          - varios ops managers de otras empresas pidiendo a Aurora
            "qué pasó exactamente"

          ## qué sabemos internamente
          - sí hubo data sync issue en upgrade de v3.2 → v3.3 a las 9 PM
          - afectó 7 clientes (Aurora entre ellos)
          - tickets NO se perdieron — están en backup pero no visibles
            en UI hasta sync manual
          - sync manual toma 2-4 horas por cliente
          - engineering ya trabajando, eta resolución total: 6 AM

          ## qué NO sabemos
          - si otros clientes han notado (silent customers)
          - si Aurora va a escalar legalmente
          - alcance de business impact para Aurora

          ## qué NO podemos decir públicamente aún
          - lista de clientes afectados (privacidad)
          - root cause técnico exacto (sigue en investigación)
          - admisión de SLA breach (legal review pendiente)

      - kind: dataset
        name: twitter_mentions_real_time.json
        sample_rows:
          - ["t1", "2026-05-12 22:42", 8400, "negative", false, "@Loop ¿qué pasó?"]
          - ["t2", "2026-05-12 22:51", 2200, "negative", true, "@Loop ¿es cierto? ya empecé el switch a Konecta"]
          - ["t3", "2026-05-12 23:05", 14000, "neutral", false, "@Loop esperamos respuesta antes de mañana"]
          - ["t4", "2026-05-12 23:15", 1800, "negative", true, "@Loop si dicen 'estamos al tanto' uno más voy con Sierra AI"]
          - ["t5", "2026-05-12 23:24", 6700, "negative", false, "@Loop nuestros tickets también"]
          - ["t6", "2026-05-12 23:28", 880, "positive", false, "@Loop dato. les tengo paciencia hasta mañana, díganme algo"]
          - ["t7", "2026-05-12 23:32", 22000, "negative", false, "@Loop seguimos esperando palabra"]

      - kind: doc
        name: brand_crisis_playbook.md
        content: |
          # playbook crisis Loop (versión interna 2026-Q1)

          ## triage 5 min
          - identificar tipo de crisis: complaint / breach / outage / scandal
          - severity: low (1 mention) / medium (10-100 mentions) / high (press coverage) / existential (regulatory)

          ## approval chain
          - low + medium: marketing manager con OK de PR lead
          - high: + VP marketing
          - existential: + CEO + legal + board chair

          ## holding statement template
          "estamos al tanto del reporte. nuestro equipo investiga.
          responderemos en X horas con update completo. mientras
          tanto, [contacto directo o link a status]."

          ## NO publicar sin approval:
          - admisiones de causa
          - listas de afectados
          - promesas de remediation específica
          - referencias a competidores
          - tono que no sea factual + humano

          ## el approval chain existe SIEMPRE.
          en crisis, los procesos NO se saltan — se aceleran.

