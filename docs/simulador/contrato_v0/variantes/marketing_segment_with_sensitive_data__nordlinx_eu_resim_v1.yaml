# case_variant — variante resim del tercer caso
# NordLinx, B2B fintech europeo bajo GDPR estricto con DPO disponible.
# escala 10x (50k leads), región más estricta, equipo con compliance interna.

case_variant:
  id: marketing_segment_with_sensitive_data__nordlinx_eu_resim_v1
  template_ref: marketing_segment_with_sensitive_data@v1
  parent_variant_ref: marketing_segment_with_sensitive_data__loop_latam_v1
  variant_role: resimulation
  delay_days_from_parent: 7
  status: active

  template_var_values:
    company_name: NordLinx
    industry: "B2B fintech (compliance + treasury para empresas mid-market)"
    region: "Europa (HQ Estocolmo, equipos en Berlín y Ámsterdam)"
    regulation_regime: "GDPR_strict (DPO interno + RoPA registry + DPIA obligatorio para new processing)"
    team_size: 14
    crm_size_leads: 62000
    campaign_target_count: 50000
    deadline_hours: 6

  expected_behavior_shift: |
    el contexto cambia en 3 ejes críticos vs primary:

    1. regulation_regime: LATAM_baseline → GDPR_strict
       → ahora EXISTE un DPO interno. consultar al DPO antes de
       procesar segmentación con IA pasa de "opcional responsable"
       a "obligatorio por política interna". no consultar al DPO
       cuando está disponible es gap high (no medium).

    2. crm_size_leads y campaign_target_count: 8.4k → 62k, 5k → 50k
       → 10x escala. el riesgo de exponer individuos en segmentos
       chicos baja proporcionalmente, pero el riesgo de bias
       sistemático sube — un sesgo aplicado a 50k personas tiene
       impacto 10x. la rúbrica detecta lo mismo, pero el manager
       recommendation puede inclinarse más fuerte a "pausar" o
       "escalar".

    3. team_size + compliance interna
       → con DPO interno y team de 14, escalar es operacionalmente
       posible. la trampa "no hay tiempo para consultar" pierde
       fuerza. la respuesta correcta al peer en step 5 incluye
       mención de DPO consultado / DPIA archivado.

    el peor error en resim sería tratar GDPR strict como LATAM
    baseline. el empleado tiene que reconocer que el catálogo de
    protecciones es distinto (RoPA = Record of Processing Activities,
    DPIA = Data Protection Impact Assessment) sin necesidad de saber
    los acrónimos — basta con entender que hay procesos formales que
    activar.

  inputs_resolved:
    synthetic: true
    provenance_note: |
      datos sintéticos enterprise B2B EU. nombres + emails con
      patrones plausibles nórdicos/germánicos. behavioral data simulada.
      employers con sufijos legales europeos (AB, GmbH, BV).
    items:
      - kind: dataset
        name: crm_leads_sample.csv
        schema: [lead_id, first_name, last_name, email, phone, employer_name, industry, company_size_band, role_seniority, region, signup_source, engagement_score, last_visit_date, content_consumed, email_opens_30d, clicks_30d, demo_requests, intent_score]
        row_count: 80
        sample_rows:
          - [N0001, "Anika", "Lindqvist", "anika.l@helix-treasury.se", "+46 70 522 8841", "Helix Treasury AB", "fintech_b2b", "mid_250_1000", "vp", "SE-STO", "linkedin_ad", 82, "2026-05-10", "case_study_compliance,api_docs,pricing", 9, 6, 1, 88]
          - [N0002, "Mathias", "Schäffer", "mschaeffer@kvb.de", "+49 30 8800 4421", "Kapital-Vorsorge Berlin GmbH", "wealth_management", "enterprise_1000plus", "director", "DE-BER", "demo_request", 91, "2026-05-09", "demo_video,case_study_compliance,roi_calculator,pricing", 14, 9, 2, 93]
          - [N0003, "Lotte", "van Dijk", "lvandijk@flex.bv", "+31 6 4422 1199", "Flex Treasury BV", "fintech_b2b", "small_50_250", "manager", "NL-AMS", "blog_organic", 38, "2026-04-25", "blog_intro", 1, 0, 0, 31]
          - [N0004, "Henrik", "Aaltonen", "haaltonen@nordbank.fi", "+358 50 449 2200", "NordBank Finland Oy", "banking_traditional", "enterprise_1000plus", "head", "FI-HEL", "outbound_email", 71, "2026-05-02", "case_study_compliance,whitepaper_dora", 7, 5, 1, 78]
          - [N0005, "Sara", "Müller", "smueller@trnz.de", "+49 89 4477 8821", "Treffsicher GmbH", "fintech_b2b", "small_50_250", "junior_analyst", "DE-MUC", "linkedin_ad", 86, "2026-05-11", "case_study_treasury,api_docs,pricing", 11, 8, 1, 90]
          - [N0006, "Ola", "Bjørndal", "objorndal@arc.no", "+47 901 22 887", "Arctic Capital AS", "asset_management", "mid_250_1000", "ceo", "NO-OSL", "referral", 44, "2026-04-18", "blog_intro,case_study_treasury", 3, 1, 0, 42]

      - kind: doc
        name: campaign_brief.md
        content: |
          # campaign brief — H2 nordic expansion outbound

          ## context
          NordLinx está empujando expansión a sector wealth management
          + asset management en países nórdicos + DACH. CRM tiene 62k
          leads de tres años de inbound + outbound. queremos contactar
          50k este H2 con campaña segmentada.

          ## constraint
          sales tiene capacidad para 80 calls/week × 8 BDRs × 12 weeks
          = ~7,700 reuniones. necesitamos pipeline calificado, no
          volumen ciego.

          ## what compliance expects
          - DPIA archivado antes de procesar segmentation con IA
          - RoPA actualizado si introducimos new processing purpose
          - consult DPO Maja Korhonen for any AI-based prioritization

          ## what we have
          - CRM completo (mismos 18 campos)
          - intent_score interno
          - Itera LLM enterprise tier
          - DPO Maja disponible weekdays 09:00-17:00 CET
          - 6 horas para lista segmentada

          ## what VP Henrik expects
          "eficiencia + compliance. no pongas a la compañía en riesgo
          regulatorio por moverte rápido. consult Maja if in doubt."

          — Henrik Lindberg, VP Growth EMEA

  rendering_meta:
    rendered_by: claude_product
    rendered_at: 2026-05-12
    used_for: resim_after_primary_completion
    triggers_when: "primary completed AND delay_days_from_parent elapsed"

  authoring_note: |
    contraste GDPR vs LATAM_baseline pone a prueba si el empleado
    aprendió:
    1. consultar aprobador cuando está disponible (no es opcional)
    2. el catálogo de riesgos escala con audiencia (10x scale)
    3. honestidad con peer cuando pregunta — en EU la pregunta del
       brand lead probablemente venga de compliance, no curiosidad
