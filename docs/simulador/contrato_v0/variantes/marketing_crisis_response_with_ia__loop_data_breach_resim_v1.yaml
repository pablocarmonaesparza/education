# case_variant — variante resim del octavo caso
# Loop ahora con data breach AI existential-severity, 20 min, press iniciada.

case_variant:
  id: marketing_crisis_response_with_ia__loop_data_breach_resim_v1
  template_ref: marketing_crisis_response_with_ia@v1
  parent_variant_ref: marketing_crisis_response_with_ia__loop_viral_complaint_v1
  variant_role: resimulation
  delay_days_from_parent: 7
  status: active

  template_var_values:
    company_name: Loop
    industry: "SaaS B2B (atención al cliente con IA)"
    region: LATAM + US
    crisis_type: data_breach_ai
    crisis_severity: existential
    twitter_thread_velocity: "240 tweets/hour, exploding"
    press_coverage_started: true
    deadline_minutes: 20

  expected_behavior_shift: |
    contraste vs primary:

    1. crisis_type: viral_complaint → data_breach_ai
       → ahora es regulatorio. GDPR/LGPD obliga notificación a
       authority en 72h. cualquier statement público puede ser
       evidencia legal. la tentación de "responder rápido" se vuelve
       peligro mayor.

    2. crisis_severity: medium → existential
       → puede destruir la empresa. el approval chain ahora INCLUYE
       board chair + legal external + DPO. el marketing manager
       NO es decisor — es coordinator del messaging.

    3. press_coverage: false → true
       → TechCrunch + Reuters ya reportaron. Hacker News tiene
       thread top con 800 comentarios. el silencio se interpreta
       como admisión.

    4. deadline_minutes: 60 → 20
       → 3x menos tiempo. al mismo tiempo, 10x stakes. la trampa:
       caer en "tengo que decidir solo porque no hay tiempo".
       el approval chain debe activarse en paralelo (todos al
       mismo tiempo, no secuencial).

    el peor error en resim sería tratar como viral complaint
    escalado. data breach es categoría distinta con regulación
    diferente. la respuesta correcta probablemente NO es marketing
    sino legal + DPO + CEO. tu rol = facilitar messaging cuando
    el approval chain aprueba.

  inputs_resolved:
    synthetic: true
    provenance_note: |
      crisis ficticia (data breach AI). detalles técnicos plausibles
      pero no referencian incident real. tweets/coverage simulados con
      patrones reales de breach coverage 2025-2026.
    items:
      - kind: doc
        name: incident_internal_brief.md
        content: |
          # incident — data breach AI (CONFIDENCIAL - LEGAL HOLD)
          ## 11:02 PM 19 de mayo 2026

          ## qué pasó
          - investigador de seguridad reveló en blog público a las 10:30 PM
            que dataset de training de Loop AI incluye conversaciones
            de clientes con PII no anonimizada
          - dataset accesible via API misconfiguration desde marzo 2026
          - investigador estima 240,000 conversaciones leaked
          - investigador notificó a Loop hace 14 días — Loop NO respondió
            (slack del CTO falló)
          - investigador publica ahora porque "transparencia"

          ## qué confirmamos
          - data sí estaba accesible
          - el dataset incluyó conversaciones cliente con PII (nombres,
            emails, casos de soporte)
          - clientes afectados: aún investigando, estimación 180-220
            organizaciones impactadas
          - root cause: misconfiguration de bucket s3 en pipeline de ML

          ## qué NO sabemos aún
          - alcance preciso (qué subset de conversaciones)
          - quién más accedió al endpoint
          - estado de GDPR/LGPD notification (legal trabajando)

          ## stakeholders
          - CEO en avión (vuelve mañana 8 AM)
          - VP marketing en cena de equipo (responde slack en 10 min)
          - legal external (Garcia & Asociados) — respondió ya, los
            tienes en línea
          - DPO no tenemos (era item en backlog)

      - kind: dataset
        name: twitter_mentions_real_time.json
        sample_rows:
          - ["t1", "2026-05-19 22:31", 47000, "negative", false, "@Loop ¿es cierto que tienen mi data?"]
          - ["t2", "2026-05-19 22:38", 220000, "negative", true, "@Loop están en el thread de @secresearcher. expliquen YA"]
          - ["t3", "2026-05-19 22:44", 1200000, "neutral", false, "@TechCrunch story breaking — @Loop AI data exposed"]
          - ["t4", "2026-05-19 22:51", 8800, "negative", true, "@Loop al menos contesten. peor que la última de Equifax"]
          - ["t5", "2026-05-19 22:58", 65000, "negative", false, "@Loop ¿hay incumplimiento de GDPR? necesitamos respuesta antes de mañana"]

      - kind: doc
        name: brand_crisis_playbook.md
        content: |
          # playbook crisis Loop (versión 2026-Q1)
          (mismo del primary — playbook NO cambia)

          ## existential level
          - + board chair
          - + legal external counsel
          - + DPO (si existe; si no, immediate external retain)
          - + CISO communication
          - + customer notification dentro de 72h (GDPR/LGPD)
          - holding statement aún válido — pero NO admite causa

          ## CRITICAL: data breach
          - cada palabra puede ser evidencia legal
          - no admitir alcance hasta confirmar
          - no estimar damage hasta legal review
          - no nombrar a otros (researcher) sin OK legal

  rendering_meta:
    rendered_by: claude_product
    rendered_at: 2026-05-12
    used_for: resim_after_primary_completion
    triggers_when: "primary completed AND delay_days_from_parent elapsed"

  authoring_note: |
    data breach existential es el escenario más alto stakes posible
    para marketing. el empleado tiene que reconocer que su rol NO
    es decisor — es coordinator. la respuesta correcta = activar
    approval chain en paralelo (legal external + VP + CEO + futuro
    DPO retain), publicar holding statement minimal en 5 min, y
    esperar approval para todo lo demás.
