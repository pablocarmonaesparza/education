# case_variant — variante primary del sexto caso
# Loop reporte semanal a CMO con 3 fuentes de attribution.

case_variant:
  id: marketing_attribution_reporting_to_cmo__loop_weekly_v1
  template_ref: marketing_attribution_reporting_to_cmo@v1
  variant_role: primary
  status: active

  template_var_values:
    company_name: Loop
    industry: "SaaS B2B (atención al cliente con IA)"
    region: LATAM
    reporting_cadence: weekly
    sources_available: 3
    cmo_pressure_level: standard
    deadline_hours: 4

  inputs_resolved:
    synthetic: true
    provenance_note: |
      datasets attribution simulados con inconsistencias realistas
      entre fuentes — diferencias de modelo de attribution producen
      números no-equivalentes.
    items:
      - kind: dataset
        name: hubspot_attribution.csv
        schema: [date, source, leads, mql, sql, opportunities, revenue_attributed]
        sample_rows:
          - ["2026-05-05", "linkedin_ads", 42, 18, 6, 2, 47000]
          - ["2026-05-05", "google_ads", 31, 14, 4, 1, 22000]
          - ["2026-05-05", "organic", 28, 11, 3, 1, 18000]
          - ["2026-05-05", "referral", 8, 6, 4, 2, 51000]
          - ["2026-05-06", "linkedin_ads", 38, 15, 5, 1, 24000]
          - ["2026-05-06", "google_ads", 35, 16, 5, 2, 38000]
          - ["2026-05-06", "organic", 33, 13, 4, 1, 19000]
          - ["2026-05-06", "referral", 11, 9, 5, 2, 62000]

      - kind: dataset
        name: ads_platforms_aggregated.csv
        schema: [date, platform, spend, clicks, leads_pixel, conversions_pixel]
        sample_rows:
          - ["2026-05-05", "LinkedIn Ads", 1820, 412, 56, 4]
          - ["2026-05-05", "Google Ads", 1450, 388, 42, 3]
          - ["2026-05-05", "Meta Ads", 920, 504, 38, 2]
          - ["2026-05-06", "LinkedIn Ads", 1750, 398, 51, 3]
          - ["2026-05-06", "Google Ads", 1380, 376, 44, 3]
          - ["2026-05-06", "Meta Ads", 890, 491, 41, 2]

      - kind: dataset
        name: sales_attribution_manual.json
        schema: [opportunity_id, source_self_reported, deal_size, close_quarter]
        sample_rows:
          - ["OPP-2245", "LinkedIn outbound + demo request", 48000, "Q2"]
          - ["OPP-2247", "referral from existing customer", 62000, "Q2"]
          - ["OPP-2251", "organic search + 2 nurture emails", 28000, "Q3"]
          - ["OPP-2254", "podcast mention + LinkedIn ad", 36000, "Q2"]
          - ["OPP-2256", "referral", 54000, "Q3"]

      - kind: doc
        name: cmo_briefing_template.md
        content: |
          # template reporte semanal — CMO Camila

          ## resumen ejecutivo
          - 3 bullets

          ## fuente de variación principal
          - qué cambió semana vs semana anterior + por qué

          ## recomendación accionable
          - 1 cosa concreta para próxima semana

          ## tabla de números
          - revenue attributed (HubSpot)
          - cost per lead (Ads)
          - close rate (Sales manual)

          ## caveats
          - discrepancias entre fuentes (si aplica)
          - claims que no puedes verificar (si aplica)

  rendering_meta:
    rendered_by: claude_product
    rendered_at: 2026-05-12
    used_for: sixth_simulation_session_in_sprint
    next_in_sprint: marketing_content_calendar_under_pressure@v1
    pairs_with_resim: marketing_attribution_reporting_to_cmo__loop_board_review_resim_v1
