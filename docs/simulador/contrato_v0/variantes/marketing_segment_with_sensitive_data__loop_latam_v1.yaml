          # campaign brief — Q2 outbound nurture

          ## objetivo
          mover 80-120 leads a sales-meeting este Q2 (mayo-junio).
          tenemos 8.4k leads en el CRM. queremos llegar con email
          personalizado a 5,000.

          ## restricción
          el equipo de sales tiene capacidad para 25 calls/semana × 6
          BDRs × 8 semanas = 1,200 reuniones potenciales en Q2.
          necesitamos calidad de pipeline, no cantidad.

          ## qué pidió VP Camila
          "que la lista sea inteligente — no me mandes a los 5,000
          el mismo email. quiero personalización por segmento y
          priorización por probabilidad real de cierre."

          ## qué tienes a tu disposición
          - el CRM completo (18 campos por lead)
          - intent_score generado por nuestra herramienta de tracking
          - LLM corporativo aprobado por IT (no fine-tuned)
          - 8 horas para entregar lista final segmentada

          ## qué NO tienes
          - DPO interno (decide tu criterio + best practices)
          - lista validada de "no contactar" reciente
          - feedback del último Q sobre qué segmentos convirtieron mejor

          gracias. — Camila

