             "scale your support without scaling your team"]
          - ["Zendesk", "landing_hero", "https://zendesk.com/ai", "2026-04-02", "public",
             "AI that actually helps your agents — not replaces them"]
          - ["Intercom", "linkedin_ad", "https://intercom.com/fin-ai", "2026-03-28", "public",
             "Fin AI handles 50% of conversations. your team handles what matters."]
          - ["Intercom", "blog_post", "https://intercom.com/blog/ai-vs-replace", "2026-04-10", "public",
             "we don't replace your support team. we extend it."]
          - ["Intercom", "twitter_thread", "https://twitter.com/intercom/...", "2026-05-01", "public",
             "12 questions to ask before adopting AI in customer service"]
          - ["Konecta_AI", "linkedin_ad", "https://konecta.ai/launch", "2026-04-22", "public",
             "the AI customer service platform that learns your business in 7 days"]
          - ["Konecta_AI", "landing_hero", "https://konecta.ai", "2026-04-18", "public",
             "stop drowning in tickets. let AI close them."]
