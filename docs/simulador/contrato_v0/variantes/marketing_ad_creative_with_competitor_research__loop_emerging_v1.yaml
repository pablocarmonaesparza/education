# Loop en mercado LATAM emerging con 3 competidores claros.

case_variant:
  id: marketing_ad_creative_with_competitor_research__loop_emerging_v1
  template_ref: marketing_ad_creative_with_competitor_research@v1
  variant_role: primary
  status: active

  template_var_values:
    company_name: Loop
    industry: "SaaS B2B (atención al cliente con IA)"
    region: LATAM
    competitors_list: ["Zendesk", "Intercom", "Konecta_AI"]
    campaign_objective: "diferenciación en LATAM mid-market para Q2"
    deadline_hours: 12

  inputs_resolved:
