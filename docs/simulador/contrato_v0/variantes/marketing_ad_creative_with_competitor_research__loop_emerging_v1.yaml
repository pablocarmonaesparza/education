    provenance_note: |
      assets de competidores son ficticios. Zendesk/Intercom son
      empresas reales pero los headlines/copy mencionados son
      sintéticos para el caso. Konecta_AI es nombre ficticio.
    items:
      - kind: doc
        name: brief_campaign.md
        content: |
          # brief — campaign Q2 diferenciación

          ## objetivo
          3 ad creatives (LinkedIn + email + landing hero) que
          posicionen a Loop diferenciado de Zendesk, Intercom y
          Konecta_AI en mid-market LATAM.

          ## qué sabemos
          - Zendesk: dominante, voice "professional/established",
            mensaje principal "scale your support"
          - Intercom: hipster, voice "conversational/modern", mensaje
            "AI agents that work"
          - Konecta_AI: nuevo, voice "agresivo/disruptivo", mensaje
            "automate everything"

          ## restricción
          - no comparativos directos por nombre (regla legal LATAM
            informal pero estandar)
          - cero claims sobre performance competidor sin source
          - voice Loop: corporate-cálido consultor

          ## deadline
          12 horas. mañana 9 AM presento al CMO.

