# practice_beat — qué scrubear vs qué preservar en brief externo
# disparado por gap: leak_strategy
# duración: ≤2 min.

practice_beat:
  id: practice_scrub_strategy_from_brief_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: leak_strategy
  dimension: juicio
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. mantuviste info estratégica en el brief que
      enviaste a la agencia. la agencia firmó NDA, pero NDA es post-hoc
      — no previene leaks accidentales (forwarding, screenshots, ex-
      empleados de agencia que se van a competencia).
    why_this_matters: |
      cada pieza de info estratégica que sale de la empresa multiplica
      el riesgo de filtración. NDA es protección legal pos-incidente;
      scrubbing es protección preventiva. tu trabajo: que la agencia
      tenga lo SUFICIENTE para hacer su trabajo, no MÁS.

  principle_card:
    headline: "filtro de 3 capas para info en brief externo"
    body: |
      antes de incluir cualquier info en brief externo, pasa por:

      1. **¿la agencia necesita esto para producir el deliverable?**
         si no necesita la cifra exacta del ARR para escribir un
         headline, no la incluyas. "growth target ambicioso Q2" >
         "$480k ARR target Q2".

      2. **¿esto podría ser dañino si se filtra?**
         lanzamientos no anunciados, M&A, layoffs, pricing futuro,
         competitive intel = nunca. postmortems generales OK si
         son temáticos (no menciones campaña específica).

      3. **¿la agencia puede inferir esto de info pública?**
         si Loop ya anunció "expansión Q3" públicamente, mencionar
         expansión en brief es OK. si Loop NO ha anunciado nada Q3,
         omite.

      regla: brief externo es PUBLIC INFO + TACTICAL CONTEXT, NUNCA
      strategic info no-pública.

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      revisa estas 5 líneas de un brief para freelancer. clasifica
      cada una: INCLUDE, OMIT, o REWRITE.
    segments:
      - id: 1
        text: "campaña: lanzamiento del módulo auto-routing inteligente en junio"
        correct_verdict: include
        why: "lanzamiento ya es público para junio. ok mencionarlo."
      - id: 2
        text: "intent: posicionar antes de que Sierra AI lance su copycat en septiembre"
        correct_verdict: omit
        why: "competitive intel + lanzamiento futuro de Sierra (no público + no necesario para el freelancer)."
      - id: 3
        text: "audiencia: ops managers + heads of customer service en mid-market"
        correct_verdict: include
        why: "tactical, no estratégico. la audiencia siempre va al brief."
      - id: 4
        text: "tone: cero motivacional — vimos en Q4 2025 que campaña 'tu equipo merece descansar' tuvo 0.6% CTR, postmortem dijo motivacional no funciona"
        correct_verdict: rewrite
        why: "principio útil pero menciona campaña específica + cifra interna. reescribir: 'tone: cero motivacional. ops managers leen el motivacional como BS. priorizar dolor específico.'"
      - id: 5
        text: "target: $200k de ARR nuevo este Q de este lanzamiento"
        correct_verdict: omit
        why: "financial target interno. el freelancer no necesita la cifra para producir creatividad."

  reveal_after_attempt:
    correct_principle: |
      el brief externo es un EXTRACTO del brief interno, no una
      versión simplificada. extraes lo táctico (audiencia, tono,
      deliverables, timeline público) y omites lo estratégico
      (cifras, planes futuros, competitive intel, postmortem
      específicos). reescribe lo que está en medio: el principio
      útil sin la fuente confidencial.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
