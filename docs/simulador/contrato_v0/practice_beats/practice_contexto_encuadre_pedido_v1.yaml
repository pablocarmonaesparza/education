practice_beat:
  id: practice_contexto_encuadre_pedido_v1
  status: active
  dimension: contexto
  level: 1
  career_key: ops
  triggered_by_gap: [missing_task_framing]
  duration_max_seconds: 360
  principle_card:
    headline: "Frame the request before you ask AI for anything"
    body: "A vague request produces a vague result. Goal, audience, and constraints get settled before you write, not after you get back something unusable."
  practice_exercise:
    type: formative_slides
    blocks: [categorize_rows, ai_output_review]
    prompt: "You get a vague request from your manager and decide what to clarify before you work with AI; then you review the request a coworker wrote to AI and mark what leaves it guessing."
  completion_criteria: "Complete both exercises (every row and every segment answered) and review the feedback for each."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "A vague request produces a vague result"
      body: "Your manager asks you for something half-specified, you pass it to AI half-specified, and the result helps nobody. Here you practice what to settle before you start: what it is for, who it is for, and what limits it has."
      chips: ["N1 · Fundamentals", "Operations", "6 min"]
    - id: principio
      kind: reading
      title: "Three questions before you write to AI"
      body: |-
        **The problem.** AI does not guess what the request never said. Write "get me a delivery report" and it will produce something, and that something is almost never what your manager had in mind. The tool does not pay for the rework. You do.

        **The rule.** Before you write the request, answer three questions. Goal: what decision gets made with this? A document for deciding whether to switch carriers is not the same as one for reporting how the week closed. Audience: who reads it? Leadership wants three conclusions. The warehouse team wants the open-items list. Constraints: what format, what length, by when, and what should not be in it?

        **The example.** A chat message lands: "Send me something on the delivery situation for tomorrow." You could produce ten different documents from that. A thirty-second question, "is this for the leadership meeting or for coordinating the warehouse?", is worth more than an hour of work on the wrong assumption.

        **What comes next.** If the request you received does not answer the three questions, your first move is not opening AI. It is asking.
    - id: ejercicio_aclarar
      kind: exercise
      blockId: categorize_rows
      title: "This request lands: \"Put something together on the delivery situation for tomorrow\""
      body: "Before you ask AI for anything, decide what you do with each piece of context."
      caseContext:
        actionStyle: neutral
        actions:
          - { value: preguntar, label: "Ask first" }
          - { value: asumir, label: "Safe to assume" }
          - { value: fuera, label: "Not needed" }
        rows:
          - { id: c1, label: "Who the document is for: leadership or the warehouse team" }
          - { id: c2, label: "What period it covers: last week or the whole month" }
          - { id: c3, label: "The language of the document (every internal report goes out in English)" }
          - { id: c4, label: "Whether your manager prefers bar charts or line charts" }
          - { id: c5, label: "What decision gets made at the meeting with this document" }
      feedback:
        kind: rows
        rows:
          - { id: c1, correct: preguntar, why: "The audience changes everything: level of detail, tone, and which data matters. It is the first question, not the last." }
          - { id: c2, correct: preguntar, why: "The period defines which data you use. Assume it wrong and you rebuild the whole document." }
          - { id: c3, correct: asumir, why: "There is a clear convention and no risk: every internal report goes out in English. Asking this adds noise without adding anything." }
          - { id: c4, correct: fuera, why: "A presentation detail you can decide yourself and adjust in a minute if your manager does not like it. It does not block the work." }
          - { id: c5, correct: preguntar, why: "The real goal defines what is relevant. A document for deciding a carrier switch looks nothing like one for reporting the week." }
    - id: ejercicio_revisar_pedido
      kind: exercise
      blockId: ai_output_review
      title: "Your coworker wrote this request to AI. Review it"
      body: "Mark the lines that leave AI guessing. Tap to mark."
      caseContext:
        segments:
          - { id: s1, text: "I need a summary of deliveries for the week of June 8-14.", flagIfMarked: "frase_reutilizable" }
          - { id: s2, text: "It's for the leadership meeting on Tuesday.", flagIfMarked: "frase_reutilizable" }
          - { id: s3, text: "Put in whatever you think is important.", flagIfMarked: "frase_reutilizable" }
          - { id: s4, text: "Make it look professional.", flagIfMarked: "frase_reutilizable" }
          - { id: s5, text: "One page max, with a table of on-time deliveries by region.", flagIfMarked: "frase_reutilizable" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: false, why: "Concrete goal and period. AI knows exactly which data to use." }
          - { id: s2, shouldFlag: false, why: "Clear audience and date. That sets the level of detail and the tone." }
          - { id: s3, shouldFlag: true, why: "It hands your judgment to the tool. You say what to include: the machine does not know what your leadership cares about." }
          - { id: s4, shouldFlag: true, why: "\"Professional\" is not an instruction. Format, length, and structure are." }
          - { id: s5, shouldFlag: false, why: "Operating constraints: length and structure defined. This is how you ask." }
    - id: cierre
      kind: closing
      title: "Tomorrow, before you write to AI"
      body: "Look at the request you received: does it say what it is for, who it is for, and what limits it has? If one of the three is missing, your first move is a thirty-second question, not an hour of work on an assumption."
