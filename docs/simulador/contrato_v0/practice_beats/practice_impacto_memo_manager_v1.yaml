practice_beat:
  id: practice_impacto_memo_manager_v1
  status: active
  dimension: impacto
  level: 1
  career_key: ops
  triggered_by_gap: [weak_impact_translation]
  duration_max_seconds: 360
  principle_card:
    headline: "Un memo útil cabe en tres líneas: decisión, métrica y siguiente paso"
    body: "Tu jefe no necesita el viaje del análisis: necesita el destino, cuánto cuesta y qué pasa el lunes."
  practice_exercise:
    type: formative_slides
    blocks: [categorize_rows, ai_output_review]
    prompt: "La IA te dio un análisis largo sobre retrasos de entrega: decides qué entra al memo para tu jefe, qué va al anexo y qué sobra; luego revisas un borrador de memo y marcas lo que no ayuda a decidir."
  completion_criteria: "Completar los 2 ejercicios (todas las filas y todos los segmentos con respuesta) y revisar la retroalimentación de cada uno."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "El análisis no es el entregable; la decisión sí"
      body: "La inteligencia artificial te entrega tres páginas de hallazgos y tu jefe tiene un minuto para leerte. Aquí practicas convertir un output largo en un memo con el que alguien puede decidir hoy."
      chips: ["N1 · Fundamentos", "Operaciones", "6 min"]
    - id: principio
      kind: reading
      title: "De análisis a memo en tres bloques"
      body: |-
        **El problema.** Reenviar el análisis completo de la inteligencia artificial se siente productivo, pero traslada el trabajo a tu jefe: ahora él tiene que leer tres páginas para encontrar la decisión que tú ya conoces. Un memo que no propone nada no es información — es tarea pendiente para otro.

        **La regla.** Un memo accionable tiene tres bloques y poco más. Decisión propuesta: qué recomiendas hacer, en una frase, con su costo si lo tiene. Métrica: qué número se va a mover, desde dónde y hasta dónde — "entregas a tiempo, de 78% a 90%" le da a tu jefe una forma de saber después si funcionó. Siguiente paso: qué pasa, cuándo y quién lo opera. Las tablas completas y el detalle del cálculo van en un anexo para quien quiera profundizar. Cómo usaste la herramienta no le importa a nadie más que a ti.

        **El ejemplo.** Tres páginas sobre retrasos se convierten en: "Propongo cambiar de transportista en la zona norte, donde se concentra el retraso. Métrica: entregas a tiempo de 78% a 90% en un mes. Siguiente paso: piloto de dos semanas desde el lunes, lo coordino yo. Datos completos en el anexo". Eso se decide en un minuto — que era el objetivo.
    - id: ejercicio_memo
      kind: exercise
      blockId: categorize_rows
      title: "La IA te dio tres páginas sobre los retrasos de entrega"
      body: "Tu jefe tiene un minuto. Decide dónde queda cada elemento."
      caseContext:
        actionStyle: neutral
        actions:
          - { value: entra, label: "Entra al memo" }
          - { value: anexo, label: "Va al anexo" }
          - { value: fuera, label: "Fuera" }
        rows:
          - { id: i1, label: "Propuesta: cambiar de transportista en la zona norte, donde se concentra el retraso" }
          - { id: i2, label: "La tabla completa con las 340 entregas de la quincena" }
          - { id: i3, label: "Métrica: entregas a tiempo en zona norte, de 78% a 90% en un mes" }
          - { id: i4, label: "Explicación de qué herramienta de IA usaste y cómo armaste el pedido" }
          - { id: i5, label: "Siguiente paso: piloto de dos semanas desde el lunes 6, coordinado por ti" }
      feedback:
        kind: rows
        rows:
          - { id: i1, correct: entra, why: "Es la decisión propuesta — la razón de que el memo exista. Va primero y en una frase." }
          - { id: i2, correct: anexo, why: "El respaldo importa, pero no en el cuerpo. Quien quiera auditar el detalle lo encuentra en el anexo; tu jefe no necesita 340 filas para decidir." }
          - { id: i3, correct: entra, why: "La métrica con punto de partida y meta. Sin ella, nadie podrá decir en un mes si la decisión funcionó." }
          - { id: i4, correct: fuera, why: "El proceso interno de tu herramienta no alimenta la decisión. Contarlo solo agrega texto entre tu jefe y la respuesta." }
          - { id: i5, correct: entra, why: "Fecha y responsable convierten la propuesta en plan. Es la diferencia entre \"deberíamos\" y \"empieza el lunes\"." }
    - id: ejercicio_borrador
      kind: exercise
      blockId: ai_output_review
      title: "Este es el borrador de memo que armó la IA"
      body: "Marca lo que no ayuda a tu jefe a decidir. Toca para marcar."
      caseContext:
        segments:
          - { id: s1, text: "Propongo cambiar de transportista en la zona norte a partir de la próxima semana.", flagIfMarked: "frase_reutilizable" }
          - { id: s2, text: "Se realizó un análisis exhaustivo integrando múltiples dimensiones de datos para maximizar sinergias operativas.", flagIfMarked: "frase_reutilizable" }
          - { id: s3, text: "Entregas a tiempo en zona norte: hoy 78%, meta 90% al cierre del piloto.", flagIfMarked: "frase_reutilizable" }
          - { id: s4, text: "Existen además muchas oportunidades interesantes de mejora en varias áreas que podríamos explorar.", flagIfMarked: "frase_reutilizable" }
          - { id: s5, text: "Costo del cambio: 4% más por envío; se recupera evitando una de cada diez reentregas.", flagIfMarked: "frase_reutilizable" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: false, why: "Decisión concreta con fecha. Es el corazón del memo." }
          - { id: s2, shouldFlag: true, why: "Relleno que suena importante y no dice nada. Bórralo: no hay decisión, número ni fecha ahí adentro." }
          - { id: s3, shouldFlag: false, why: "Métrica con punto de partida y meta. Así se mide si la decisión funcionó." }
          - { id: s4, shouldFlag: true, why: "\"Muchas oportunidades en varias áreas\" no se puede decidir ni medir. O se convierte en una propuesta concreta o no va." }
          - { id: s5, shouldFlag: false, why: "El costo de la decisión y cuándo se recupera. Exactamente lo que un jefe pregunta antes de decir que sí." }
    - id: cierre
      kind: closing
      title: "Mañana, antes de mandar tu próximo reporte"
      body: "Bórralo todo menos tres líneas: qué propones, qué número se mueve y qué pasa el lunes. Si esas tres líneas no están, el memo no está listo — lo demás es anexo."
