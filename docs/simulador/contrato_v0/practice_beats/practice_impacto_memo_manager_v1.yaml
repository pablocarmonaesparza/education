practice_beat:
  id: practice_impacto_memo_manager_v1
  status: active
  dimension: impacto
  level: 1
  career_key: ops
  triggered_by_gap: [weak_impact_translation]
  duration_max_seconds: 360
  principle_card:
    headline: "A useful memo fits in three lines: decision, metric, next step"
    body: "Your manager does not need the trip through the analysis. They need the destination, what it costs, and what happens Monday."
  practice_exercise:
    type: formative_slides
    blocks: [categorize_rows, ai_output_review]
    prompt: "AI handed you a long analysis on delivery delays: you decide what goes in the memo for your manager, what goes in the appendix, and what does not belong; then you review a draft memo and mark what does not help anyone decide."
  completion_criteria: "Complete both exercises (every row and every segment answered) and review the feedback for each."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "The analysis is not the deliverable; the decision is"
      body: "AI hands you three pages of findings and your manager has one minute for you. Here you practice turning a long output into a memo someone can decide on today."
      chips: ["N1 · Fundamentals", "Operations", "6 min"]
    - id: principio
      kind: reading
      title: "From analysis to memo in three blocks"
      body: |-
        **The problem.** Forwarding the full AI analysis feels productive, but it moves the work to your manager. Now they have to read three pages to find the decision you already know. A memo that proposes nothing is not information. It is someone else's to-do.

        **The rule.** An actionable memo has three blocks and little else. Proposed decision: what you recommend doing, in one sentence, with its cost if it has one. Metric: which number moves, from where to where. "On-time delivery, from 78% to 90%" gives your manager a way to know later whether it worked. Next step: what happens, when, and who runs it. The full tables and the detail of the math go in an appendix for anyone who wants to dig. How you used the tool matters to nobody but you.

        **The example.** Three pages on delays turn into: "I propose switching carriers in the North region, where the delay concentrates. Metric: on-time delivery from 78% to 90% in one month. Next step: two-week pilot starting Monday, I coordinate it. Full data in the appendix." That gets decided in a minute, which was the point.
    - id: ejercicio_memo
      kind: exercise
      blockId: categorize_rows
      title: "AI gave you three pages on the delivery delays"
      body: "Your manager has one minute. Decide where each element belongs."
      caseContext:
        actionStyle: neutral
        actions:
          - { value: entra, label: "Goes in the memo" }
          - { value: anexo, label: "Goes in the appendix" }
          - { value: fuera, label: "Cut it" }
        rows:
          - { id: i1, label: "Proposal: switch carriers in the North region, where the delay concentrates" }
          - { id: i2, label: "The full table with all 340 deliveries from the past two weeks" }
          - { id: i3, label: "Metric: on-time delivery in the North region, from 78% to 90% in one month" }
          - { id: i4, label: "An explanation of which AI tool you used and how you built the request" }
          - { id: i5, label: "Next step: two-week pilot starting Monday the 6th, coordinated by you" }
      feedback:
        kind: rows
        rows:
          - { id: i1, correct: entra, why: "It is the proposed decision, the reason the memo exists. It goes first and in one sentence." }
          - { id: i2, correct: anexo, why: "The backup matters, but not in the body. Anyone who wants to audit the detail finds it in the appendix. Your manager does not need 340 rows to decide." }
          - { id: i3, correct: entra, why: "The metric with a starting point and a target. Without it, nobody can say in a month whether the decision worked." }
          - { id: i4, correct: fuera, why: "Your tool's internal process does not feed the decision. Telling it only adds text between your manager and the answer." }
          - { id: i5, correct: entra, why: "A date and an owner turn the proposal into a plan. That is the difference between \"we should\" and \"it starts Monday\"." }
    - id: ejercicio_borrador
      kind: exercise
      blockId: ai_output_review
      title: "This is the draft memo AI put together"
      body: "Mark what does not help your manager decide. Tap to mark."
      caseContext:
        segments:
          - { id: s1, text: "I propose switching carriers in the North region starting next week.", flagIfMarked: "frase_reutilizable" }
          - { id: s2, text: "A comprehensive analysis was conducted integrating multiple data dimensions to maximize operational synergies.", flagIfMarked: "frase_reutilizable" }
          - { id: s3, text: "On-time delivery in the North region: 78% today, 90% target at the end of the pilot.", flagIfMarked: "frase_reutilizable" }
          - { id: s4, text: "There are also many interesting improvement opportunities across several areas we could explore.", flagIfMarked: "frase_reutilizable" }
          - { id: s5, text: "Cost of the switch: 4% more per shipment; it pays back by avoiding one in ten redeliveries.", flagIfMarked: "frase_reutilizable" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: false, why: "A concrete decision with a date. It is the heart of the memo." }
          - { id: s2, shouldFlag: true, why: "Filler that sounds important and says nothing. Delete it: there is no decision, no number, and no date inside it." }
          - { id: s3, shouldFlag: false, why: "A metric with a starting point and a target. This is how you measure whether the decision worked." }
          - { id: s4, shouldFlag: true, why: "\"Many opportunities across several areas\" cannot be decided or measured. Either it becomes a concrete proposal or it does not go in." }
          - { id: s5, shouldFlag: false, why: "The cost of the decision and when it pays back. Exactly what a manager asks before saying yes." }
    - id: cierre
      kind: closing
      title: "Tomorrow, before you send your next report"
      body: "Delete everything except three lines: what you propose, which number moves, and what happens Monday. If those three lines are not there, the memo is not ready. The rest is appendix."
