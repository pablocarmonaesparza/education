practice_beat:
  id: module_claude5_fable_n1
  status: active
  dimension: validacion
  level: 1
  career_key: general
  triggered_by_gap: []
  duration_max_seconds: 360
  module_kind: topic
  topic: Claude Fable 5 (the Claude 5 family)
  principle_card:
    headline: With Fable 5, what changes is how much you delegate per pass, not whether you review it
    body: >-
      A more capable model makes fewer mistakes, but the ones it makes sound exactly as confident as
      the rest of the text, so your review is worth more than before, not less.
  practice_exercise:
    type: formative_slides
    blocks:
      - ai_output_review
      - categorize_rows
    prompt: >-
      AI update practice: Claude Fable 5 (the Claude 5 family). It is Monday and your company just
      turned on Fable 5, the most capable model in the Claude 5 family. Ryan, in sales, already asked
      it for a full email to a prospect and tells you: 'it came out so well I almost sent it without
      reading it'. That 'almost' is exactly what you are about to practice.
  completion_criteria: >-
    Complete every exercise (each row and each segment answered) and review the feedback for each
    one.
  exit:
    contributes_to_resim_score: false
  slides:
    - id: portada
      kind: cover
      title: A more capable model on your team
      body: >-
        It is Monday and your company just turned on Fable 5, the most capable model in the Claude 5
        family. Ryan, in sales, already asked it for a full email to a prospect and tells you: 'it
        came out so well I almost sent it without reading it'. That 'almost' is exactly what you are
        about to practice.
      chips:
        - N1 · Fundamentals
        - AI update
        - 6 min
    - id: contexto
      kind: reading
      title: "Claude Fable 5: what changes and what does not"
      body: >-
        **What it is.** Fable 5 is the most capable model in the new Claude 5 family, from Anthropic.
        It is the one you can use today. (Mythos 5 exists, but only for approved organizations.)


        **What changed.** It reasons better on long tasks. It holds multi-step work together without
        you leading it by the hand. It makes fewer obvious mistakes than earlier models.


        **What it can do.** Take on bigger assignments in a single pass. For example: analyze
        information, draft, and propose next steps in one go, with fewer corrections from you along
        the way.


        **What it cannot do.** It does not guess the context you never gave it. It does not
        guarantee every fact is correct. And watch out: its mistakes are less frequent but harder to
        catch, because everything sounds more confident.


        **Why it matters.** A better model tempts you to delegate more and review less. What changes
        is how much you delegate per pass, not whether you review it. That is exactly what you are
        about to practice.
    - id: ejercicio_1
      kind: exercise
      blockId: ai_output_review
      title: Review the draft before it goes out
      body: >-
        Ryan pasted his notes from a prospect meeting and asked Fable 5 for a follow-up email. This
        is the draft. Mark the lines that need attention before sending and the ones worth keeping.
      caseContext:
        segments:
          - id: s1
            text: >-
              In Tuesday's meeting you mentioned that your priority this quarter is cutting the
              monthly close time.
            flagIfMarked: claim_no_verificado
          - id: s2
            text: >-
              According to industry analysis, logistics companies cut their operating costs by 27%
              when they automate their reporting.
            flagIfMarked: claim_no_verificado
          - id: s3
            text: >-
              For reference, our client Valley Freight got an 18% discount on its annual contract.
            flagIfMarked: dato_sensible
          - id: s4
            text: >-
              If it works for you, let's put twenty minutes on the calendar this week to go through
              the numbers together and decide whether it makes sense to move forward.
            flagIfMarked: frase_reutilizable
      feedback:
        kind: segments
        segments:
          - id: s1
            shouldFlag: false
            why: >-
              This line comes from the notes Ryan gave the model. When the data comes from your own
              material, the risk drops a lot. That is why the context you give it matters so much:
              the model uses what you bring it well.
          - id: s2
            shouldFlag: true
            why: >-
              That 27% was not in Ryan's notes. Fable 5 writes with a lot of confidence, but it does
              not guarantee every figure is real. An invented number that sounds credible is the
              hardest error to catch with this generation of models. Simple rule: if you do not know
              where the number came from, it does not go in the email.
          - id: s3
            shouldFlag: true
            why: >-
              Another client's discount is confidential information, and here it would go straight to
              an outside prospect. The model included it because it was in the material it received;
              it does not tell on its own what can be shared outside. That filter is yours, always.
          - id: s4
            shouldFlag: true
            why: >-
              This close is concrete, proposes a small step, and leaves the decision on the prospect's
              side. When the model produces a line this useful, keep it: building your own bank of
              proven lines is part of working well with AI.
    - id: ejercicio_2
      kind: exercise
      blockId: categorize_rows
      title: Six open items, one new model
      body: >-
        Valerie, in marketing, wants to lean on Fable 5 to work through her list for the day. For
        each item, decide the best way to hand it off.
      caseContext:
        actions:
          - value: encargar_completo
            label: Hand off whole and review at the end
          - value: dar_contexto
            label: Give it context before asking
          - value: verificar_fuente
            label: Verify every fact against the source
        rows:
          - id: r1
            label: Summarize the 40 customer survey responses and propose three actions
          - id: r2
            label: Turn her team meeting notes into minutes with decisions and owners
          - id: r3
            label: Draft the internal announcement about the new scheduling policy
          - id: r4
            label: Write the first proposal for a client she only has the name of
          - id: r5
            label: Include industry growth figures in the presentation for leadership
          - id: r6
            label: Compare three competitors' pricing for the sales proposal
      feedback:
        kind: rows
        rows:
          - id: r1
            correct: encargar_completo
            why: >-
              Here the model works on data Valerie hands it, and the task has several steps in a row:
              read, summarize, propose. That is exactly the kind of big assignment Fable 5 holds
              together in one pass. Your work comes at the end: review the finished result.
          - id: r2
            correct: encargar_completo
            why: >-
              The notes already exist and they are the source. Turning them into minutes is
              transforming information the model has in front of it, not inventing it. Hand it off
              whole and check that no decision is missing.
          - id: r3
            correct: dar_contexto
            why: >-
              The model does not know what the new scheduling policy is, when it starts, or who it
              affects. If Valerie asks for the announcement without giving it that, Fable 5 will fill
              the gaps with something plausible. It does not guess what you never gave it: context
              first, then the assignment.
          - id: r4
            correct: dar_contexto
            why: >-
              With only a name, everything else would be invented: the client's business, their
              problems, their priorities. Before asking for the proposal, gather what is known about
              the client and give it to the model. The quality of the result depends on what goes in,
              not just on the model.
          - id: r5
            correct: verificar_fuente
            why: >-
              Industry figures headed to leadership are the classic case where a confident model can
              fail without anyone noticing. Fable 5 can propose them, but every number needs a source
              Valerie can open and check before presenting it.
          - id: r6
            correct: verificar_fuente
            why: >-
              Competitor pricing changes and the model does not guarantee it has it right or current.
              It can help structure the comparison, but every price gets confirmed at the original
              source. A wrong price in a sales proposal costs credibility.
    - id: cierre
      kind: closing
      title: Delegating more is not reviewing less
      body: >-
        You practiced two things: spotting what a confident, well-written draft can hide, and
        deciding how to hand off each task based on the context and the data the model has. Tomorrow,
        before you use a text from Fable 5, ask yourself one question: where did each fact it states
        come from? If the answer is 'from the model', verify before you send.
