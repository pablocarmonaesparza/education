# practice_beat — brief externo completo sin leak ni overflow ni underflow
# disparado por gap: over_redacted_brief
# duración: ≤2 min.

practice_beat:
  id: practice_brief_completeness_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: over_redacted_brief
  dimension: decision
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. tu brief filtrado tan agresivamente que la
      agencia/freelancer no tiene contexto suficiente para producir
      bien. el riesgo aquí no es leak — es que la agencia entrega
      creatividad genérica que tienes que iterar 3x.
    why_this_matters: |
      cada round de iteración con la agencia cuesta tiempo + budget.
      brief incompleto es el #1 generador de revisiones inútiles.
      el balance correcto es: lo SUFICIENTE para producir bien, no
      MÁS. ambos extremos cuestan.

  principle_card:
    headline: "checklist mínimo de brief que funciona"
    body: |
      un brief externo necesita estos 6 elementos para que la
      agencia/freelancer pueda producir sin volver con preguntas:

      1. **audiencia con dolor específico** (no demografía)
         "ops managers que sufren con SLA tracker manual" >
         "marketing decision-makers"

      2. **brand voice con 2 ejemplos concretos**
         no abstracto. links a copy real que funcionó.

      3. **deliverables con specs precisas**
         caracteres, dimensiones, formato. "1 LinkedIn post" es
         incompleto; "1 LinkedIn post 200-300 palabras + 1 imagen
         1080x1080" es completo.

      4. **timeline con fechas hard**
         no solo "junio". "deliverable final: junio 8, 5 PM CT".

      5. **3 frases que SÍ funcionan, 3 que NO**
         calibra tono mejor que cualquier descripción abstracta.

      6. **mood board o referencias visuales**
         link a 3 piezas externas que capturen el feel deseado.

      sin los 6, la agencia inventa o pregunta. con los 6, produce
      bien al primer intento.

  practice_exercise:
    type: decision_micro
    duration_seconds: 60
    intro: |
      tu brief actual para freelancer dice:

      "necesito 3 LinkedIn posts para lanzamiento de auto-routing
      este mes. brand voice corporate-cálido. audience: ops managers."

      el freelancer va a entregar genérico. ¿qué le falta más?
    options:
      - id: a
        label: "agregar context: 'estamos compitiendo con Zendesk y Intercom en mid-market'"
        verdict: gap_competitive_intel
        why: "info competitiva NO va en brief externo. el freelancer no la necesita y la filtra a tu competencia si trabaja también para ellos."
      - id: b
        label: "agregar checklist: 'audiencia: ops mgr con 30+ agents; voice: 2 ejemplos linkeados; deliverables: 200-300 palabras + 1 image 1080x1080; deadline: jun 8 5pm CT; 3 frases que SÍ/NO; mood board link.'"
        verdict: correct
        why: "los 6 elementos del checklist. la agencia produce bien al primer intento."
      - id: c
        label: "agregar el brief interno completo, total firmó NDA"
        verdict: gap_leak_strategy
        why: "lo opuesto: filtras estrategia. ya cubierto en practice_scrub_strategy."
      - id: d
        label: "agregar 'usa el tono que mejor te parezca, confío en ti'"
        verdict: gap_over_redacted_brief
        why: "exactamente el problema original. delegas decisión sin dar criterio. agencia inventa y vuelve a pedir clarificación."

  reveal_after_attempt:
    correct_principle: |
      brief incompleto no es seguro — es ineficiente. tu trabajo es
      darle al vendor TODO lo táctico que necesita para producir bien,
      sin agregar nada estratégico. el checklist de 6 elementos es
      el filtro: suficiente, no más.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
