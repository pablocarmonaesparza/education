practice_beat:
  id: practice_validacion_cifras_evidencia_v1
  status: active
  dimension: validacion
  level: 1
  career_key: ops
  triggered_by_gap: [unverified_claims]
  duration_max_seconds: 420
  principle_card:
    headline: "Every number has a source or it does not leave the draft"
    body: "AI writes with the same confidence when it is right and when it is making things up. The difference comes from whoever reviews it before it goes out."
  practice_exercise:
    type: formative_slides
    blocks: [ai_output_review, categorize_rows]
    prompt: "AI drafted the monthly sales report for a food distributor: you hunt the numbers with no source and the causes nobody measured, then you decide claim by claim what gets used, what gets verified, and what gets cut."
  completion_criteria: "Complete both exercises (every segment and every row answered) and review the feedback for each."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "AI writes just as confidently when it is right and when it is making things up"
      body: "A generated draft reads flawless: exact numbers, comparisons, causes. The problem is that some came from your data and some came from nowhere, and they look identical. Here you practice telling them apart before they reach your manager."
      chips: ["N1 · Fundamentals", "Operations", "7 min"]
    - id: principio
      kind: reading
      title: "How to catch an invented number"
      body: |-
        **The problem.** AI does not warn you when it is filling gaps. A correct number and an invented one arrive with the same confident wording, the same format, and the same tone. If the report goes out with a false number, the model is not the one who looks bad. You are.

        **The rule.** For every number and every claim in the draft, ask one thing: can I trace it to a source, my file, the system, the official dashboard? If yes, it passes. If no, it gets verified or it gets cut. There is no third option.

        **The three warning signs.** First: comparisons against data you never gave it. If you only shared June, where did "12% more than last year" come from? Second: causes that sound logical but nobody measured. "The drop is due to the competition" is an opinion dressed as data. Third: projections presented as facts. "July will clear $300,000 USD" is a bet, not a result.

        **The example.** "The top seller was the 32 oz olive oil, with 1,240 units" traces back to your file in ten seconds: it passes. "Sales fell because of competitor pricing" traces back to nothing: cut it, or turn it into a question worth investigating.
    - id: ejercicio_borrador
      kind: exercise
      blockId: ai_output_review
      title: "AI drafted the monthly report from your June sales file"
      body: "You only gave it the June file. Mark what you would not let through without verifying. Tap to mark."
      caseContext:
        segments:
          - { id: s1, text: "June sales came in 12% higher than June of last year.", flagIfMarked: "claim_no_verificado" }
          - { id: s2, text: "The top seller was the 32 oz olive oil, with 1,240 units.", flagIfMarked: "frase_reutilizable" }
          - { id: s3, text: "The drop in the South region is due to competitors cutting prices.", flagIfMarked: "claim_no_verificado" }
          - { id: s4, text: "At this pace, July will close above $300,000.", flagIfMarked: "claim_no_verificado" }
          - { id: s5, text: "The Central region accounted for half the units sold this month.", flagIfMarked: "frase_reutilizable" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: true, why: "You only gave it this year's June file. The comparison against last year came from nowhere. First warning sign." }
          - { id: s2, shouldFlag: false, why: "Traceable to your file at a glance: product and units are right there. It has a source, it passes." }
          - { id: s3, shouldFlag: true, why: "A cause that sounds logical but nobody measured. Cut it, or turn it into a question worth investigating, not a conclusion in the report." }
          - { id: s4, shouldFlag: true, why: "A projection presented as a fact. If your manager plans against that number and it does not land, the report failed." }
          - { id: s5, shouldFlag: false, why: "It computes straight from your file with one filter. Verifiable in seconds: it passes." }
    - id: ejercicio_afirmaciones
      kind: exercise
      blockId: categorize_rows
      title: "Last claims in the draft. Decide what you do with each one"
      body: "Before the report goes out, every claim gets used, gets verified, or gets cut."
      caseContext:
        actionStyle: permission
        actions:
          - { value: permitir, label: "Use as-is" }
          - { value: revisar, label: "Verify against the source" }
          - { value: bloquear, label: "Cut from the draft" }
        rows:
          - { id: v1, label: "\"Returns dropped to 2.1% in June\" and the official dashboard shows returns by month" }
          - { id: v2, label: "\"We're the highest-rated distributor in the region\" and no such measurement exists" }
          - { id: v3, label: "\"The file records 18,430 units sold in June\" and you cross-checked it against the system yourself today" }
          - { id: v4, label: "\"Customers are more satisfied this month\" and there is no survey or data behind it" }
          - { id: v5, label: "\"Average order value went up versus May\" and you have both the May and June files on hand" }
      feedback:
        kind: rows
        rows:
          - { id: v1, correct: revisar, why: "There is a source available: the dashboard. Two minutes of cross-checking and the number is backed. Do not use it before that check." }
          - { id: v2, correct: bloquear, why: "There is no measurement: it is an invented compliment. No verification is possible, so it does not go in the report." }
          - { id: v3, correct: permitir, why: "You already verified it against the system today. Source confirmed, it passes as-is." }
          - { id: v4, correct: bloquear, why: "With no survey and no data, \"more satisfied\" is a feeling. Cut it, or propose measuring it next month." }
          - { id: v5, correct: revisar, why: "It is verifiable and you have both files. A quick calculation confirms it or kills it. Do that before you send." }
    - id: cierre
      kind: closing
      title: "Tomorrow, before you forward any generated text"
      body: "Underline every number and every \"because\". If you cannot say in ten seconds which source it came from, it does not pass: verify it or cut it. Your name is on the report, not the model's."
