# practice_beat — detectar pérdida de voz de marca en output IA
# microbeat correctivo disparado por gaps: accept_tone_drift, generic_positioning_blind
# duración: ≤2 min.

practice_beat:
  id: practice_spot_tone_drift_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: [accept_tone_drift, generic_positioning_blind]
  dimension: juicio
  level: 1
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. en tu caso aceptaste piezas que perdieron la
      voz de marca y suenan genéricas. el problema NO es el modelo —
      es que tu filtro de detección está calibrado para "esto está
      bien escrito" en vez de "esto suena a nosotros".
    why_this_matters: |
      el LLM siempre va a generar copy "bien escrito" desde un punto
      de vista gramatical. pero "bien escrito" ≠ "on-brand". si tu
      filtro principal es gramática + flujo, vas a publicar AI-generic
      que tu audiencia reconoce en 3 segundos y descarta. detectar
      tone drift es una habilidad entrenable.

  principle_card:
    headline: "tres señales de tone drift en copy IA"
    body: |
      cuando leas una pieza generada, pásala por estas 3 señales:

      1. **¿podría venir de cualquier competidor?**
         tomá la pieza y reemplazá el nombre de tu marca por uno de
         tu competencia. si la pieza sigue funcionando, NO es tu voz.
         es genérica.

      2. **¿contiene palabras que NUNCA usarían tus textos pasados?**
         "transformación", "soluciones", "potenciamos", "ecosistema",
         "next-generation". los LLMs aman estas palabras. tu marca
         seguramente no.

      3. **¿es específica o abstracta?**
         "ayudamos a equipos a ser más productivos" = abstracta.
         "tu equipo deja de buscar contexto en 4 sistemas" = específica.
         las marcas reales hablan de cosas concretas, no de "valor".

      regla rápida: si una pieza pasa las 3 señales sin levantar
      ninguna bandera, está on-brand. si falla en alguna, edita o
      reescribe.

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      revisa estas 4 piezas generadas por IA para una marca con tono
      "corporate cálido consultor" (similar a Loop). clasifica cada
      una en: ON-BRAND, TONE-DRIFT, o MIXTO.
    segments:
      - id: 1
        text: "Loop empodera a equipos de soporte con IA de vanguardia para alcanzar el siguiente nivel de productividad."
        correct_verdict: tone_drift
        signals_failed: [could_be_any_competitor, abstract, contains_aigeneric_words]
        why: "'empoderar', 'IA de vanguardia', 'siguiente nivel' — palabras que cualquier marca usa. no menciona dolor específico."
      - id: 2
        text: "tu agente cierra 90 tickets al día. ¿cuántos cerraría si dejara de buscar el contexto del cliente en 4 sistemas?"
        correct_verdict: on_brand
        signals_failed: []
        why: "específico (90 tickets, 4 sistemas), cero AI-generic, dolor concreto, frase corta. competidor genérico no escribiría esto."
      - id: 3
        text: "Loop es la plataforma de soporte impulsada por IA que tu equipo merece — descubre cómo otros equipos ya están transformando su operación."
        correct_verdict: tone_drift
        signals_failed: [could_be_any_competitor, abstract, contains_aigeneric_words]
        why: "'merece', 'transformando', 'impulsada por IA' — fórmulas. sin dolor específico, sin cifra, sin voz."
      - id: 4
        text: "el SLA tracker se rompe a las 6 PM cuando alguien está de vacaciones. tu manager se entera al día siguiente. con Loop, no."
        correct_verdict: mixto
        signals_failed: [could_be_any_competitor]
        why: "concreto y específico (✓), pero el cierre 'con Loop, no' es genérico — cualquier marca SaaS escribe esa fórmula. editable."

  reveal_after_attempt:
    correct_principle: |
      tone drift no es gramática mala. es ausencia de especificidad +
      presencia de fórmulas. la regla número 1 ("¿podría venir de
      cualquier competidor?") cubre el 80% de los casos. úsala como
      filtro de primer paso.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
