practice_beat:
  id: practice_ejecucion_pedido_claro_v1
  status: active
  dimension: ejecucion_ia
  level: 1
  career_key: marketing
  triggered_by_gap: [vague_ai_instruction]
  duration_max_seconds: 300
  # Regla 4 del motor: activo, no pasivo. No hay slide de lectura larga; la
  # principle_card es el único texto de "principio" y son dos líneas. El
  # aprendizaje sale de HACER (ver el output malo → arreglar el pedido) + el
  # feedback, no de leer.
  principle_card:
    headline: "A good request says what you want, from which data, and what to do if something is missing"
    body: "The model fills every gap in your request with an assumption. If you do not decide it, it does, and it will not match you."
  practice_exercise:
    type: formative_slides
    blocks: [ai_output_review, categorize_rows]
    prompt: "First you see what AI returned from a one-line request and mark what you would not let through; then you build the request properly, deciding which instruction goes in, which needs sharpening, and which does not belong."
  completion_criteria: "Complete both exercises (every segment and every row answered) and review the feedback for each."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "You asked AI in one line. Look what came back"
      body: "Sofia has to send her manager a summary of Aurora Retail's customer complaints today. She wrote to AI: \"summarize these complaints\". You are going to see what came back, and fix the request so it works."
      chips: ["N1 · Fundamentals", "Marketing", "5 min"]
    - id: ejercicio_revisar
      kind: exercise
      blockId: ai_output_review
      title: "This is what AI returned from the one-line request. Before forwarding it, mark what you would not let through"
      body: "Tap to mark the lines with a problem."
      caseContext:
        segments:
          - { id: s1, text: "This month we received 47 complaints, 30% more than last month.", flagIfMarked: "claim_no_verificado" }
          - { id: s2, text: "Customer Laura Bennett (laura.bennett@gmail.com) complained three times about her order being late.", flagIfMarked: "dato_sensible" }
          - { id: s3, text: "The most frequent reasons were delivery delays and billing errors.", flagIfMarked: "frase_reutilizable" }
          - { id: s4, text: "Overall the team is doing great and customers are happy with the service.", flagIfMarked: "claim_no_verificado" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: true, why: "You never gave it last month's number. The model invented it, and an invented number in a summary reads exactly as confident as a real one. Nobody will tell them apart later." }
          - { id: s2, shouldFlag: true, why: "A real customer's name and email in a summary that is about to be forwarded. The request never told it to anonymize, so it did not. AI does not cause the leak: the incomplete request does." }
          - { id: s3, shouldFlag: false, why: "A faithful summary of what was in the file. No invented numbers, no personal data. This one you let through." }
          - { id: s4, shouldFlag: true, why: "These are COMPLAINTS and the model closed with \"customers are happy\". You asked it to \"summarize\" without saying the goal or the tone, so it filled the gap with generic optimism." }
    - id: ejercicio_armar
      kind: exercise
      blockId: categorize_rows
      title: "Now build the request properly. Decide what you do with each line"
      body: "These are the candidate lines for the request. Decide which goes in as-is, which needs sharpening, and which does not belong."
      caseContext:
        actionStyle: neutral
        actions:
          - { value: entra, label: "Goes in" }
          - { value: precisar, label: "Sharpen it first" }
          - { value: fuera, label: "Cut it" }
        rows:
          - { id: r1, label: "\"Summarize these complaints\"" }
          - { id: r2, label: "\"Use only the file complaints_june.csv that I'm giving you, nothing else\"" }
          - { id: r3, label: "\"Give me back a table: complaint reason, how many times it came up, and whether it's still open\"" }
          - { id: r4, label: "\"Don't use customer names or emails; if they show up, replace them with a customer number\"" }
          - { id: r5, label: "\"If you're missing a data point, make it up so the summary comes out complete\"" }
          - { id: r6, label: "\"Give it a positive spin so my manager doesn't worry\"" }
      feedback:
        kind: rows
        rows:
          - { id: r1, correct: precisar, why: "\"Summarize\" is a hope, not an instruction: summarize how? For what? The useful version already exists in another line: the table with defined columns." }
          - { id: r2, correct: entra, why: "A single, explicit source. It keeps the model from mixing in another period's data or filling gaps with general knowledge off the internet." }
          - { id: r3, correct: entra, why: "A verifiable goal: in ten seconds you can check whether the table has exactly those three columns. That is a good request." }
          - { id: r4, correct: entra, why: "The data limit the original request was missing, which is why AI dropped Laura's name and email into the summary. This line closes it." }
          - { id: r5, correct: fuera, why: "Explicit permission to invent, the exact cause of the false number you flagged earlier. The right version is the opposite: \"if a data point is missing, flag it as pending\"." }
          - { id: r6, correct: precisar, why: "Everyone reads \"positive spin\" differently, and so does the model, which is why it sweetened the complaints. If tone matters, ask for it in operating terms: \"neutral, direct tone, no sugarcoating\"." }
    - id: cierre
      kind: closing
      title: "Your next request to AI"
      body: "Before you hit enter, check it against three pieces: does it say what I want, in terms I can verify? Does it say which data to use and which not to? Does it say what to do if something is missing? The three things AI invented for you today all came out of a request that did not say them."
