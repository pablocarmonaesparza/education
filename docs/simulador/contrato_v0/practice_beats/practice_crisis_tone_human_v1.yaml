# practice_beat — tono humano en crisis (no corporate, no defensive)
# disparado por gaps: off_tone_corporate, defensive_blame
# duración: ≤2 min.

practice_beat:
  id: practice_crisis_tone_human_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: [off_tone_corporate, defensive_blame]
  dimension: juicio
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. el LLM produjo respuesta de crisis con tono
      corporate frío O defensiva. los dos son trampa. en crisis la
      audiencia espera contacto humano + accountability sin admisión
      legal.
    why_this_matters: |
      la audiencia que ve tu respuesta de crisis está enojada,
      asustada o desconfiada. corporate-speak ("estamos comprometidos
      con la excelencia") los enfurece más. defensive ("la situación
      fue causada por factores externos") los pierde. la única
      postura que funciona es: humana + factual + accountable sin
      admitir liability.

  principle_card:
    headline: "estructura de tono en crisis"
    body: |
      una respuesta de crisis efectiva tiene 4 elementos:

      1. **acknowledge concrete**
         "vimos los reportes sobre [evento específico]" — no
         "estamos al tanto de la situación".

      2. **express care without admitting cause**
         "esto afecta a [grupo específico] y entendemos la preocupación"
         — no "asumimos plena responsabilidad" (admisión legal).

      3. **state factual action being taken**
         "nuestro equipo de [function] está investigando desde
         [time]. próximo update [time]". específico, verificable.

      4. **provide direct contact path**
         "si te ves afectado, escríbenos a [email/form]" — no
         genérico "contáctanos cuando puedas".

      lo que NO va NUNCA:
      - "estamos comprometidos con la excelencia"
      - "la situación es lamentable"
      - "tomamos esto con la seriedad que merece"
      - "fue causado por X" (a menos que confirmado + legal-cleared)

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      el LLM te dio 4 borradores de respuesta a viral complaint.
      clasifica cada uno: USE, REWRITE, o BLOCK.
    segments:
      - id: 1
        text: "En Loop estamos comprometidos con la excelencia operacional. Estamos al tanto de la situación y la abordaremos con la seriedad que merece. La calidad de servicio a nuestros clientes es nuestra prioridad #1."
        correct_verdict: block
        why: "corporate-speak completo. no menciona qué pasó. no ofrece acción. enfurece más. esta era exactamente la trampa que se quería evitar."
      - id: 2
        text: "Vimos los reportes sobre el issue de sync de tickets. Esto afecta a 7 organizaciones y entendemos la urgencia. Engineering está trabajando desde las 9 PM, eta resolución 6 AM. Si te ves afectado, escríbenos a urgent@loop.la — respondemos en 30 min."
        correct_verdict: use
        why: "los 4 elementos presentes: acknowledge concrete, care without legal admission, action factual con times, direct contact. tono humano sin corporate-speak."
      - id: 3
        text: "El issue fue causado por un upgrade de servicio que no se ejecutó como esperábamos. Lamentamos esto."
        correct_verdict: rewrite
        why: "admite causa antes de legal review. 'no se ejecutó como esperábamos' es admisión que abre liability. también: 'lamentamos' es disculpa muy genérica. reescribir como factual sin admisión."
      - id: 4
        text: "Estamos investigando con high priority. Por privacidad de nuestros otros clientes, no podemos compartir detalles específicos. Update en breve."
        correct_verdict: block
        why: "el 'por privacidad de otros clientes' suena defensivo + deflecting. en crisis es exactamente lo que NO debes decir. tu privacidad de OTROS clientes no es la preocupación de la audiencia."

  reveal_after_attempt:
    correct_principle: |
      tono humano en crisis NO es ser amistoso o sentimental. es ser
      específico + factual + accountable sin admitir lo que aún no
      sabes. corporate-speak ("excelencia", "seriedad", "lamentamos")
      es siempre wrong. acknowledge concrete + care + action factual +
      contact direct es la fórmula.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
