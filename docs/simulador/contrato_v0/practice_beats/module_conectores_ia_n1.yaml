practice_beat:
  id: module_conectores_ia_n1
  status: active
  dimension: datos
  level: 1
  career_key: general
  triggered_by_gap: []
  duration_max_seconds: 360
  module_kind: topic
  topic: AI connectors
  principle_card:
    headline: Connect little, review everything that goes out
    body: >-
      A connector gives AI real access to your files, but it does not give it judgment: you decide
      which sources go in and which text goes out unverified.
  practice_exercise:
    type: formative_slides
    blocks:
      - ai_output_review
      - categorize_rows
    prompt: >-
      AI update practice: AI connectors. Sofia runs marketing at an agency and just got access to an
      AI connector for her Drive and her email. Today she has two tasks: decide which sources she
      connects and review the first draft AI wrote using those files. You are going to make those two
      decisions with her.
  completion_criteria: >-
    Complete every exercise (each row and each segment answered) and review the feedback for each
    one.
  exit:
    contributes_to_resim_score: false
  slides:
    - id: portada
      kind: cover
      title: Sofia's first connector
      body: >-
        Sofia runs marketing at an agency and just got access to an AI connector for her Drive and
        her email. Today she has two tasks: decide which sources she connects and review the first
        draft AI wrote using those files. You are going to make those two decisions with her.
      chips:
        - N1 · Fundamentals
        - AI update
        - 6 min
    - id: contexto
      kind: reading
      title: AI connectors
      body: >-
        **What it is.** A connector is a permission you give an AI tool to read your real sources:
        your email, your Drive, your customer database.


        **What changed.** Before, AI only saw what you pasted into the chat. Now it works directly on
        your documents, no copying and pasting.


        **What it can do.** Search hundreds of files, summarize email threads, cross customer data
        with your reports. It saves you the hours of gathering context by hand.


        **What it cannot do.** It does not tell which information is confidential. It does not ask
        permission before reading something sensitive. Everything you connect is within its reach.
        And it can cite the wrong document.


        **Why it matters.** The value is not in connecting everything. It is in deciding what you
        connect, what you review before sharing, and what you leave out. That judgment is exactly
        what you are about to practice.
    - id: ejercicio_1
      kind: exercise
      blockId: ai_output_review
      title: Review the draft before sending it
      body: >-
        AI, connected to Sofia's Drive and email, wrote this summary for a client. Mark the lines you
        would not send as-is, and also the ones you would keep to reuse.
      caseContext:
        segments:
          - id: s1
            text: >-
              This quarter we delivered the three campaigns we agreed on and shared the results every
              week.
            flagIfMarked: frase_reutilizable
          - id: s2
            text: >-
              On this account we run a 34% internal margin, which gives us room to improve the rate.
            flagIfMarked: dato_sensible
          - id: s3
            text: >-
              Your current contract expires in December of this year, so it makes sense to start the
              renewal soon.
            flagIfMarked: claim_no_verificado
          - id: s4
            text: >-
              We look forward to your comments and would be glad to set up a call next week.
            flagIfMarked: claim_no_verificado
      feedback:
        kind: segments
        segments:
          - id: s1
            shouldFlag: true
            why: >-
              This line is worth keeping. It describes work Sofia knows firsthand and that is on the
              record in the emails she sent. It is clear, verifiable, and a good base for future
              account summaries.
          - id: s2
            shouldFlag: true
            why: >-
              The margin is internal pricing information that AI pulled from a connected file. The
              connector gave it access, but it did not give it the judgment to know that this never
              goes in an email to the client. That filter is yours.
          - id: s3
            shouldFlag: true
            why: >-
              An expiration date has consequences if it is wrong. AI could have taken it from an old
              proposal in the folder, not from the signed contract. Useful rule: every date or figure
              AI cites from your documents gets verified against the original source before it goes
              out.
          - id: s4
            shouldFlag: false
            why: >-
              It is a neutral close: it cites no data, claims nothing verifiable, and exposes no
              internal information. It can go as-is. Learning to let through what is fine is also
              part of reviewing fast.
    - id: ejercicio_2
      kind: exercise
      blockId: categorize_rows
      title: Decide what you connect
      body: >-
        Sofia is about to turn on the AI connector for her team's folders. Sort each source by what
        you would do today.
      caseContext:
        actions:
          - value: conectar
            label: Connect
          - value: consultar
            label: Check first
          - value: dejar_fuera
            label: Leave out
        rows:
          - id: r1
            label: "Approved brand materials folder: logos, guidelines, and templates"
          - id: r2
            label: Spreadsheet with the team's salaries and performance reviews
          - id: r3
            label: Shared folder with signed client contracts
          - id: r4
            label: Notes from the marketing team's weekly meetings
          - id: r5
            label: The full email inbox, including threads with HR
      feedback:
        kind: rows
        rows:
          - id: r1
            correct: conectar
            why: >-
              These are materials already approved to circulate. Low risk and real savings: AI finds
              the right template or logo in seconds, with nobody digging through folders.
          - id: r2
            correct: dejar_fuera
            why: >-
              Salaries and performance reviews are people's data. AI does not tell what is
              confidential and does not ask permission before reading it, so the decision to leave it
              out has to happen before you connect, not after.
          - id: r3
            correct: consultar
            why: >-
              Contracts are useful for the work, but they hold third-party data and may carry
              confidentiality commitments. Asking whoever administers that folder costs one message.
              Connecting too much can cost a client's trust.
          - id: r4
            correct: conectar
            why: >-
              The notes already circulate inside the team and expose no sensitive data. Connecting
              them lets you ask AI what was agreed three weeks ago without hunting for it by hand.
          - id: r5
            correct: dejar_fuera
            why: >-
              A full inbox mixes everything together: HR matters, negotiations, personal business.
              Everything you connect is within AI's reach. If you need email, start with something
              narrower, like a project folder or label.
    - id: cierre
      kind: closing
      title: What you take with you
      body: >-
        You practiced the two decisions that define how connectors get used: which sources go in and
        what you review before anything goes out. Tomorrow, before you turn on a connector in your
        tool, ask yourself what is in that folder that you would not show someone from outside. And
        before you send a text generated from your data, verify every date and every figure against
        the original source.
