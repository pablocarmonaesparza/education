# practice_beat — detectar redundancia disfrazada de variedad en calendario IA
# disparado por gap: repetitive_calendar_blind
# duración: ≤2 min.

practice_beat:
  id: practice_spot_calendar_redundancy_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: repetitive_calendar_blind
  dimension: juicio
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. el LLM te dio 20 ideas de contenido. parecen
      distintas en superficie pero son 5-7 ideas con variaciones
      cosméticas. publicar así = audiencia se aburre, equipo produce
      por inercia.
    why_this_matters: |
      los LLMs son buenos generando "variedad superficial" — cambiar
      el verbo, el formato (post → carousel → video), el hook. pero
      el insight subyacente es el mismo. tu audiencia detecta esto
      en 2-3 semanas y baja engagement. el calendario "lleno" se
      vuelve white noise.

  principle_card:
    headline: "tres tests para detectar variedad superficial"
    body: |
      cuando revises las ideas del LLM, aplica:

      1. **test del one-liner:**
         reduce cada idea a 1 sentence (¿de qué trata?). si 5 ideas
         se reducen al mismo one-liner, es redundancia disfrazada.

      2. **test del insight contraintuitivo:**
         buena idea tiene insight contraintuitivo o framing nuevo.
         "tu equipo de soporte está agotado" no es insight — es
         observación. "tu equipo está agotado de buscar contexto,
         no de cerrar tickets" es insight.

      3. **test del 'qué cambia el reader?':**
         después de leer/ver tu pieza, ¿qué piensa o hace distinto
         el reader? si tu calendario tiene 20 piezas y la respuesta
         es la misma para 7+, esas 7 son redundantes.

      regla: 10 piezas con 10 insights distintos > 25 piezas con 5
      insights repetidos. el volumen sin distinción es desperdicio
      de equipo + presupuesto.

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      el LLM te dio estas 5 ideas para LinkedIn posts. clasifícalas:
      DISTINCT, REDUNDANT-WITH (especifica con cuál), o CUT.
    segments:
      - id: 1
        text: "tu equipo de soporte cierra 90 tickets/día. ¿cuántos cerraría si dejara de buscar el contexto del cliente?"
        correct_verdict: distinct
        why: "insight específico: el costo de context-switching. one-liner: 'el contexto es el cuello de botella'."
      - id: 2
        text: "el ticket que se atora ya no se atora — con auto-routing inteligente"
        correct_verdict: redundant_with_3
        why: "one-liner: 'auto-routing resuelve atascos'. mismo insight que idea 3 con framing distinto."
      - id: 3
        text: "tu SLA tracker se rompe a las 6PM cuando alguien está de vacaciones. con Loop, no."
        correct_verdict: distinct
        why: "insight: dependencia de personas individuales en SLA. one-liner: 'tu SLA depende de quién está de vacaciones'."
      - id: 4
        text: "auto-routing inteligente: la solución para tu equipo de soporte"
        correct_verdict: cut
        why: "no insight, solo claim. one-liner: 'compra Loop'. el test del 'qué cambia el reader?' falla."
      - id: 5
        text: "el costo real del context-switching en soporte: 31 minutos/día/agente"
        correct_verdict: redundant_with_1
        why: "mismo one-liner que idea 1 ('el contexto es el cuello de botella'). misma insight, distinto formato (cifra)."

  reveal_after_attempt:
    correct_principle: |
      tu trabajo NO es defender al LLM ni descartar todo. es
      DISCRIMINAR. una versión consolidada del calendario sería:
      - 1 (distinct, mantener)
      - 1+5 fusionadas (mismo insight, dos formatos)
      - 3 (distinct, mantener)
      - 2/3 fusionadas (mismo insight, mejor framing)
      - 4 cortado o reescrito
      → 4 piezas fuertes en vez de 5 mediocres.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
