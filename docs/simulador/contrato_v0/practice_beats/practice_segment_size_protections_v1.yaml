# practice_beat — proteger individuos vía tamaño mínimo de segmento
# microbeat correctivo disparado por gap: segment_too_small_individual_id
# duración: ≤2 min.

practice_beat:
  id: practice_segment_size_protections_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: segment_too_small_individual_id
  dimension: privacidad
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. uno de los segmentos que aceptaste tenía
      menos de 5 personas. técnicamente legal mandar email — pero
      a esa escala, el "segmento" identifica individuos. una persona
      que reciba ese email puede inferir exactamente por qué la
      pusieron en ese grupo.
    why_this_matters: |
      tu CRM aplica criterios anónimos en el agregado. cuando esos
      criterios se cruzan tanto que un segmento queda con 1-4
      personas, dejan de ser anónimos. el lead recibe un mensaje
      que le dice "ya analizamos tu comportamiento individual" sin
      consentimiento explícito de eso. esto es una violación de
      principio incluso en regímenes laxos.

  principle_card:
    headline: "regla del k-anonimato light"
    body: |
      antes de activar un segmento, verifica:

      1. **tamaño mínimo: 25+ personas por segmento de outbound**
         (algunas regulaciones usan k=5 para anonimato formal; para
         marketing outbound, k=25 es regla de seguridad práctica)

      2. **si tu segmento mezcla 2-3 criterios y queda < 25 personas:**
         relaja un criterio, no apliques el segmento. ejemplo:
         "VP+Fintech+US+IntentScore>85" → 3 personas. quita "US"
         → 18. quita "IntentScore>85" → 47. usa el segmento de 47.

      3. **excepciones donde 25 puede bajar:**
         - lista de "no contactar" (k mínimo aplica al revés)
         - cuentas ABM con consent explícito de account
         - sales reaches out manual, no email automatizado
         - producto se ha vendido en pubblic case study (consent ya implícito)

      regla mental: si puedes nombrar a la persona del segmento
      antes de verla, el segmento es demasiado chico.

  practice_exercise:
    type: decision_micro
    duration_seconds: 60
    intro: |
      el modelo te propone 4 segmentos. tienes que activar 2 para
      email outbound. cuáles tomas?
    options:
      - id: a
        label: "Segmento A: VPs de fintech en MX + intent score > 85 → 3 personas"
        verdict: gap_segment_too_small_individual_id
        why: "3 personas = identificación efectiva. el email les dirá exactamente lo que decidiste sobre ellos."
      - id: b
        label: "Segmento B: directores+ en mid-market LATAM con intent score > 70 → 47 personas"
        verdict: correct
        why: "tamaño suficiente para que el segmento sea anónimo en agregado. criterio combina seniority + intent."
      - id: c
        label: "Segmento C: founders de PYME que descargaron whitepaper de pricing → 8 personas"
        verdict: gap_segment_too_small_individual_id
        why: "tamaño insuficiente. los 8 founders pueden reconocerse al recibir el email — saben que descargaron el whitepaper."
      - id: d
        label: "Segmento D: cualquier rol con 3+ visitas a pricing page últimos 30 días → 134 personas"
        verdict: correct
        why: "alta señal de intent (visitas a pricing), tamaño robusto, criterio aplicable consistentemente."
    instruction_after_selection: "elige los 2 que activarías. consideramos correctos los que cumplen tamaño + criterio limpio."

  reveal_after_attempt:
    correct_principle: |
      el tamaño de un segmento es protección de privacidad real, no
      tecnicismo. cuando segmentás chiquito, cruzaste tantos criterios
      que el grupo identifica a individuos. solución: relaja un
      criterio antes de activar, o consolida con otro segmento similar.
      perder un poco de precisión vale la pena vs exponer al individuo.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
