# practice_beat — detectar claims no verificables en output IA
# microbeat correctivo disparado por gap: weak_artifact_review
# duración: ≤2 min.

practice_beat:
  id: practice_spot_unverifiable_claims_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: weak_artifact_review
  dimension: juicio
  level: 1
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. en tu artifact_review marcaste segmentos
      problemáticos del output, pero faltó discriminar entre lo
      grave (bloquea entrega) y lo cosmético (lo arreglo después).
    why_this_matters: |
      si marcas todo como rojo, tu jefe va a dejar de leer tus
      revisiones. si no marcas nada, los errores graves pasan.
      el criterio es saber qué tipo de error estás viendo y
      reaccionar proporcionalmente.

  principle_card:
    headline: "tres tipos de error en output IA, tres reacciones"
    body: |
      cuando revises un output, clasifica cada problema en:

      1. cifra inventada → BLOQUEA
         el modelo dio un número sin evidencia. esto es alucinación
         cuantitativa. no se publica.

      2. dato sensible expuesto → BLOQUEA
         el modelo reintrodujo PII o info confidencial que tú
         habías anonimizado. no se publica.

      3. segmento débil o claim genérico → MARCA pero no bloquees
         "los clientes valoran la innovación" — no es falso, es
         vacío. se puede usar con ajuste, no es show-stopper.

      4. tono fuera de marca → MARCA pero no bloquees
         "ofrecemos soluciones de clase mundial" — cosmética, se
         edita.

      regla: bloqueos son lo que NO se puede publicar. marcas son
      lo que SE EDITARÁ antes de publicar. confundir los dos paraliza
      al equipo o expone a la empresa.

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      revisa estos 4 segmentos de output de un LLM. clasifica cada
      uno en: BLOQUEA, MARCA, o DEJA.
    segments:
      - id: 1
        text: "Nuestros clientes reportan un 47% de mejora en tiempo de respuesta tras la implementación"
        correct_verdict: bloquea
        category: cifra_inventada
        why: "47% es cifra específica sin evidencia rastreable en el dataset"
      - id: 2
        text: "Empresas como Aurora Recursos y Grupo Tec ya están aprovechando esta capacidad"
        correct_verdict: bloquea
        category: dato_sensible_expuesto
        why: "nombres de clientes reales aparecen en copy público sin consentimiento explícito"
      - id: 3
        text: "Las organizaciones modernas necesitan herramientas que se adapten a su realidad"
        correct_verdict: marca
        category: claim_generico
        why: "vacío pero no dañino — se puede reescribir con dolor específico del dataset"
      - id: 4
        text: "Solución de clase mundial diseñada para los negocios del mañana"
        correct_verdict: marca
        category: tono_fuera_de_marca
        why: "cliché de marketing — editable, no bloqueante"

  reveal_after_attempt:
    correct_principle: |
      bloquea cuando hay falsedad (cifra inventada) o exposición (PII).
      marca cuando hay debilidad recuperable (claim genérico, tono
      cosmético). aprender a discriminar te hace útil — al equipo
      le importa saber qué urge ahora y qué se puede iterar.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
