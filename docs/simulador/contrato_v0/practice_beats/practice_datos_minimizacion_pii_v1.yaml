practice_beat:
  id: practice_datos_minimizacion_pii_v1
  status: active
  dimension: datos
  level: 1
  career_key: ops
  triggered_by_gap: [pii_exposure]
  duration_max_seconds: 360
  principle_card:
    headline: "Decide what the model sees: as-is, transformed, or not at all"
    body: "The model cannot tell sensitive from harmless. It uses everything you give it. You decide field by field before you upload the file, not after the leak."
  practice_exercise:
    type: formative_slides
    blocks: [categorize_rows, ai_output_review]
    prompt: "You are about to analyze returns for an online retailer with AI: you decide column by column what you share, then you review a generated summary that carried personal data into it."
  completion_criteria: "Complete both exercises (every row and every segment answered) and review the feedback for each."
  exit:
    contributes_to_resim_score: true
  slides:
    - id: portada
      kind: cover
      title: "The whole file does not have to go to the model"
      body: "When you hand a customer table to AI, you hand over everything the table carries: names, phone numbers, addresses. Here you practice deciding field by field what goes in as-is, what goes in transformed, and what stays out."
      chips: ["N1 · Fundamentals", "Operations", "6 min"]
    - id: principio
      kind: reading
      title: "The three-gate filter"
      body: |-
        **The problem.** AI does not know what counts as personal data and what does not. If the file carries a customer's phone number, the model reads it, it can repeat it in a summary, and that summary can end up forwarded to half the team. The tool does not cause the leak. Whoever uploaded the whole file without looking at it does.

        **The rule.** Before you upload any table, every column passes three gates. First: does the task need it? If it does not add to what you asked for, it stays out. Less data, less risk. Second: does it identify a person? Names, phone numbers, emails, and exact addresses never go in as-is. If the analysis needs them, transform them: the street address becomes a ZIP code, the name becomes a customer number. Third: is it business data the task actually requires? Amounts, dates, and reasons go in as-is.

        **Why the law backs this up.** Under CCPA/CPRA, a customer's name, phone, email, and street address are personal information, and the minimization rule says you use only what the purpose reasonably requires. The three gates are that rule applied to a file before you upload it.

        **The example.** You want to know why customers return products. For that the model needs the reason, the amount, and the region. It does not need to know the return was Laura's, or her phone number, or the street she lives on. The pattern shows up either way, without exposing anyone.
    - id: ejercicio_columnas
      kind: exercise
      blockId: categorize_rows
      title: "You are about to ask AI to find patterns in this month's returns"
      body: "The file carries these columns. Decide what happens to each one before you upload it."
      caseContext:
        actionStyle: permission
        actions:
          - { value: permitir, label: "Goes in as-is" }
          - { value: revisar, label: "Goes in transformed" }
          - { value: bloquear, label: "Stays out" }
        rows:
          - { id: d1, label: "Return reason (wrong size, defect, not as described)" }
          - { id: d2, label: "Customer full name, phone, and email" }
          - { id: d3, label: "Exact delivery address (1425 Oak St, Apt 3B, Portland, OR 97214)" }
          - { id: d4, label: "Refund amount in USD" }
          - { id: d5, label: "Free-text customer comment left at return" }
      feedback:
        kind: rows
        rows:
          - { id: d1, correct: permitir, why: "It is the heart of the analysis and it identifies nobody. Without this column there is no pattern to find." }
          - { id: d2, correct: bloquear, why: "It identifies people and the pattern does not need it. If you needed to count repeat customers, ask for an anonymous customer number, never the name or the contact info." }
          - { id: d3, correct: revisar, why: "The geographic pattern helps. The street and apartment number do not. Transform it to city or ZIP before you upload." }
          - { id: d4, correct: permitir, why: "It sizes the problem and it identifies nobody. Business data the task actually requires." }
          - { id: d5, correct: revisar, why: "Free text is useful for the reason, but customers sometimes type phone numbers or names into it. Review it or strip the contact info before it goes in." }
    - id: ejercicio_resumen
      kind: exercise
      blockId: ai_output_review
      title: "AI put together this returns summary to share with the team"
      body: "Mark what you would not let through before forwarding it. Tap to mark."
      caseContext:
        segments:
          - { id: s1, text: "Wrong size explains 4 out of every 10 returns this month.", flagIfMarked: "frase_reutilizable" }
          - { id: s2, text: "Customer Laura Mitchell, phone (415) 555-0142, returned three orders in a row.", flagIfMarked: "dato_sensible" }
          - { id: s3, text: "Returns concentrate in the ZIP codes on the north side of the metro.", flagIfMarked: "frase_reutilizable" }
          - { id: s4, text: "The email laura.mitchell@gmail.com shows up on three tickets; worth reaching out directly.", flagIfMarked: "dato_sensible" }
      feedback:
        kind: segments
        segments:
          - { id: s1, shouldFlag: false, why: "Aggregate data, no identifiable people. Exactly the kind of finding you were after." }
          - { id: s2, shouldFlag: true, why: "A customer's name and phone number in a document that is about to circulate. That data should never have reached the model, let alone come back out in the summary." }
          - { id: s3, shouldFlag: false, why: "A pattern by ZIP, no exact address. This is what a well transformed column looks like." }
          - { id: s4, shouldFlag: true, why: "A personal email plus a recommendation to contact her. The summary was about patterns, not about people. Take it out before you forward." }
    - id: cierre
      kind: closing
      title: "Tomorrow, before you upload a file"
      body: "Run the columns for ten seconds: does the task need this column? Does it identify anyone? What does not help stays out, and what identifies gets transformed. You decide before you upload. After that, it has already circulated."
