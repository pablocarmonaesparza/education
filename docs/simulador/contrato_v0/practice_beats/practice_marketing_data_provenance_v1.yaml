# practice_beat — marcar source de cada cifra en reporte marketing
# disparado por gap: hide_source_disagreement
# duración: ≤2 min.

practice_beat:
  id: practice_marketing_data_provenance_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: hide_source_disagreement
  dimension: validacion
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. tu reporte presentó números agregados sin
      marcar de qué fuente vino cada uno. cuando 3 fuentes reportan
      attribution distinta, ocultar la disagreement crea reporte que
      parece más limpio pero es menos honesto.
    why_this_matters: |
      attribution multi-fuente NO converge a un solo número verdadero.
      cada fuente tiene su modelo (last-click, first-touch, multi-
      touch). reportar "LinkedIn produjo $200k" sin marcar "según
      HubSpot multi-touch model" hace que el CMO crea que es número
      duro. luego cuando ads platform reporta $130k para mismo
      período, pierdes credibilidad.

  principle_card:
    headline: "regla de provenance en reporte attribution"
    body: |
      cada cifra en tu reporte debe llevar 3 piezas de info:

      1. **valor + unidad**
         "$200k" no es suficiente. "$200k revenue attributed".

      2. **source + modelo de attribution**
         "según HubSpot, modelo multi-touch". si fuente usa modelo
         distinto (last-click), nómbralo también.

      3. **período exacto + caveat**
         "del 1 al 30 abril". si hay caveat (data incompleta del
         último día, lag de attribution), señalarlo.

      cuando 2 fuentes reportan distinto, presentar AMBOS lado a
      lado en tabla — no promediar ni elegir el que suena mejor.

      regla mental: si tu cifra puede ser citada fuera de contexto
      y todavía ser correcta, está bien marcada. si requiere
      explicación adicional, le falta provenance.

  practice_exercise:
    type: artifact_review_micro_discriminative
    duration_seconds: 60
    intro: |
      revisa estas 4 líneas de un reporte attribution. clasifica:
      USE o REWRITE.
    segments:
      - id: 1
        text: "LinkedIn Ads generó $48,000 en revenue."
        correct_verdict: rewrite
        why: "sin source, sin modelo, sin período. reescribir: 'LinkedIn Ads generó $48,000 revenue attributed (HubSpot multi-touch, 1-30 abril).'"
      - id: 2
        text: "según HubSpot (multi-touch attribution model, 1-30 abril): $48,000 attributed a LinkedIn Ads. según LinkedIn Insights (last-click): $31,000. discrepancia esperada por differencia de modelo."
        correct_verdict: use
        why: "ambas fuentes presentes con modelo y período. la discrepancia se explica. el CMO sabe qué creer y por qué."
      - id: 3
        text: "Meta Ads sigue siendo nuestro canal menos eficiente."
        correct_verdict: rewrite
        why: "sin cifras de soporte. reescribir: 'Meta Ads tiene CPL más alto ($24) vs LinkedIn ($14) y Google ($18) según ads platforms aggregated, abril 2026.'"
      - id: 4
        text: "ROI cross-channel: 4.2x (custom blended attribution model interno, methodology archivada en wiki/attribution-method-v2)."
        correct_verdict: use
        why: "modelo nombrado, methodology linkable, transparencia completa. el reader puede consultar el método si quiere."

  reveal_after_attempt:
    correct_principle: |
      el reporte que sirve al ejecutivo NO es el que se ve más limpio
      — es el que el ejecutivo puede defender. provenance completa
      (valor + source + modelo + período + caveats) hace que las
      cifras sobrevivan questioning en el board. cifras sin source
      mueren al primer "¿de dónde sale eso?".

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
