# practice_beat — iterar con intención, no por ansiedad
# microbeat correctivo disparado por gap: excessive_iteration
# duración: ≤2 min.

practice_beat:
  id: practice_iterate_with_intent_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: excessive_iteration
  dimension: decision
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. en tu caso reescribiste todas las piezas
      generadas o iteraste con el modelo más de 2-3 veces. el LLM
      genera versiones distintas cada turn, pero "distinto" no es
      "mejor" — y la presión de tiempo del lanzamiento se come en
      iteraciones de bajo valor.
    why_this_matters: |
      hay una trampa cognitiva con los LLMs: "voy a darle una vez más
      a ver si sale mejor". 9 de cada 10 veces sale "diferente, no
      mejor", y pierdes 5-10 min por iteración. con 5 piezas y 4
      iteraciones, son 100-200 min — más que el deadline original.
      iterar con intención es saber exactamente qué quieres antes
      de pedirlo otra vez.

  principle_card:
    headline: "regla de iteración con intención"
    body: |
      antes de pedirle al LLM "otra vez", contesta estas 3 preguntas
      en tu cabeza (o por escrito si vale la pena):

      1. **¿qué exactamente quiero distinto?**
         "más corto" no cuenta. "más corto, manteniendo el dolor
         específico de la primera pieza pero quitando el cierre genérico"
         cuenta.

      2. **¿tengo evidencia de que mi instrucción nueva produce algo mejor?**
         si no tienes ejemplo del output que querrías, edita
         directamente. el LLM no adivina cuando tu propio criterio
         es vago.

      3. **¿cuánto tiempo me cuesta editar a mano vs iterar?**
         si la pieza está 80% bien, editar 30 seg > pedir nueva ver-
         sión 5 min. el LLM no es martillo universal.

      heurística: máximo 2 iteraciones por pieza. si después de 2 no
      llegas, edita o reescribe a mano.

  practice_exercise:
    type: decision_micro
    duration_seconds: 60
    intro: |
      el modelo te dio esta pieza para email subject:

      "descubre la nueva forma de transformar tu equipo de soporte
      con IA — el lanzamiento que estabas esperando"

      tienes 4 opciones. elige la mejor.
    options:
      - id: a
        label: "pedir otra iteración: 'hazlo más corto y menos genérico'"
        verdict: gap_excessive_iteration
        why: "'menos genérico' es vago. el LLM va a generar algo distinto pero igual de genérico. iteración de bajo valor."
      - id: b
        label: "pedir otra iteración con ejemplo: 'usa este formato: \"el ticket que se atora ya no se atora\" — corto, dolor específico, sin AI buzzwords'"
        verdict: correct
        why: "instrucción concreta + ejemplo concreto = iteración con intención. probabilidad alta de mejor output."
      - id: c
        label: "editar a mano: 'el soporte que no se cae cuando alguien está de vacaciones'"
        verdict: correct_alternative
        why: "edición directa basada en lo que ya entiendes de la voz de marca. 30 seg vs 5 min."
      - id: d
        label: "pedir 5 versiones nuevas y elegir la mejor"
        verdict: gap_excessive_iteration
        why: "5 versiones todas con el mismo problema base. peor: 5x el tiempo de generación + 5x el tiempo de evaluar. cuando el problema es de input (prompt), más output no ayuda."

  reveal_after_attempt:
    correct_principle: |
      iterar bien con un LLM no es pedirle "otra vez". es darle
      instrucción más precisa O editar tu mismo. la trampa de "una
      iteración más" gana cuando no tienes hipótesis clara de qué
      sería mejor. cuando tienes hipótesis clara, escríbela en el
      prompt como ejemplo. cuando NO la tienes, edita a mano.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
