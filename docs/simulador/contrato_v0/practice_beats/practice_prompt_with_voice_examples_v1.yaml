# practice_beat — anclar tono con ejemplos en el prompt
# microbeat correctivo disparado por gap: ignore_brand_guide
# duración: ≤2 min.

practice_beat:
  id: practice_prompt_with_voice_examples_v1
  version: 1
  status: active
  duration_max_seconds: 120
  triggered_by_gap: ignore_brand_guide
  dimension: contexto
  level: 1
  applies_to_sprint_skus: [marketing_30d]

  framing:
    intro: |
      pequeña práctica. tu prompt al modelo no incluyó suficientes
      anclas de tu voz de marca. el resultado fue copy genérico, que
      se reconoce como AI en 3 segundos.
    why_this_matters: |
      los LLMs son buenos copywriters PROMEDIO. tu marca no es promedio
      — es específica. la única forma de obtener copy que suene a TU
      marca es darle al modelo ejemplos concretos de tu marca antes
      de pedirle algo. no funciona pegar el brand voice guide y esperar
      magia. funciona pegar 2-3 ejemplos exitosos y decirle "como
      estos, no como las cosas que generas por default".

  principle_card:
    headline: "estructura de un prompt con voz anclada"
    body: |
      cuando pidas copy a un LLM, tu prompt debe tener 4 partes en
      este orden:

      1. **rol y contexto** (1-2 líneas)
         "actúa como copywriter de NubeFresh, marca de comida congelada
         vegana en LATAM."

      2. **2-3 ejemplos del tono** (lo más importante)
         "ejemplos de copy nuestro que funcionó:
         - 'comer rico no debería tomarte más tiempo que doomscrolling'
         - 'spoiler: el lunes va a ser lunes'
         - 'comida que ya está pensada. tú solo abres, calientas, comes.'"

      3. **antiejemplos** (qué NO hacer)
         "evita: 'transforma tu vida con cada platillo', 'vive tu
         mejor versión', cualquier tono motivacional."

      4. **la tarea concreta** (formato + audiencia + restricción)
         "genera 5 piezas: 1 IG post, 1 email subject, 1 TikTok hook,
         1 blog intro, 1 hero copy. audiencia: gen z urbano. máximo
         X palabras por pieza."

      regla: si tu prompt mide más palabras en "ejemplos" que en
      "tarea", vas bien. si mide más en "tarea" que en "ejemplos",
      vas a recibir AI-generic.

  practice_exercise:
    type: prompt_drafting_micro
    duration_seconds: 80
    intro: |
      vas a redactar el prompt para pedir 3 ad headlines para Loop
      (B2B SaaS, audiencia ops managers). tienes 3 ejemplos históricos:

      - "tu equipo de soporte cierra 90 tickets al día"
      - "el ticket que se atora ya no se atora"
      - "tu SLA no debería depender de quien esté de vacaciones"

      escribe el prompt completo en menos de 250 caracteres usando
      la estructura de 4 partes.
    response_max_chars: 250
    examples:
      good:
        - text: |
            actúa como copywriter de Loop (SaaS B2B). tono: cálido
            consultor, frases cortas. ejemplos buenos: "el ticket que
            se atora ya no se atora", "tu SLA no debería depender de
            quien esté de vacaciones". genera 3 ad headlines, max 90
            chars, para ops managers.
          verdict: correct
          why: "rol, 2 ejemplos, tono nombrado, restricción concreta. estructura completa en ≤250 chars."

      bad:
        - text: "dame 3 headlines para ads de Loop, software de soporte al cliente. ops managers, profesional, persuasivo."
          verdict: gap_ignore_brand_guide
          why: "cero ejemplos, tono descrito en abstracto. el LLM va a generar genérico."
        - text: "genera 3 headlines"
          verdict: gap_ignore_brand_guide
          why: "ni contexto."
        - text: |
            actúa como mejor copywriter del mundo, experto en B2B SaaS,
            con 15 años en marketing tech. genera 3 headlines que
            impacten, sean memorables, y conviertan al máximo a ops
            managers buscando soluciones de soporte. usa el tono Loop.
          verdict: roleplay_inflation
          why: "rol inflado pero sin ejemplos concretos. la inflación de rol no compensa la ausencia de anclas."

  reveal_after_attempt:
    correct_principle: |
      la diferencia entre prompt que produce copy on-brand y prompt
      que produce copy genérico NO es la cantidad de palabras del
      brand voice guide que pegues. ES la concretitud de los ejemplos.
      2 ejemplos buenos ≫ 1 página de guidelines abstractos.

  exit:
    transition_text: "ok, regresamos al score final."
    log_to_telemetry: practice_beat_completed
    contributes_to_resim_score: false

  authoring:
    written_by: claude_product
    last_updated: 2026-05-12
