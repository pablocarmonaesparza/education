#   followup_1_date: null | ISO-8601
#   followup_2_date: null | ISO-8601
#   response: confirmed | declined | no_response | scheduled | completed
#   session_scheduled_date: null | ISO-8601
#   incentive_amount_usd: 50 | 100  # según seniority
