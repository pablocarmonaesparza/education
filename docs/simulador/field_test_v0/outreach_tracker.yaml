# tracker de outreach — fase 0 field test
#
# propósito: bitácora viva de candidatos contactados para los 3 grupos.
# operador (Pablo) actualiza este archivo conforme avanza el reclutamiento.
# claude lo monitorea para anticipar fricción.
#
# regla: actualizar fecha + estado de cada candidato. no borrar
# entradas de candidatos que dijeron "no"; preservar como evidencia
# de tasa de respuesta.

meta:
  fase: 0
  created_at: 2026-05-12
  last_updated: 2026-05-12
  operator: pablo
  target_grupo_a: 5     # participantes que resuelven el caso
  target_grupo_b: 3     # managers que leen reporte
  target_evaluators: 2  # evaluadores externos
  recruitment_deadline_days: 10  # 10 días desde inicio outreach

stats_current:
  grupo_a:
    contacted: 0
    confirmed: 0
    declined: 0
    no_response: 0
    completed_session: 0
  grupo_b:
    contacted: 0
    confirmed: 0
    declined: 0
    no_response: 0
    completed_interview: 0
  evaluators:
    contacted: 0
    confirmed: 0
    declined: 0
    contracted: 0

candidates_grupo_a: []
# formato por candidato:
