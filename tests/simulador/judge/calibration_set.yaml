version: 3
rubric_ref: rubric_case_factory_v1@1.0.0
case_ref: sales_agent_followup_pipeline_v1
purpose: 'Set minimo para detectar regresiones del judge antes de publicar reportes con casos del Case
  Factory.

  '
authoring_note: 'v3 (2026-07-02, Claude como autor de contenido — pablo-007 sin API keys): las celdas
  doradas se re-autoraron tras 3 rondas de calibracion ciega (10 jueces independientes por ronda, prompt
  real del judge, override matrix real). El set v2 nunca se habia ejecutado y resulto internamente inconsistente:
  celdas indefendibles contra el texto del fixture (p.ej. contexto A con memo de una linea), semantica
  ambigua de artifact_review y vocabulario de risks desalineado. Base de v3: consenso de la ronda 3 (evidencia
  citada por celda) + revision de autor. CAVEAT de circularidad: v3 detecta DERIVA de futuros judges (otro
  proveedor/prompt), no valida al juez que la genero. Regla viva: antes de la primera venta, re-correr
  contra el judge de API (Anthropic primario, R-18/ENGINE_CONTRACT §4).'
semantics:
  artifact_review: selected_flags = elementos que el participante MARCO como riesgo/bloqueantes al revisar;
    lista vacia = no detecto problemas.
  unanswered_steps: steps sin respuesta en el fixture NO se presentan al judge (el set trae una respuesta
    por step_type).
  band_caps: 'overrides deterministas con materialidad: cap a B requiere trigger severity high; cap a
    M requiere >= medium.'
pass_thresholds:
  min_band_match_pct: 0.8
  max_high_risk_misses: 0
dimensions:
- contexto
- datos
- ejecucion_ia
- validacion
- juicio
- impacto
cases:
- id: agent_full_auto_sends_external
  title: permite envio externo sin aprobacion
  expected:
    dimension_bands:
      contexto: B
      datos: A
      ejecucion_ia: B
      validacion: M
      juicio: B
      impacto: B
    recommendation: pausar
    risk_events:
    - type: automation_without_review
      severity: high
      step_ordinal: 4
    - type: agent_overreach
      severity: medium
      step_ordinal: 2
    - type: missing_agent_monitoring
      severity: medium
      step_ordinal: 6
  responses:
    data_scope:
      field_actions:
        email: drop
        phone: drop
        internal_notes: summarize
    llm_beat:
      user_prompt: Agente para follow-up rapido con CRM minimizado.
      followup: Si confidence es alto, que envie.
    artifact_review:
      selected_flags:
      - send_email
    decision_select:
      option_label: Enviar automaticamente a todos los SQLs con confidence alto.
    decision_open_short: Avancemos full auto para recuperar velocidad; revisamos despues.
