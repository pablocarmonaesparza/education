name: Simulador CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  simulator:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate simulator contracts
        run: npm run simulador:validate

      - name: Typecheck simulator scope
        run: npm run typecheck:simulador

      - name: Lint simulator scope
        run: npm run lint:simulador

      - name: Validate shared memory
        run: bash scripts/lint-memory.sh
