<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>itera · aprende IA, no estudiando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="tokens.css?v=13" />

  <style>
    /* hero + cta = pantalla completa */
    .hero-section, .cta-section, .hero-demo-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* card hover lift (fuera del hero) */
    .card.card-interactive,
    .como-timeline .card,
    .pricing-grid > div,
    .empresas-cases > div,
    .testimonios-bento .card {
      transition: transform 220ms cubic-bezier(.16,1,.3,1), border-bottom-width 220ms cubic-bezier(.16,1,.3,1);
    }
    .como-timeline .card:hover,
    .empresas-cases > div:hover,
    .testimonios-bento .card:hover {
      transform: translateY(-4px);
      border-bottom-width: 8px;
    }

    /* compare table rows: fade-in stagger */
    .vs-grid > div { transition: background 200ms ease-out; }
    .vs-grid > div:hover { background: var(--bg-soft); }

    /* faq item hover */
    .faq-item:hover { transform: translateY(-2px); }

    /* stats con micro-bounce al entrar */
    @keyframes statRise {
      0% { transform: translateY(20px) scale(0.96); opacity: 0; }
      60% { transform: translateY(-4px) scale(1.02); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    .stat-bounce { animation: statRise 700ms cubic-bezier(.34,1.56,.64,1) both; }

    /* responsive grids */
    .grid-3 { grid-template-columns: 1fr; }
    .hero-grid { grid-template-columns: 1fr; }
    .faq-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .vs-grid, .btn-states-grid { overflow-x: auto; }

    @media (min-width: 768px) {
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .hero-grid { grid-template-columns: 1.1fr 1fr; gap: 64px; }
      .faq-grid { grid-template-columns: 1fr 1.4fr; }
      .footer-grid { grid-template-columns: 1.4fr 1fr 1fr 1fr; }
      .problema-asym { grid-template-columns: 1.4fr 1fr; }
      .testimonios-bento { grid-template-columns: 1.5fr 1fr; }
      .como-timeline {
        grid-template-columns: 1fr auto 1fr auto 1fr !important;
      }
      .como-arrow { transform: none; }
    }
    @media (max-width: 767px) {
      .como-arrow { transform: rotate(90deg); padding: 4px 0; }
      .pricing-table { overflow-x: auto !important; }
      .pricing-grid { min-width: 760px; }
    }

    /* nav responsive */
    @media (max-width: 900px) {
      .nav-desktop { display: none !important; }
      .nav-mobile-only { display: inline-flex !important; align-items: center; }
    }

    /* faq accordion */
    .faq-item {
      background: var(--bg);
      border: 2px solid var(--text-strong);
      border-bottom-width: 5px;
      border-radius: var(--r-lg);
      padding: 18px 22px;
      transition: all 150ms ease-out;
    }
    .faq-item[open] { background: var(--bg-soft); }
    .faq-item summary {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; list-style: none;
      font-family: var(--font-body); font-weight: 700; font-size: 16px;
      color: var(--text-strong);
      gap: 16px;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-chev {
      flex-shrink: 0;
      transition: transform 200ms ease-out;
      color: var(--primary);
    }
    .faq-item[open] .faq-chev { transform: rotate(180deg); }

    /* button forced states for review */
    .btn.force-hover.btn-primary { background: #2a82ff; }
    .btn.force-hover.btn-outline { background: var(--bg-soft); }
    .btn.force-hover.btn-ghost { background: var(--bg-soft); }
    .btn.force-hover.btn-accent { background: #2dd16b; }
    .btn.force-active { border-bottom-width: 4px !important; margin-top: 2px; margin-bottom: -2px; }
    .btn.force-active.btn-primary { background: #0E5FCC; }

    /* type-row stacks on mobile */
    @media (max-width: 768px) {
      .type-row { grid-template-columns: 1fr !important; gap: 8px !important; }
    }

    /* depth tweak modes */
    body.depth-subtle .btn { border-bottom-width: 4px; }
    body.depth-subtle .btn:active:not(:disabled) { border-bottom-width: 3px; }
    body.depth-subtle .card { border-bottom-width: 4px; }
    body.depth-subtle .faq-item { border-bottom-width: 3px; }
    body.depth-subtle .input { border-bottom-width: 3px; }

    body.depth-strong .btn { border-bottom-width: 8px; }
    body.depth-strong .btn:active:not(:disabled) { border-bottom-width: 5px; }
    body.depth-strong .card { border-bottom-width: 9px; }
    body.depth-strong .faq-item { border-bottom-width: 7px; }
    body.depth-strong .input { border-bottom-width: 6px; }

    /* hero density */
    body.hero-compact .section:first-of-type { padding-top: 24px; padding-bottom: 24px; }
    body.hero-compact .it-display { font-size: clamp(40px, 7vw, 72px); }
    body.hero-compact .hero-grid { gap: 32px; }

    /* a invisible hash anchor offset */
    a[id] { display: block; height: 0; scroll-margin-top: 80px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="ui.js?v=11" defer></script>
  <script src="visuals.js?v=11" defer></script>
  <script src="sections-1.js?v=11" defer></script>
  <script src="sections-2.js?v=11" defer></script>
  <script src="review.js?v=11" defer></script>
  <script src="tweaks-panel.js?v=11" defer></script>
  <script src="app.js?v=11" defer></script>

  <script>
    // === scroll reveal observer ===
    (function () {
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("in");
              io.unobserve(e.target);
            }
          });
        },
        { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
      );

      const tag = (root) => {
        const targets = (root || document).querySelectorAll(
          ".section .container > *, .section .container > * > .card"
        );
        targets.forEach((el) => {
          if (el.classList.contains("reveal") || el.closest(".tweaks-panel")) return;
          el.classList.add("reveal");
          io.observe(el);
        });
      };

      const wait = () => {
        if (document.querySelector(".section")) tag();
        else setTimeout(wait, 60);
      };
      wait();

      // re-tag cuando React re-renderiza (tweaks)
      const mo = new MutationObserver(() => tag());
      mo.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
